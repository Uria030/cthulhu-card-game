<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 主控台 — MOD-12</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-shared.css">
  <link rel="stylesheet" href="admin-ai-console.css">
</head>
<body>

  <nav class="admin-nav console-nav">
    <a href="index.html" class="nav-back">← 返回首頁</a>
    <span class="nav-title">AI 主控台</span>

    <!-- API Key 按鈕移到 MOD-12 左側 -->
    <button type="button" class="provider-apikey-btn" id="providerApiKeyBtn" onclick="onApiKeyClick()" title="設定 Gemini API Key（與 MOD-01 共用 localStorage）">API Key</button>

    <span class="nav-code">MOD-12</span>

    <!-- 模型 / 批次 / 就緒狀態（依序在 MOD-12 右側） -->
    <label class="nav-inline-control" title="遠端 Gemini API 使用的模型（本地 Gemma 模式忽略此欄）">
      模型
      <select id="chatGeminiModel" onchange="updateProviderButtons()">
        <option value="gemini-2.5-pro" title="Gemini 2.5 Pro">2.5 Pro</option>
        <option value="gemini-2.5-flash" title="Gemini 2.5 Flash">2.5 Flash</option>
        <option value="gemini-3.1-pro-preview" title="Gemini 3.1 Pro Preview">3.1 Pro</option>
      </select>
    </label>
    <label class="nav-inline-control" title="一次產出幾張卡片（1-10）">
      批次
      <input type="number" id="chatBatchCount" min="1" max="10" value="1">
    </label>
    <span class="nav-ready-indicator" id="navReadyIndicator" title="AI 狀態">偵測中…</span>

    <span class="nav-spacer"></span>

    <!-- 遠端 / 本地 兩字按鈕靠右 -->
    <div class="ai-provider-switch" id="aiProviderSwitch" role="group" aria-label="AI 提供者選擇">
      <button type="button" class="provider-btn active" data-provider="gemini" onclick="onProviderChoiceClick('gemini')" title="遠端 Gemini API（需 Gemini API Key）">遠端</button>
      <button type="button" class="provider-btn" data-provider="gemma" onclick="onProviderChoiceClick('gemma')" title="本地 Gemma（Ollama）">本地</button>
    </div>

    <div class="ai-mode-indicator" id="aiModeIndicator">
      <span class="mode-dot mode-detecting" id="modeDot"></span>
      <span class="mode-label" id="modeLabel">偵測 bridge...</span>
      <button class="mode-refresh" onclick="redetectBridge()" title="重新偵測">⟳</button>
    </div>
  </nav>

  <div id="rootContainer"></div>

  <script src="admin-shared.js"></script>
  <script src="admin-ai-tasks/geminiDirectClient.js"></script>
  <script src="admin-ai-tasks/bridgeClient.js"></script>
  <script src="admin-ai-tasks/subtaskSanitizer.js"></script>
  <script src="admin-ai-tasks/itemMapper.js"></script>
  <script src="admin-ai-tasks/taskExecutor.js"></script>
  <script src="admin-ai-console.js"></script>
  <script>
    // Early initial paint：確保即使後續 updateProviderButtons 執行失敗，
    // API Key 按鈕與就緒指示器仍會根據 localStorage 顯示正確狀態
    (function earlyPaint() {
      try {
        const hasKey = !!(window.hasGeminiApiKey && window.hasGeminiApiKey());
        const btn = document.getElementById('providerApiKeyBtn');
        if (btn) {
          btn.classList.toggle('set', hasKey);
          btn.textContent = hasKey ? 'API Key 已設定' : '設定 API Key';
        }
        const ind = document.getElementById('navReadyIndicator');
        if (ind) {
          ind.classList.remove('ready', 'not-ready');
          if (hasKey) {
            ind.classList.add('ready');
            ind.textContent = '✓ gemini-2.5-pro 就緒';
          } else {
            ind.classList.add('not-ready');
            ind.textContent = '未設定 API Key';
          }
        }
      } catch (e) {
        console.error('[earlyPaint] failed:', e);
        const ind = document.getElementById('navReadyIndicator');
        if (ind) { ind.classList.add('not-ready'); ind.textContent = 'init error: ' + (e.message || e); }
      }
    })();
  </script>
</body>
</html>
