<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>戰役敘事設計器 | UG 後台</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-shared.css">
  <style>
    :root {
      --cam-gold: #c9a961;
      --cam-gold-dim: #8a7540;
      --cam-success: #6b9c5a;
      --cam-warn: #c99738;
      --cam-danger: #c14a4a;
    }
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-primary); color: var(--text-primary); }

    .layout-container {
      display: grid;
      grid-template-columns: 280px 1fr 340px;
      height: calc(100vh - 52px);
      gap: 0;
    }
    .left-panel, .right-panel { background: var(--bg-card); overflow-y: auto; }
    .left-panel { border-right: 1px solid var(--border); }
    .right-panel { border-left: 1px solid var(--border); }
    .main-panel { overflow-y: auto; padding: 1rem 1.25rem; }

    .panel-header {
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .panel-header h2 { font-family: 'Cinzel', serif; font-size: 0.95rem; color: var(--cam-gold); margin: 0; }
    .panel-filters {
      padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.35rem;
    }
    .panel-filters input, .panel-filters select {
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.3rem 0.5rem; font-family: inherit; font-size: 0.8rem;
    }

    .campaign-list { padding: 0.35rem 0; }
    .campaign-item {
      padding: 0.55rem 0.85rem; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.1s, border-left-color 0.1s;
      border-left: 3px solid transparent;
    }
    .campaign-item:hover { background: rgba(201, 169, 97, 0.07); }
    .campaign-item.active { background: rgba(201, 169, 97, 0.15); border-left-color: var(--cam-gold); }
    .campaign-item .ci-code { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-tertiary); }
    .campaign-item .ci-name { font-size: 0.9rem; margin: 0.15rem 0; }
    .campaign-item .ci-meta { font-size: 0.7rem; color: var(--text-secondary); }

    .placeholder {
      text-align: center; padding: 2rem 1.5rem; color: var(--text-tertiary); font-size: 0.88rem;
    }
    .editor-header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); margin-bottom: 0.75rem;
    }
    .editor-header h2 { font-family: 'Cinzel', serif; color: var(--cam-gold); margin: 0; font-size: 1.1rem; }
    .editor-meta { display: flex; gap: 0.5rem; align-items: center; font-size: 0.75rem; color: var(--text-secondary); }

    .tab-bar {
      display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 0.5rem 0.9rem; background: transparent; border: none;
      color: var(--text-secondary); cursor: pointer; font-size: 0.85rem;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      font-family: inherit;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--cam-gold); border-bottom-color: var(--cam-gold); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .editor-section {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; padding: 1rem; margin-bottom: 1rem;
    }
    .editor-section h3 {
      font-family: 'Cinzel', serif; color: var(--cam-gold-dim);
      font-size: 0.9rem; margin: 0 0 0.75rem; padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }
    .editor-section label { display: block; margin-bottom: 0.6rem; font-size: 0.78rem; color: var(--text-secondary); }
    .editor-section label input, .editor-section label textarea, .editor-section label select {
      display: block; width: 100%; margin-top: 0.2rem; box-sizing: border-box;
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.35rem 0.5rem; font-family: inherit; font-size: 0.85rem;
    }
    .editor-section label textarea { resize: vertical; }
    .editor-section label input[readonly] { opacity: 0.7; cursor: not-allowed; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .chaos-bag-editor { display: flex; flex-direction: column; gap: 0.85rem; }
    .marker-group { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 4px; padding: 0.75rem; }
    .marker-group h4 { margin: 0 0 0.5rem; color: var(--cam-gold); font-size: 0.82rem; font-family: 'Cinzel', serif; }
    .marker-row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 0.35rem; }
    .marker-row label { display: inline-flex; align-items: center; gap: 0.3rem; margin: 0; font-size: 0.75rem; color: var(--text-secondary); }
    .marker-row input[type="number"] {
      width: 3.5rem; padding: 0.2rem 0.35rem; text-align: center;
      background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 4px;
      font-family: inherit; font-size: 0.78rem;
    }
    .marker-row select {
      padding: 0.2rem 0.35rem; background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 4px;
      font-family: inherit; font-size: 0.75rem; max-width: 10rem;
    }
    .marker-summary {
      background: rgba(201, 169, 97, 0.07); padding: 0.5rem 0.75rem;
      border-radius: 4px; font-size: 0.8rem; color: var(--text-secondary);
      display: flex; gap: 1.5rem; margin-top: 0.5rem;
    }
    .preset-buttons { display: flex; gap: 0.35rem; margin-bottom: 0.5rem; flex-wrap: wrap; align-items: center; }
    .preset-buttons button {
      padding: 0.3rem 0.7rem; background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 0.75rem;
    }
    .preset-buttons button:hover { color: var(--cam-gold); border-color: var(--cam-gold-dim); }

    .chapter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.6rem; margin-top: 0.35rem; }
    .chapter-card {
      background: var(--bg-primary); border: 1px solid var(--border);
      border-radius: 5px; padding: 0.6rem; cursor: pointer;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
    }
    .chapter-card:hover { transform: translateY(-1px); border-color: var(--cam-gold-dim); box-shadow: 0 2px 6px rgba(0,0,0,0.25); }
    .chapter-card .ch-num { font-size: 1.4rem; font-weight: 700; color: var(--cam-gold); font-family: 'Cinzel', serif; }
    .chapter-card .ch-code { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--text-tertiary); }
    .chapter-card .ch-name { font-size: 0.72rem; color: var(--text-primary); text-align: center; min-height: 1.4em; }
    .chapter-card .ch-badges { display: flex; flex-wrap: wrap; gap: 0.2rem; justify-content: center; font-size: 0.6rem; }

    .status-draft, .status-review, .status-published {
      padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.68rem;
    }
    .status-draft { background: rgba(90,90,82,0.25); color: #a0a092; }
    .status-review { background: rgba(201,169,97,0.2); color: var(--cam-gold); }
    .status-published { background: rgba(107,156,90,0.2); color: var(--cam-success); }
    .badge-dirty { color: var(--cam-warn); font-weight: 600; }

    .btn-primary {
      padding: 0.35rem 0.85rem; background: var(--cam-gold-dim);
      color: var(--bg-primary); border: 1px solid var(--cam-gold);
      border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: 600;
    }
    .btn-primary:hover { background: var(--cam-gold); }
    .btn-danger {
      padding: 0.3rem 0.7rem; background: transparent; color: var(--cam-danger);
      border: 1px solid var(--cam-danger); border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 0.78rem;
    }
    .btn-danger:hover { background: rgba(193,74,74,0.1); }
    .btn-secondary {
      padding: 0.3rem 0.7rem; background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 0.78rem;
    }
    .btn-secondary:hover { color: var(--text-primary); border-color: var(--cam-gold-dim); }
    .btn-small { padding: 0.15rem 0.45rem; font-size: 0.7rem; }

    .editor-footer { margin-top: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .preview-content { padding: 0.75rem; }
    .preview-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 0.85rem; }
    .preview-card h3 { font-family: 'Cinzel', serif; color: var(--cam-gold); margin: 0 0 0.35rem; font-size: 1rem; }
    .preview-card .theme { font-size: 0.75rem; color: var(--text-tertiary); margin: 0.2rem 0; }
    .preview-card .cover-narrative { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; white-space: pre-wrap; margin: 0.5rem 0; }
    .preview-card h4 { font-family: 'Cinzel', serif; font-size: 0.82rem; color: var(--cam-gold-dim); margin: 0.75rem 0 0.35rem; }
    .chapter-mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.2rem; }
    .chapter-mini-grid .mini-ch {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 3px; font-size: 0.7rem;
    }
    .chapter-mini-grid .mini-ch.status-published { border-color: var(--cam-success); color: var(--cam-success); }
    .chapter-mini-grid .mini-ch.status-review { border-color: var(--cam-warn); color: var(--cam-warn); }

    .dialog-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .dialog-content {
      background: var(--bg-card); border: 1px solid var(--cam-gold-dim);
      border-radius: 8px; padding: 1.2rem 1.5rem;
      min-width: 380px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
    }
    .dialog-content h3 { font-family: 'Cinzel', serif; color: var(--cam-gold); margin: 0 0 1rem; font-size: 1rem; }
    .dialog-content label { display: block; margin-bottom: 0.6rem; font-size: 0.8rem; color: var(--text-secondary); }
    .dialog-content label input, .dialog-content label textarea, .dialog-content label select {
      display: block; width: 100%; margin-top: 0.2rem; box-sizing: border-box;
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 4px; padding: 0.35rem 0.5rem;
      font-family: inherit;
    }
    .dialog-footer { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; }

    .toast {
      position: fixed; top: 70px; right: 20px; z-index: 2000;
      padding: 0.6rem 1rem; border-radius: 4px;
      font-size: 0.85rem; max-width: 300px;
      animation: slideIn 0.2s ease-out; color: #fff;
    }
    .toast.success { background: rgba(107,156,90,0.95); border-left: 4px solid var(--cam-success); }
    .toast.error { background: rgba(193,74,74,0.95); border-left: 4px solid var(--cam-danger); }
    .toast.warn { background: rgba(201,151,56,0.95); border-left: 4px solid var(--cam-warn); }
    @keyframes slideIn { from { transform: translateX(350px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .nav-version { color: var(--text-tertiary); font-size: 0.7rem; margin-left: 0.5rem; }

    /* ── Part 3 新增：章節編輯 ── */
    .chapters-layout {
      display: grid; grid-template-columns: 160px 1fr; gap: 0.75rem;
    }
    .chapter-nav {
      display: flex; flex-direction: column; gap: 0.3rem;
      padding: 0.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
      max-height: calc(100vh - 200px); overflow-y: auto;
    }
    .chapter-tab-btn {
      padding: 0.4rem 0.6rem; background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 0.75rem; text-align: left;
      display: flex; justify-content: space-between; align-items: center; gap: 0.3rem;
    }
    .chapter-tab-btn:hover { background: rgba(201, 169, 97, 0.1); }
    .chapter-tab-btn.active { background: rgba(201, 169, 97, 0.25); color: var(--cam-gold); border-color: var(--cam-gold-dim); }
    .chapter-tab-btn .ch-num-s { font-weight: 700; font-family: 'Cinzel', serif; }

    .outcome-slots { display: flex; flex-direction: column; gap: 0.75rem; }
    .outcome-slot {
      background: var(--bg-primary); border: 1px solid var(--border); border-radius: 5px; padding: 0.75rem;
    }
    .outcome-slot.disabled { opacity: 0.5; }
    .outcome-slot.enabled { border-left: 3px solid var(--cam-gold-dim); }
    .outcome-header { display: flex; justify-content: space-between; align-items: center; }
    .outcome-header h4 { margin: 0; font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--cam-gold); }
    .outcome-body { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; }

    .narrative-choices-list, .interlude-operations-list, .flag-chips { display: flex; flex-direction: column; gap: 0.4rem; }
    .choice-row, .operation-row {
      display: grid; grid-template-columns: 1fr auto; gap: 0.35rem; align-items: start;
      background: var(--bg-card); padding: 0.4rem; border-radius: 4px;
    }
    .flag-chip {
      display: inline-flex; align-items: center; gap: 0.2rem;
      background: rgba(201, 169, 97, 0.1); color: var(--cam-gold);
      padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
      margin-right: 0.3rem;
    }
    .flag-chip button { background: none; border: none; color: var(--cam-danger); cursor: pointer; font-size: 0.8rem; }

    /* ── Part 3 新增：旗標字典 ── */
    .flags-toolbar { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; align-items: center; }
    .flags-toolbar input, .flags-toolbar select {
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.3rem 0.5rem; font-family: inherit; font-size: 0.8rem;
    }
    .flags-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .flags-table th, .flags-table td {
      padding: 0.45rem 0.6rem; border-bottom: 1px solid var(--border); text-align: left;
    }
    .flags-table th {
      background: var(--bg-card); color: var(--cam-gold-dim);
      font-family: 'Cinzel', serif; font-size: 0.78rem;
    }
    .flags-table td code { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--cam-gold); }
    .cat-badge {
      padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem;
      background: rgba(201, 169, 97, 0.1); color: var(--cam-gold-dim);
    }
    .code-input-wrapper { display: flex; align-items: stretch; gap: 0; }
    .code-prefix {
      padding: 0.35rem 0.5rem; background: var(--bg-card);
      border: 1px solid var(--border); border-right: none; border-radius: 4px 0 0 4px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--cam-gold);
    }
    .code-input-wrapper input { border-radius: 0 4px 4px 0 !important; }

    /* ── Part 3 新增：間章事件 ── */
    .interludes-layout { display: grid; grid-template-columns: 220px 1fr; gap: 0.75rem; }
    .interludes-nav {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
      padding: 0.5rem; max-height: calc(100vh - 200px); overflow-y: auto;
    }
    .interlude-group { margin-bottom: 0.5rem; }
    .interlude-group h4 {
      font-family: 'Cinzel', serif; color: var(--cam-gold-dim);
      font-size: 0.75rem; margin: 0.5rem 0 0.3rem;
    }
    .interlude-subgroup h5 {
      color: var(--text-tertiary); font-size: 0.7rem; margin: 0.3rem 0;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .interlude-item {
      padding: 0.35rem 0.5rem; background: var(--bg-primary);
      border: 1px solid var(--border); border-radius: 3px; cursor: pointer;
      margin-bottom: 0.25rem; font-size: 0.75rem;
    }
    .interlude-item:hover { border-color: var(--cam-gold-dim); }
    .interlude-item.active { border-left: 3px solid var(--cam-gold); }
    .interlude-item code { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--cam-gold-dim); margin-right: 0.3rem; }

    /* ── Part 3 新增：條件表達式 ── */
    .cond-editor {
      background: var(--bg-card); border: 1px dashed var(--border); border-radius: 4px;
      padding: 0.5rem; min-height: 2.5rem;
    }
    .cond-row {
      display: grid; grid-template-columns: auto 1fr auto; gap: 0.35rem;
      align-items: center; margin-bottom: 0.35rem;
    }
    .cond-row select, .cond-row input {
      padding: 0.22rem 0.35rem; background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 3px;
      font-family: inherit; font-size: 0.75rem;
    }
    .cond-group-type {
      margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; color: var(--text-secondary);
    }

    /* ── Part 3 新增：混沌袋演變 ── */
    .evolution-layout { display: grid; grid-template-columns: 1fr 320px; gap: 0.75rem; }
    .evolution-matrix table {
      width: 100%; border-collapse: collapse; font-size: 0.78rem;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    }
    .evolution-matrix th, .evolution-matrix td {
      padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--border); text-align: center;
      vertical-align: top;
    }
    .evolution-matrix th { background: var(--bg-primary); color: var(--cam-gold-dim); font-family: 'Cinzel', serif; }
    .evolution-matrix td.empty { color: var(--text-tertiary); }
    .evolution-simulator {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem;
    }
    .evolution-simulator h4 { font-family: 'Cinzel', serif; color: var(--cam-gold); margin: 0 0 0.5rem; font-size: 0.85rem; }

    /* ── Part 4 新增：完整性檢查 ── */
    .completeness-summary { padding: 0.75rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.75rem; }
    .overall-status .status-ok { color: var(--cam-success); font-size: 1.1rem; font-weight: 700; }
    .overall-status .status-fail { color: var(--cam-danger); font-size: 1.1rem; font-weight: 700; }
    .check-section ul { list-style: none; padding: 0; margin: 0; }
    .check-section li { padding: 0.25rem 0; font-size: 0.82rem; }
    .check-section li.pass { color: var(--text-secondary); }
    .check-section li.fail { color: var(--cam-danger); }
    .check-section li .indicator { display: inline-block; width: 1.2em; }
    .check-section li .detail { margin-left: 1.4em; font-size: 0.72rem; color: var(--text-tertiary); }
    .ai-key-indicator {
      padding: 0.3rem 0.6rem; background: transparent;
      border: 1px dashed var(--border); color: var(--text-tertiary);
      border-radius: 4px; font-size: 0.72rem; font-family: inherit;
      cursor: pointer; margin-left: 0.5rem;
    }
    .ai-key-indicator.set { color: var(--cam-success); border-color: var(--cam-success); border-style: solid; }

    @media (max-width: 1100px) {
      .layout-container { grid-template-columns: 240px 1fr 280px; }
      .chapter-grid { grid-template-columns: repeat(3, 1fr); }
      .interludes-layout, .evolution-layout, .chapters-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 800px) {
      .layout-container { grid-template-columns: 1fr; }
      .left-panel, .right-panel { display: none; }
    }
  </style>
</head>
<body>

  <nav class="admin-nav">
    <a href="index.html" class="nav-back">← 返回首頁</a>
    <span class="nav-title">戰役敘事設計器</span>
    <span class="nav-code">MOD-06</span>
    <span class="nav-spacer"></span>
    <button id="ai-key-status" class="ai-key-indicator" onclick="promptApiKey()">⚠ API Key 未設</button>
    <button class="btn-secondary" onclick="openModuleHelp && openModuleHelp('MOD-06')" title="使用說明">說明</button>
    <span id="current-user" class="nav-version"></span>
    <span class="nav-version" id="admin-version-tag"></span>
  </nav>

  <div class="layout-container">

    <aside class="left-panel">
      <div class="panel-header">
        <h2>戰役列表</h2>
        <button class="btn-primary" onclick="openCreateCampaignDialog()">＋ 新戰役</button>
      </div>
      <div class="panel-filters">
        <input type="search" id="campaign-search" placeholder="搜尋戰役…" oninput="renderCampaignList()">
        <select id="campaign-status-filter" onchange="renderCampaignList()">
          <option value="">全部狀態</option>
          <option value="draft">草稿</option>
          <option value="review">審核中</option>
          <option value="published">已發佈</option>
        </select>
        <button class="btn-secondary btn-small" onclick="exportCampaignJSON()">匯出當前戰役</button>
        <label class="btn-secondary btn-small" style="text-align:center; cursor:pointer;">
          匯入戰役 JSON
          <input type="file" accept=".json" style="display:none" onchange="importCampaignJSON(event)">
        </label>
      </div>
      <div id="campaign-list" class="campaign-list"></div>
    </aside>

    <main class="main-panel">
      <div id="no-campaign-placeholder" class="placeholder">
        <p>請從左側選擇戰役，或建立新戰役。</p>
      </div>

      <div id="campaign-editor" style="display:none;">
        <div class="editor-header">
          <h2 id="editor-title"></h2>
          <div class="editor-meta">
            <span id="editor-status-badge"></span>
            <span id="editor-version"></span>
          </div>
        </div>

        <nav class="tab-bar">
          <button class="tab-btn active" data-tab="overview">戰役總覽</button>
          <button class="tab-btn" data-tab="chapters">章節編輯</button>
          <button class="tab-btn" data-tab="flags">旗標字典</button>
          <button class="tab-btn" data-tab="interludes">間章事件</button>
          <button class="tab-btn" data-tab="chaos-evolution">混沌袋演變</button>
          <button class="tab-btn" data-tab="completeness">完整性檢查</button>
        </nav>

        <!-- ══ 戰役總覽 ══ -->
        <section id="tab-overview" class="tab-content active">
          <div class="editor-section">
            <h3>戰役元資料</h3>
            <div class="form-row">
              <label>戰役代碼（建立後不可修改）
                <input type="text" id="field-code" readonly>
              </label>
              <label>設計狀態
                <select id="field-design-status" onchange="markDirty()">
                  <option value="draft">草稿</option>
                  <option value="review">審核中</option>
                  <option value="published">已發佈</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label>中文名稱
                <input type="text" id="field-name-zh" oninput="markDirty()">
              </label>
              <label>英文名稱
                <input type="text" id="field-name-en" oninput="markDirty()">
                <button class="btn-secondary btn-small" type="button" onclick="aiTranslate('field-name-zh','field-name-en')">中譯英</button>
              </label>
            </div>
            <div class="form-row">
              <label>主題
                <input type="text" id="field-theme" placeholder="例：印斯茅斯、敦威治" oninput="markDirty()">
              </label>
              <label>難度基準
                <select id="field-difficulty-tier" onchange="markDirty()">
                  <option value="easy">簡單</option>
                  <option value="standard">標準</option>
                  <option value="hard">困難</option>
                  <option value="expert">專家</option>
                </select>
              </label>
            </div>
            <label>封面敘事
              <textarea id="field-cover-narrative" rows="6" oninput="markDirty()" placeholder="戰役開場白、氛圍鋪陳…"></textarea>
              <button class="btn-secondary btn-small" type="button" onclick="aiGenerateCoverNarrative()">AI 生成封面敘事</button>
            </label>
          </div>

          <div class="editor-section">
            <h3>起始混沌袋配置</h3>
            <div class="preset-buttons">
              <span style="font-size:0.75rem; color:var(--text-tertiary); margin-right:0.3rem;">難度預設：</span>
              <button type="button" onclick="applyDifficultyPreset('easy')">簡單</button>
              <button type="button" onclick="applyDifficultyPreset('standard')">標準</button>
              <button type="button" onclick="applyDifficultyPreset('hard')">困難</button>
              <button type="button" onclick="applyDifficultyPreset('expert')">專家</button>
            </div>
            <div class="chaos-bag-editor" id="chaos-bag-editor"></div>
            <div class="marker-summary" id="chaos-bag-summary">
              <span>總標記數：<b id="bag-total">0</b></span>
              <span>期望值：<b id="bag-expected">0.0</b></span>
            </div>
          </div>

          <div class="editor-section">
            <h3>十章骨架</h3>
            <div class="chapter-grid" id="chapter-grid"></div>
          </div>

          <div class="editor-footer">
            <button class="btn-primary" onclick="saveCampaign()">儲存戰役</button>
          </div>
        </section>

        <!-- ══ 章節編輯 ══ -->
        <section id="tab-chapters" class="tab-content">
          <div class="chapters-layout">
            <div class="chapter-nav" id="chapter-nav"></div>
            <div id="chapter-editor-container">
              <div class="placeholder">請從左側選擇章節</div>
            </div>
          </div>
        </section>

        <!-- ══ 旗標字典 ══ -->
        <section id="tab-flags" class="tab-content">
          <div class="flags-toolbar">
            <input type="search" id="flag-search" placeholder="搜尋旗標代碼…" oninput="renderFlagsList()">
            <select id="flag-category-filter" onchange="renderFlagsList()">
              <option value="">全部類別</option>
            </select>
            <button class="btn-primary" onclick="openNewFlagDialog()">＋ 新增旗標</button>
          </div>
          <div class="editor-section" style="padding:0;">
            <table class="flags-table">
              <thead>
                <tr>
                  <th>旗標代碼</th>
                  <th>類別</th>
                  <th>章節</th>
                  <th>描述</th>
                  <th>可見性</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="flags-tbody"></tbody>
            </table>
          </div>
        </section>

        <!-- ══ 間章事件 ══ -->
        <section id="tab-interludes" class="tab-content">
          <div class="interludes-layout">
            <div class="interludes-nav">
              <button class="btn-primary" style="width:100%; margin-bottom:0.5rem;" onclick="openNewInterludeDialog()">＋ 新事件</button>
              <div id="interludes-grouped-list"></div>
            </div>
            <div id="interlude-editor-container">
              <div class="placeholder">請從左側選擇事件</div>
            </div>
          </div>
        </section>

        <!-- ══ 混沌袋演變 ══ -->
        <section id="tab-chaos-evolution" class="tab-content">
          <div class="evolution-layout">
            <div class="evolution-matrix">
              <h3 style="font-family:'Cinzel',serif; color:var(--cam-gold); font-size:0.95rem; margin-top:0;">演變規則矩陣</h3>
              <table>
                <thead>
                  <tr>
                    <th>章節</th>
                    <th>結果 A</th><th>結果 B</th><th>結果 C</th><th>結果 D</th><th>結果 E</th>
                  </tr>
                </thead>
                <tbody id="evolution-matrix-body"></tbody>
              </table>
            </div>
            <div class="evolution-simulator">
              <h4>終局混沌袋模擬</h4>
              <label style="font-size:0.75rem; color:var(--text-secondary);">模擬路徑
                <select id="sim-path-mode" onchange="runSimulation()" style="width:100%; margin-top:0.2rem; padding:0.3rem; background:var(--bg-primary); color:var(--text-primary); border:1px solid var(--border); border-radius:4px;">
                  <option value="best">最好路徑（全選 A 結果）</option>
                  <option value="worst">最壞路徑（全選最末結果）</option>
                  <option value="average">平均路徑（依所有結果平均）</option>
                </select>
              </label>
              <button class="btn-primary" style="margin-top:0.5rem;" onclick="runSimulation()">執行模擬</button>
              <div id="sim-result-display" style="margin-top:0.75rem; font-size:0.78rem;"></div>
            </div>
          </div>
        </section>

        <!-- ══ 完整性檢查 ══ -->
        <section id="tab-completeness" class="tab-content">
          <div class="completeness-summary overall-status">
            <h3 style="font-family:'Cinzel',serif; color:var(--cam-gold); margin:0 0 0.5rem;">戰役發佈狀態</h3>
            <div id="overall-badge"></div>
            <p id="overall-message" style="font-size:0.85rem; color:var(--text-secondary); margin:0.5rem 0 0;"></p>
          </div>
          <div class="editor-section check-section">
            <h3>戰役層級</h3>
            <ul id="checks-campaign"></ul>
          </div>
          <div class="editor-section check-section">
            <h3>章節層級</h3>
            <div id="checks-chapters"></div>
          </div>
          <div class="editor-section check-section">
            <h3>結構完整性</h3>
            <ul id="checks-structure"></ul>
          </div>
          <div class="editor-section check-section">
            <h3>旗標字典完整性</h3>
            <ul id="checks-flags"></ul>
          </div>
          <div class="editor-footer">
            <button class="btn-primary" onclick="runCompletenessCheck()">重新檢查</button>
          </div>
        </section>
      </div>
    </main>

    <aside class="right-panel">
      <div class="panel-header"><h2>即時預覽</h2></div>
      <div id="preview-content" class="preview-content">
        <p class="placeholder" style="padding:1.5rem;">選擇戰役後顯示預覽</p>
      </div>
    </aside>
  </div>

  <div id="dialogs-root"></div>

  <script src="admin-shared.js"></script>
  <script>
  (() => {
    'use strict';

    // ═══════════════════════════════════════════
    // 狀態
    // ═══════════════════════════════════════════
    const state = {
      campaignList: [],
      currentCampaign: null,
      currentTab: 'overview',
      options: null,
      dirty: false,

      // Part 3 擴充
      currentChapter: null,       // 當前編輯的章節（含 outcomes + interludes + linked_stages）
      chapterOriginalOutcomes: [], // 用於 save 時對比刪除
      currentFlags: [],           // 當前戰役的所有旗標
      currentInterludeGroups: [], // 依章節分組的間章事件
      currentInterlude: null,     // 當前編輯的間章事件
    };

    const LS_API_KEY = 'gemini_api_key';

    // ═══════════════════════════════════════════
    // 初始化
    // ═══════════════════════════════════════════
    window.addEventListener('DOMContentLoaded', async () => {
      const userRaw = localStorage.getItem('admin_user');
      let user = null;
      try { user = userRaw ? JSON.parse(userRaw) : null; } catch {}
      if (!user || (user.role !== 'admin' && user.role !== 'owner')) {
        document.querySelector('.layout-container').innerHTML =
          '<div style="padding:3rem;text-align:center;"><h1>權限不足</h1><p>本模組僅限管理員使用。</p><p><a href="index.html">← 返回首頁</a></p></div>';
        return;
      }
      document.getElementById('current-user').textContent = user.displayName || user.username || user.email || '';
      if (typeof ADMIN_VERSION !== 'undefined') {
        document.getElementById('admin-version-tag').textContent = 'v' + ADMIN_VERSION;
      }
      updateApiKeyStatus();

      await loadOptions();
      await loadCampaignList();
      bindBeforeUnload();
      bindTabBar();
    });

    async function loadOptions() {
      try {
        const res = await fetch('data/campaign-options.json');
        state.options = await res.json();
      } catch (e) {
        console.error('無法載入 campaign-options.json', e);
        state.options = { scenario_marker_effects: {}, difficulty_presets: {}, number_marker_values: ['+1','0','-1','-2','-3','-4'], flag_categories: [] };
      }
    }

    // ═══════════════════════════════════════════
    // 戰役列表
    // ═══════════════════════════════════════════
    async function loadCampaignList() {
      try {
        const res = await adminFetch('/api/campaigns');
        const data = await res.json();
        state.campaignList = (data && data.data) || [];
        renderCampaignList();
      } catch (e) {
        showToast('載入戰役列表失敗：' + e.message, 'error');
      }
    }
    window.loadCampaignList = loadCampaignList;

    function renderCampaignList() {
      const container = document.getElementById('campaign-list');
      const search = (document.getElementById('campaign-search').value || '').toLowerCase();
      const statusFilter = document.getElementById('campaign-status-filter').value;
      const filtered = state.campaignList.filter((c) => {
        if (statusFilter && c.design_status !== statusFilter) return false;
        if (search && !(`${c.name_zh || ''} ${c.code || ''}`).toLowerCase().includes(search)) return false;
        return true;
      });
      if (filtered.length === 0) {
        container.innerHTML = '<div class="placeholder" style="padding:1.5rem;">（無符合戰役）</div>';
        return;
      }
      container.innerHTML = filtered.map((c) => `
        <div class="campaign-item ${state.currentCampaign?.id === c.id ? 'active' : ''}" onclick="selectCampaign('${c.id}')">
          <div class="ci-code">${escHtml(c.code)}</div>
          <div class="ci-name">${escHtml(c.name_zh)}</div>
          <div class="ci-meta">
            <span class="status-${c.design_status}">${statusLabel(c.design_status)}</span>
            · v${c.version} · ${c.chapter_count || 0} 章
          </div>
        </div>
      `).join('');
    }
    window.renderCampaignList = renderCampaignList;

    async function selectCampaign(id) {
      if (state.dirty && !confirm('有未儲存變更，要放棄嗎？')) return;
      try {
        const res = await adminFetch(`/api/campaigns/${id}`);
        const data = await res.json();
        if (!data.success) { showToast('載入戰役失敗', 'error'); return; }
        state.currentCampaign = data.data;
        state.dirty = false;
        state.currentChapter = null;
        document.getElementById('no-campaign-placeholder').style.display = 'none';
        document.getElementById('campaign-editor').style.display = '';
        document.getElementById('editor-title').textContent = state.currentCampaign.name_zh;
        renderCampaignList();
        await loadFlags();
        renderCurrentTab();
        updateRightPanel();
      } catch (e) {
        showToast('載入失敗：' + e.message, 'error');
      }
    }
    window.selectCampaign = selectCampaign;

    // ═══════════════════════════════════════════
    // 建立戰役對話框
    // ═══════════════════════════════════════════
    function openCreateCampaignDialog() {
      document.getElementById('dialogs-root').innerHTML = `
        <div class="dialog-backdrop"><div class="dialog-content">
          <h3>建立新戰役</h3>
          <label>戰役代碼（3-32 字元，小寫英數底線）
            <input type="text" id="new-campaign-code" placeholder="例：innsmouth_shadow">
          </label>
          <label>中文名稱
            <input type="text" id="new-campaign-name-zh" placeholder="例：印斯茅斯陰影">
          </label>
          <div class="dialog-footer">
            <button class="btn-secondary" onclick="closeDialog()">取消</button>
            <button class="btn-primary" onclick="confirmCreateCampaign()">建立</button>
          </div>
        </div></div>
      `;
      document.getElementById('new-campaign-code').focus();
    }
    window.openCreateCampaignDialog = openCreateCampaignDialog;

    function closeDialog() { document.getElementById('dialogs-root').innerHTML = ''; }
    window.closeDialog = closeDialog;

    async function confirmCreateCampaign() {
      const code = document.getElementById('new-campaign-code').value.trim();
      const name = document.getElementById('new-campaign-name-zh').value.trim();
      if (!/^[a-z0-9_]{3,32}$/.test(code)) { alert('戰役代碼格式錯誤'); return; }
      if (!name) { alert('中文名稱為必填'); return; }
      try {
        const res = await adminFetch('/api/campaigns', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, name_zh: name }),
        });
        const data = await res.json();
        if (!res.ok) { alert(data.error || '建立失敗'); return; }
        closeDialog();
        await loadCampaignList();
        await selectCampaign(data.data.id);
        showToast('戰役已建立', 'success');
      } catch (e) { alert('網路錯誤：' + e.message); }
    }
    window.confirmCreateCampaign = confirmCreateCampaign;

    // ═══════════════════════════════════════════
    // 分頁切換
    // ═══════════════════════════════════════════
    function bindTabBar() {
      document.querySelectorAll('.tab-btn').forEach((btn) => { btn.onclick = () => switchTab(btn.dataset.tab); });
    }
    function switchTab(tabName) {
      if (state.dirty && !confirm('有未儲存變更，要放棄嗎？')) return;
      state.currentTab = tabName;
      document.querySelectorAll('.tab-btn').forEach((btn) => btn.classList.toggle('active', btn.dataset.tab === tabName));
      document.querySelectorAll('.tab-content').forEach((sec) => sec.classList.toggle('active', sec.id === `tab-${tabName}`));
      renderCurrentTab();
      updateRightPanel();
    }
    window.switchTab = switchTab;

    function renderCurrentTab() {
      switch (state.currentTab) {
        case 'overview': renderOverviewTab(); break;
        case 'chapters': renderChaptersTab(); break;
        case 'flags': renderFlagsTab(); break;
        case 'interludes': renderInterludesTab(); break;
        case 'chaos-evolution': renderChaosEvolutionTab(); break;
        case 'completeness': runCompletenessCheck(); break;
      }
    }

    // ═══════════════════════════════════════════
    // 戰役總覽
    // ═══════════════════════════════════════════
    function renderOverviewTab() {
      if (!state.currentCampaign) return;
      const c = state.currentCampaign;
      document.getElementById('field-code').value = c.code;
      document.getElementById('field-name-zh').value = c.name_zh;
      document.getElementById('field-name-en').value = c.name_en || '';
      document.getElementById('field-theme').value = c.theme || '';
      document.getElementById('field-cover-narrative').value = c.cover_narrative || '';
      document.getElementById('field-difficulty-tier').value = c.difficulty_tier;
      document.getElementById('field-design-status').value = c.design_status;
      renderChaosBagEditor(c.initial_chaos_bag || {});
      renderChapterGrid(c.chapters || []);
      updateEditorHeader();
    }

    function updateEditorHeader() {
      const c = state.currentCampaign;
      if (!c) return;
      const badge = document.getElementById('editor-status-badge');
      if (state.dirty) { badge.textContent = '● 未儲存'; badge.className = 'badge-dirty'; }
      else { badge.textContent = statusLabel(c.design_status); badge.className = `status-${c.design_status}`; }
      document.getElementById('editor-version').textContent = `v${c.version}`;
    }

    // ─── 混沌袋 ───
    function renderChaosBagEditor(bag) {
      const container = document.getElementById('chaos-bag-editor');
      const nums = (bag && bag.number_markers) || {};
      const sce = (bag && bag.scenario_markers) || {};
      const myt = (bag && bag.mythos_markers) || {};
      const numVals = (state.options && state.options.number_marker_values) || ['+1','0','-1','-2','-3','-4'];

      const numHtml = numVals.map((v) => `
        <label>${v}<input type="number" min="0" max="10" value="${nums[v] ?? 0}" data-num-marker="${v}" oninput="updateBagSummary(); markDirty();"></label>
      `).join('');

      const scenarioTypes = ['skull', 'cultist', 'tablet', 'elder_thing'];
      const scenarioNames = { skull: '骷髏', cultist: '邪教徒', tablet: '石版', elder_thing: '遠古邪物' };
      const effectOpts = (state.options && state.options.scenario_marker_effects) || {};

      const sceHtml = scenarioTypes.map((k) => {
        const d = sce[k] || { count: 0, effect: '', value: -1 };
        const effects = effectOpts[k] || [];
        return `
          <div class="marker-row">
            <label>${scenarioNames[k]}<input type="number" min="0" max="6" value="${d.count || 0}" data-sce-count="${k}" oninput="updateBagSummary(); markDirty();"></label>
            <label>效果<select data-sce-effect="${k}" onchange="markDirty()">
              <option value="">（未選）</option>
              ${effects.map((e) => `<option value="${e.code}" ${d.effect === e.code ? 'selected' : ''}>${e.name_zh} — ${e.desc}</option>`).join('')}
            </select></label>
            <label>值<input type="number" value="${d.value ?? -1}" min="-5" max="5" data-sce-value="${k}" oninput="updateBagSummary(); markDirty();"></label>
          </div>
        `;
      }).join('');

      const mythosTypes = ['clue', 'headline', 'monster', 'doom', 'gate'];
      const mythosNames = { clue: '線索', headline: '頭條', monster: '怪物', doom: '毀滅', gate: '次元門' };
      const mytHtml = mythosTypes.map((k) => {
        const d = myt[k] || { count: 0, value: -1 };
        return `
          <div class="marker-row">
            <label>${mythosNames[k]}<input type="number" min="0" max="6" value="${d.count || 0}" data-myt-count="${k}" oninput="updateBagSummary(); markDirty();"></label>
            <label>值<input type="number" value="${d.value ?? -1}" min="-5" max="5" data-myt-value="${k}" oninput="updateBagSummary(); markDirty();"></label>
          </div>
        `;
      }).join('');

      container.innerHTML = `
        <div class="marker-group"><h4>數字標記</h4><div class="marker-row">${numHtml}</div></div>
        <div class="marker-group"><h4>情境標記</h4>${sceHtml}</div>
        <div class="marker-group"><h4>神話標記</h4>${mytHtml}</div>
        <div class="marker-group" style="opacity:0.7;"><h4>極端標記（固定）</h4><p style="font-size:0.75rem; color:var(--text-secondary); margin:0;">觸手 ×1、遠古印記 ×1</p></div>
      `;
      updateBagSummary();
    }

    function collectChaosBagFromForm() {
      const bag = { number_markers: {}, scenario_markers: {}, mythos_markers: {}, extreme_markers: { tentacle: 1, elder_sign: 1 }, dynamic_markers: { bless: 0, curse: 0 } };
      document.querySelectorAll('[data-num-marker]').forEach((el) => { bag.number_markers[el.dataset.numMarker] = parseInt(el.value, 10) || 0; });
      ['skull','cultist','tablet','elder_thing'].forEach((k) => {
        bag.scenario_markers[k] = {
          count: parseInt(document.querySelector(`[data-sce-count="${k}"]`)?.value, 10) || 0,
          effect: document.querySelector(`[data-sce-effect="${k}"]`)?.value || '',
          value: parseInt(document.querySelector(`[data-sce-value="${k}"]`)?.value, 10) || 0,
        };
      });
      ['clue','headline','monster','doom','gate'].forEach((k) => {
        bag.mythos_markers[k] = {
          count: parseInt(document.querySelector(`[data-myt-count="${k}"]`)?.value, 10) || 0,
          value: parseInt(document.querySelector(`[data-myt-value="${k}"]`)?.value, 10) || 0,
        };
      });
      return bag;
    }

    function applyDifficultyPreset(tier) {
      const preset = state.options?.difficulty_presets?.[tier];
      if (!preset) { showToast('找不到難度預設', 'error'); return; }
      document.getElementById('field-difficulty-tier').value = tier;
      renderChaosBagEditor({
        number_markers: preset.number_markers || {},
        scenario_markers: preset.scenario_markers || {},
        mythos_markers: preset.mythos_markers || {},
        extreme_markers: { tentacle: 1, elder_sign: 1 },
        dynamic_markers: { bless: 0, curse: 0 },
      });
      markDirty();
      showToast(`已套用「${difficultyLabel(tier)}」預設`, 'success');
    }
    window.applyDifficultyPreset = applyDifficultyPreset;

    function updateBagSummary() {
      const bag = collectChaosBagFromForm();
      let total = 2, sumValue = 0;
      for (const [v, c] of Object.entries(bag.number_markers)) { total += c; sumValue += (parseFloat(v) || 0) * c; }
      for (const k of ['skull','cultist','tablet','elder_thing']) { const d = bag.scenario_markers[k]; total += d.count; sumValue += (d.value || 0) * d.count; }
      for (const k of ['clue','headline','monster','doom','gate']) { const d = bag.mythos_markers[k]; total += d.count; sumValue += (d.value || 0) * d.count; }
      const expected = total > 0 ? (sumValue / total).toFixed(2) : '0.00';
      document.getElementById('bag-total').textContent = total;
      document.getElementById('bag-expected').textContent = expected;
    }
    window.updateBagSummary = updateBagSummary;

    // ─── 十章網格 ───
    function renderChapterGrid(chapters) {
      const grid = document.getElementById('chapter-grid');
      grid.innerHTML = chapters.map((ch) => `
        <div class="chapter-card" onclick="jumpToChapter('${ch.id}')">
          <div class="ch-num">${ch.chapter_number}</div>
          <div class="ch-code">${escHtml(ch.chapter_code)}</div>
          <div class="ch-name">${escHtml(ch.name_zh || '')}</div>
          <div class="ch-badges">
            <span class="status-${ch.design_status}">${statusLabel(ch.design_status)}</span>
            <span>結果 ${ch.outcome_count || 0}</span>
            <span>事件 ${ch.interlude_count || 0}</span>
          </div>
        </div>
      `).join('');
    }

    function jumpToChapter(chapterId) {
      switchTab('chapters');
      setTimeout(() => selectChapter(chapterId), 50);
    }
    window.jumpToChapter = jumpToChapter;

    async function saveCampaign() {
      if (!state.currentCampaign) return;
      const payload = {
        name_zh: document.getElementById('field-name-zh').value.trim(),
        name_en: document.getElementById('field-name-en').value.trim(),
        theme: document.getElementById('field-theme').value.trim(),
        cover_narrative: document.getElementById('field-cover-narrative').value,
        difficulty_tier: document.getElementById('field-difficulty-tier').value,
        design_status: document.getElementById('field-design-status').value,
        initial_chaos_bag: collectChaosBagFromForm(),
      };
      if (!payload.name_zh) { showToast('中文名稱不可為空', 'error'); return; }
      try {
        const res = await adminFetch(`/api/campaigns/${state.currentCampaign.id}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) { showToast('儲存失敗：' + (data.error || '未知'), 'error'); return; }
        Object.assign(state.currentCampaign, data.data);
        state.dirty = false;
        await loadCampaignList();
        updateEditorHeader();
        updateRightPanel();
        showToast('已儲存', 'success');
      } catch (e) { showToast('網路錯誤：' + e.message, 'error'); }
    }
    window.saveCampaign = saveCampaign;

    // ═══════════════════════════════════════════
    // Part 3：章節編輯
    // ═══════════════════════════════════════════
    function renderChaptersTab() {
      if (!state.currentCampaign) return;
      renderChapterNav();
      if (state.currentChapter) renderChapterEditor();
    }

    function renderChapterNav() {
      const nav = document.getElementById('chapter-nav');
      nav.innerHTML = (state.currentCampaign.chapters || []).map((ch) => `
        <button class="chapter-tab-btn ${state.currentChapter?.id === ch.id ? 'active' : ''}" onclick="selectChapter('${ch.id}')">
          <span><span class="ch-num-s">${ch.chapter_number}.</span> ${escHtml(ch.name_zh || ch.chapter_code)}</span>
          <span class="status-${ch.design_status}" style="font-size:0.6rem;">${statusLabel(ch.design_status)[0]}</span>
        </button>
      `).join('');
    }

    async function selectChapter(chapterId) {
      if (state.dirty && !confirm('有未儲存變更，要放棄嗎？')) return;
      try {
        const res = await adminFetch(`/api/chapters/${chapterId}`);
        const data = await res.json();
        if (!data.success) { showToast('載入章節失敗', 'error'); return; }
        state.currentChapter = data.data;
        state.chapterOriginalOutcomes = JSON.parse(JSON.stringify(data.data.outcomes || []));
        state.dirty = false;
        renderChapterNav();
        renderChapterEditor();
      } catch (e) { showToast('載入章節失敗：' + e.message, 'error'); }
    }
    window.selectChapter = selectChapter;

    function renderChapterEditor() {
      const ch = state.currentChapter;
      if (!ch) return;
      const container = document.getElementById('chapter-editor-container');

      const nextChapterOpts = (state.currentCampaign.chapters || [])
        .filter((c) => c.chapter_number > ch.chapter_number)
        .map((c) => `<option value="${escAttr(c.chapter_code)}">${escHtml(c.chapter_code)} - ${escHtml(c.name_zh)}</option>`).join('');

      const outcomesHtml = ['A','B','C','D','E'].map((code) => {
        const o = (ch.outcomes || []).find((x) => x.outcome_code === code);
        const enabled = !!o;
        return `
          <div class="outcome-slot ${enabled ? 'enabled' : 'disabled'}" data-outcome-code="${code}">
            <div class="outcome-header">
              <h4>結果 ${code}</h4>
              <label style="font-size:0.75rem; color:var(--text-secondary);">
                <input type="checkbox" ${enabled ? 'checked' : ''} onchange="toggleOutcome('${code}', this.checked)"> 啟用
              </label>
            </div>
            ${enabled ? `
              <div class="outcome-body">
                <label>判定條件
                  <div class="cond-editor" data-outcome-cond="${code}">${renderSimpleCondEditor(o.condition_expression)}</div>
                </label>
                <label>敘事文字
                  <textarea rows="3" data-outcome-narrative="${code}" oninput="markDirty()">${escHtml(o.narrative_text || '')}</textarea>
                  <button class="btn-secondary btn-small" type="button" onclick="aiGenerateOutcomeNarrative('${code}')">AI 生成</button>
                </label>
                <div class="form-row">
                  <label>下一章指向
                    <select data-outcome-next="${code}" onchange="markDirty()">
                      <option value="">（終局/不指向）</option>
                      ${nextChapterOpts.replace(new RegExp(`value="${escAttr(o.next_chapter_version || '')}"`), `value="${escAttr(o.next_chapter_version || '')}" selected`)}
                    </select>
                  </label>
                  <label>經驗值獎勵
                    <input type="number" min="0" max="10" value="${(o.rewards && o.rewards.xp) || 0}" data-outcome-xp="${code}" oninput="markDirty()">
                  </label>
                </div>
                <label>授予旗標
                  <div class="flag-chips" data-outcome-flags="${code}">${renderFlagChips(o.flag_sets)}</div>
                  <button class="btn-secondary btn-small" type="button" onclick="openFlagPicker('outcome-${code}')">＋ 加入旗標</button>
                </label>
                <label>混沌袋演變（JSON 陣列，格式 [{op,marker,count}]）
                  <textarea rows="3" data-outcome-changes="${code}" oninput="markDirty()">${escHtml(JSON.stringify(o.chaos_bag_changes || [], null, 2))}</textarea>
                </label>
              </div>
            ` : '<div style="color:var(--text-tertiary); font-size:0.8rem;">（此結果槽已停用）</div>'}
          </div>
        `;
      }).join('');

      container.innerHTML = `
        <div class="editor-section">
          <h3>基礎資料</h3>
          <div class="form-row">
            <label>章節縮寫<input type="text" id="ch-code" value="${escAttr(ch.chapter_code)}" maxlength="16" oninput="markDirty()"></label>
            <label>設計狀態
              <select id="ch-design-status" onchange="markDirty()">
                <option value="draft" ${ch.design_status === 'draft' ? 'selected' : ''}>草稿</option>
                <option value="review" ${ch.design_status === 'review' ? 'selected' : ''}>審核中</option>
                <option value="published" ${ch.design_status === 'published' ? 'selected' : ''}>已發佈</option>
              </select>
            </label>
          </div>
          <div class="form-row">
            <label>中文名稱<input type="text" id="ch-name-zh" value="${escAttr(ch.name_zh || '')}" oninput="markDirty()"></label>
            <label>英文名稱<input type="text" id="ch-name-en" value="${escAttr(ch.name_en || '')}" oninput="markDirty()"></label>
          </div>
        </div>
        <div class="editor-section">
          <h3>劇情演示</h3>
          <label>演示文字
            <textarea id="ch-narrative-intro" rows="6" oninput="markDirty()">${escHtml(ch.narrative_intro || '')}</textarea>
            <button class="btn-secondary btn-small" type="button" onclick="aiGenerateNarrativeIntro()">AI 生成</button>
          </label>
        </div>
        <div class="editor-section">
          <h3>結果分支（A–E，至少啟用 2 槽）</h3>
          <div class="outcome-slots">${outcomesHtml}</div>
        </div>
        <div class="editor-section">
          <h3>掛載的關卡（MOD-07 建立）</h3>
          ${(ch.linked_stages || []).length === 0
            ? '<p style="font-size:0.8rem; color:var(--text-tertiary); margin:0;">（尚無關卡掛載於本章）</p>'
            : `<ul>${ch.linked_stages.map((s) => `<li><code>${escHtml(s.code)}</code> — ${escHtml(s.name_zh || '')} <span class="status-${s.design_status}">${statusLabel(s.design_status)}</span></li>`).join('')}</ul>`}
        </div>
        <div class="editor-footer">
          <button class="btn-primary" onclick="saveChapter()">儲存章節</button>
        </div>
      `;
      updateEditorHeader();
    }

    function toggleOutcome(code, enabled) {
      if (!state.currentChapter) return;
      const list = state.currentChapter.outcomes || [];
      if (enabled) {
        list.push({
          outcome_code: code, condition_expression: {}, narrative_text: '',
          next_chapter_version: null, chaos_bag_changes: [], rewards: {}, flag_sets: [],
        });
      } else {
        state.currentChapter.outcomes = list.filter((o) => o.outcome_code !== code);
      }
      state.currentChapter.outcomes = state.currentChapter.outcomes || list;
      markDirty();
      renderChapterEditor();
    }
    window.toggleOutcome = toggleOutcome;

    function collectOutcomesFromForm() {
      if (!state.currentChapter) return [];
      const collected = [];
      (state.currentChapter.outcomes || []).forEach((o) => {
        const code = o.outcome_code;
        const narrativeEl = document.querySelector(`[data-outcome-narrative="${code}"]`);
        const nextEl = document.querySelector(`[data-outcome-next="${code}"]`);
        const xpEl = document.querySelector(`[data-outcome-xp="${code}"]`);
        const changesEl = document.querySelector(`[data-outcome-changes="${code}"]`);
        const condEl = document.querySelector(`[data-outcome-cond="${code}"]`);
        const flagsEl = document.querySelector(`[data-outcome-flags="${code}"]`);
        let chaos = [];
        try { chaos = JSON.parse(changesEl?.value || '[]'); } catch {}
        collected.push({
          id: o.id,
          outcome_code: code,
          condition_expression: collectSimpleCondFromEditor(condEl),
          narrative_text: narrativeEl?.value || '',
          next_chapter_version: nextEl?.value || null,
          chaos_bag_changes: chaos,
          rewards: { xp: parseInt(xpEl?.value, 10) || 0 },
          flag_sets: collectFlagChipsFromContainer(flagsEl),
        });
      });
      return collected;
    }

    async function saveChapter() {
      if (!state.currentChapter) return;
      const ch = state.currentChapter;
      const chapterPayload = {
        chapter_code: document.getElementById('ch-code').value.trim(),
        name_zh: document.getElementById('ch-name-zh').value.trim(),
        name_en: document.getElementById('ch-name-en').value.trim(),
        narrative_intro: document.getElementById('ch-narrative-intro').value,
        narrative_choices: [],
        design_status: document.getElementById('ch-design-status').value,
      };

      try {
        const chRes = await adminFetch(`/api/chapters/${ch.id}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(chapterPayload),
        });
        const chData = await chRes.json();
        if (!chRes.ok) { showToast('儲存章節失敗：' + (chData.error || '未知'), 'error'); return; }

        // 比對 outcomes：刪除原有但現在不在的、POST 新的、PUT 已有 id 的
        const collected = collectOutcomesFromForm();
        const origIds = state.chapterOriginalOutcomes.map((o) => o.id);
        const currIds = collected.filter((o) => o.id).map((o) => o.id);
        const toDelete = origIds.filter((id) => !currIds.includes(id));
        for (const id of toDelete) await adminFetch(`/api/outcomes/${id}`, { method: 'DELETE' });
        for (const o of collected) {
          if (o.id) {
            const r = await adminFetch(`/api/outcomes/${o.id}`, {
              method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(o),
            });
            if (!r.ok) { const d = await r.json(); showToast(`結果 ${o.outcome_code} 儲存失敗：${d.error || '未知'}`, 'error'); }
          } else {
            const r = await adminFetch(`/api/chapters/${ch.id}/outcomes`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(o),
            });
            if (!r.ok) { const d = await r.json(); showToast(`結果 ${o.outcome_code} 建立失敗：${d.error || '未知'}`, 'error'); }
          }
        }

        // 重新載入章節
        await selectChapter(ch.id);
        // 重載戰役詳情更新 outcome_count
        const cRes = await adminFetch(`/api/campaigns/${state.currentCampaign.id}`);
        const cData = await cRes.json();
        if (cData.success) state.currentCampaign = cData.data;
        await loadCampaignList();
        showToast('章節已儲存', 'success');
      } catch (e) { showToast('網路錯誤：' + e.message, 'error'); }
    }
    window.saveChapter = saveChapter;

    // ─── 條件表達式編輯器（簡化版：flat AND + 多列） ───
    const COND_TYPES = [
      { type: 'flag_set', label: '旗標已設定' },
      { type: 'flag_not_set', label: '旗標未設定' },
      { type: 'flag_equals', label: '旗標值等於' },
      { type: 'act_progress_gte', label: '目標進度 ≥' },
      { type: 'agenda_progress_gte', label: '議案進度 ≥' },
    ];

    function renderSimpleCondEditor(expr) {
      let rows = [];
      if (expr && expr.type === 'and' && Array.isArray(expr.conditions)) rows = expr.conditions;
      else if (expr && expr.type) rows = [expr];
      return `
        <div class="cond-group-type">類型：<b>AND</b>（所有條件皆需成立；如需 OR 請加入多個 AND 群組的變體）</div>
        <div class="cond-rows">${rows.map(renderCondRow).join('')}</div>
        <button class="btn-secondary btn-small" type="button" onclick="addCondRow(this)">＋ 加入條件</button>
      `;
    }

    function renderCondRow(row) {
      const t = row.type || 'flag_set';
      const flagCode = row.flag_code || '';
      const value = row.value !== undefined ? row.value : '';
      const flagOpts = state.currentFlags.map((f) => `<option value="${escAttr(f.flag_code)}" ${f.flag_code === flagCode ? 'selected' : ''}>${escHtml(f.flag_code)}</option>`).join('');
      return `
        <div class="cond-row" data-cond-row>
          <select data-cond-type onchange="onCondTypeChange(this)">
            ${COND_TYPES.map((c) => `<option value="${c.type}" ${c.type === t ? 'selected' : ''}>${c.label}</option>`).join('')}
          </select>
          <div data-cond-params>
            ${renderCondParams(t, flagCode, value, flagOpts)}
          </div>
          <button class="btn-danger btn-small" type="button" onclick="removeCondRow(this)">✕</button>
        </div>
      `;
    }

    function renderCondParams(type, flagCode, value, flagOpts) {
      if (type === 'flag_set' || type === 'flag_not_set') {
        return `<select data-cond-flag>${flagOpts || '<option value="">（無旗標）</option>'}</select>`;
      }
      if (type === 'flag_equals') {
        return `<select data-cond-flag>${flagOpts || '<option value="">（無旗標）</option>'}</select>
                <input type="text" data-cond-value value="${escAttr(value)}" placeholder="值" style="width:5rem; margin-left:0.3rem;">`;
      }
      // progress gte
      return `<input type="number" data-cond-value value="${value || 0}" min="0" max="10" style="width:4rem;">`;
    }

    function onCondTypeChange(sel) {
      const row = sel.closest('[data-cond-row]');
      const paramsEl = row.querySelector('[data-cond-params]');
      const flagOpts = state.currentFlags.map((f) => `<option value="${escAttr(f.flag_code)}">${escHtml(f.flag_code)}</option>`).join('');
      paramsEl.innerHTML = renderCondParams(sel.value, '', '', flagOpts);
      markDirty();
    }
    window.onCondTypeChange = onCondTypeChange;

    function addCondRow(btn) {
      const rowsEl = btn.parentElement.querySelector('.cond-rows');
      const flagOpts = state.currentFlags.map((f) => `<option value="${escAttr(f.flag_code)}">${escHtml(f.flag_code)}</option>`).join('');
      const div = document.createElement('div');
      div.innerHTML = renderCondRow({ type: 'flag_set' });
      rowsEl.appendChild(div.firstElementChild);
      markDirty();
    }
    window.addCondRow = addCondRow;

    function removeCondRow(btn) {
      btn.closest('[data-cond-row]').remove();
      markDirty();
    }
    window.removeCondRow = removeCondRow;

    function collectSimpleCondFromEditor(container) {
      if (!container) return {};
      const rows = [...container.querySelectorAll('[data-cond-row]')].map((row) => {
        const type = row.querySelector('[data-cond-type]').value;
        const flagEl = row.querySelector('[data-cond-flag]');
        const valueEl = row.querySelector('[data-cond-value]');
        if (type === 'flag_set' || type === 'flag_not_set') {
          return { type, flag_code: flagEl?.value || '' };
        }
        if (type === 'flag_equals') {
          return { type, flag_code: flagEl?.value || '', value: valueEl?.value || '' };
        }
        return { type, value: parseInt(valueEl?.value, 10) || 0 };
      }).filter((r) => r.type !== 'flag_set' || r.flag_code);
      if (rows.length === 0) return {};
      if (rows.length === 1) return rows[0];
      return { type: 'and', conditions: rows };
    }

    // ─── 旗標 chips（小元件） ───
    function renderFlagChips(flagSets) {
      const codes = (flagSets || []).map((f) => typeof f === 'string' ? f : f.flag_code).filter(Boolean);
      return codes.map((c) => `<span class="flag-chip" data-flag-code="${escAttr(c)}"><code>${escHtml(c)}</code><button type="button" onclick="removeFlagChipFromContainer(this)">×</button></span>`).join('');
    }

    function collectFlagChipsFromContainer(container) {
      if (!container) return [];
      return [...container.querySelectorAll('[data-flag-code]')].map((el) => ({ flag_code: el.dataset.flagCode, value: true }));
    }

    function removeFlagChipFromContainer(btn) {
      btn.closest('[data-flag-code]').remove();
      markDirty();
    }
    window.removeFlagChipFromContainer = removeFlagChipFromContainer;

    // 選旗標對話框（共用）
    let flagPickerTargetKey = null;
    function openFlagPicker(targetKey) {
      flagPickerTargetKey = targetKey;
      if (state.currentFlags.length === 0) {
        alert('目前戰役尚未有任何旗標。請先到「旗標字典」新增。');
        return;
      }
      document.getElementById('dialogs-root').innerHTML = `
        <div class="dialog-backdrop"><div class="dialog-content">
          <h3>選擇旗標</h3>
          <div style="max-height:320px; overflow-y:auto; background:var(--bg-primary); padding:0.5rem; border:1px solid var(--border); border-radius:4px;">
            ${state.currentFlags.map((f) => `
              <label style="display:block; padding:0.25rem; font-size:0.8rem;">
                <input type="checkbox" value="${escAttr(f.flag_code)}"> <code style="font-family:'JetBrains Mono',monospace;">${escHtml(f.flag_code)}</code>
                <span style="color:var(--text-tertiary); font-size:0.7rem;">${escHtml(f.description_zh || '')}</span>
              </label>
            `).join('')}
          </div>
          <div class="dialog-footer">
            <button class="btn-secondary" onclick="closeDialog()">取消</button>
            <button class="btn-primary" onclick="confirmFlagPicker()">加入</button>
          </div>
        </div></div>
      `;
    }
    window.openFlagPicker = openFlagPicker;

    function confirmFlagPicker() {
      const checked = [...document.querySelectorAll('.dialog-content input[type=checkbox]:checked')].map((el) => el.value);
      let containerEl = null;
      if (flagPickerTargetKey && flagPickerTargetKey.startsWith('outcome-')) {
        const code = flagPickerTargetKey.replace('outcome-', '');
        containerEl = document.querySelector(`[data-outcome-flags="${code}"]`);
      }
      if (containerEl) {
        const existing = new Set(collectFlagChipsFromContainer(containerEl).map((f) => f.flag_code));
        for (const c of checked) {
          if (existing.has(c)) continue;
          const span = document.createElement('span');
          span.className = 'flag-chip';
          span.dataset.flagCode = c;
          span.innerHTML = `<code>${escHtml(c)}</code><button type="button" onclick="removeFlagChipFromContainer(this)">×</button>`;
          containerEl.appendChild(span);
        }
        markDirty();
      }
      closeDialog();
    }
    window.confirmFlagPicker = confirmFlagPicker;

    // ═══════════════════════════════════════════
    // Part 3：旗標字典
    // ═══════════════════════════════════════════
    async function loadFlags() {
      if (!state.currentCampaign) { state.currentFlags = []; return; }
      try {
        const res = await adminFetch(`/api/campaigns/${state.currentCampaign.id}/flags`);
        const data = await res.json();
        state.currentFlags = (data && data.data) || [];
      } catch (e) { console.error(e); state.currentFlags = []; }
    }

    function renderFlagsTab() {
      // 填類別下拉
      const catFilter = document.getElementById('flag-category-filter');
      if (catFilter.children.length === 1) {
        (state.options?.flag_categories || []).forEach((cat) => {
          const opt = document.createElement('option');
          opt.value = cat.code; opt.textContent = cat.name_zh;
          catFilter.appendChild(opt);
        });
      }
      renderFlagsList();
    }

    function renderFlagsList() {
      const search = (document.getElementById('flag-search').value || '').toLowerCase();
      const cat = document.getElementById('flag-category-filter').value;
      const filtered = state.currentFlags.filter((f) => {
        if (search && !f.flag_code.toLowerCase().includes(search)) return false;
        if (cat && f.category !== cat) return false;
        return true;
      });
      const tbody = document.getElementById('flags-tbody');
      tbody.innerHTML = filtered.map((f) => `
        <tr>
