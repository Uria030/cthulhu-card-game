    // ═══════════════════════════════════════════
    // Part 3：混沌袋演變
    // ═══════════════════════════════════════════
    function renderChaosEvolutionTab() {
      if (!state.currentCampaign) return;
      renderEvolutionMatrix();
      runSimulation();
    }

    function renderEvolutionMatrix() {
      const tbody = document.getElementById('evolution-matrix-body');
      const chapters = state.currentCampaign.chapters || [];
      tbody.innerHTML = chapters.map((ch) => `
        <tr>
          <td>第 ${ch.chapter_number} 章</td>
          ${['A','B','C','D','E'].map((code) => {
            const o = (ch.outcomes || []).find((x) => x.outcome_code === code);
            if (!o) return '<td class="empty">—</td>';
            return `<td>${renderChangeSummary(o.chaos_bag_changes)}</td>`;
          }).join('')}
        </tr>
      `).join('');
    }

    function renderChangeSummary(changes) {
      if (!Array.isArray(changes) || changes.length === 0) return '—';
      return changes.map((c) => `${c.op === 'add' ? '+' : '−'}${c.count} ${escHtml(c.marker)}`).join('<br>');
    }

    function runSimulation() {
      if (!state.currentCampaign) return;
      const mode = document.getElementById('sim-path-mode').value;
      const chapters = state.currentCampaign.chapters || [];
      let allChanges = [];
      for (const ch of chapters) {
        const outcomes = ch.outcomes || [];
        if (outcomes.length === 0) continue;
        if (mode === 'best') {
          const o = outcomes.find((x) => x.outcome_code === 'A') || outcomes[0];
          allChanges.push(...(o.chaos_bag_changes || []));
        } else if (mode === 'worst') {
          const o = outcomes[outcomes.length - 1];
          allChanges.push(...(o.chaos_bag_changes || []));
        } else {
          // average：取所有變化、次數按 1/N 縮放（simplified）
          outcomes.forEach((o) => {
            (o.chaos_bag_changes || []).forEach((c) => {
              allChanges.push({ ...c, count: Math.max(1, Math.round((c.count || 1) / outcomes.length)) });
            });
          });
        }
      }
      const bag = JSON.parse(JSON.stringify(state.currentCampaign.initial_chaos_bag || {}));
      applyAllChanges(bag, allChanges);
      renderSimResult(bag);
    }
    window.runSimulation = runSimulation;

    function applyAllChanges(bag, changes) {
      for (const c of changes) {
        let group = null;
        if (['skull','cultist','tablet','elder_thing'].includes(c.marker)) group = bag.scenario_markers;
        else if (['clue','headline','monster','doom','gate'].includes(c.marker)) group = bag.mythos_markers;
        else if (['bless','curse'].includes(c.marker)) group = bag.dynamic_markers;
        if (!group) continue;
        if (group[c.marker] == null) group[c.marker] = typeof group[c.marker] === 'object' ? { count: 0 } : 0;
        if (typeof group[c.marker] === 'object') {
          group[c.marker].count = Math.max(0, (group[c.marker].count || 0) + (c.op === 'add' ? c.count : -c.count));
        } else {
          group[c.marker] = Math.max(0, group[c.marker] + (c.op === 'add' ? c.count : -c.count));
        }
      }
    }

    function renderSimResult(bag) {
      const el = document.getElementById('sim-result-display');
      let total = 2, sum = 0;
      for (const [v, n] of Object.entries(bag.number_markers || {})) { total += n; sum += (parseFloat(v) || 0) * n; }
      for (const k of ['skull','cultist','tablet','elder_thing']) {
        const d = bag.scenario_markers?.[k] || { count: 0, value: 0 };
        total += d.count; sum += (d.value || 0) * d.count;
      }
      for (const k of ['clue','headline','monster','doom','gate']) {
        const d = bag.mythos_markers?.[k] || { count: 0, value: 0 };
        total += d.count; sum += (d.value || 0) * d.count;
      }
      const exp = total > 0 ? (sum / total).toFixed(2) : '0.00';
      el.innerHTML = `
        <div><b>總標記：</b>${total}</div>
        <div><b>期望值：</b>${exp}</div>
        <div style="margin-top:0.5rem; color:var(--text-tertiary); font-size:0.72rem;">（依據所選路徑套用所有章節的演變規則到初始混沌袋）</div>
      `;
    }

    // ═══════════════════════════════════════════
    // Part 4：完整性檢查
    // ═══════════════════════════════════════════
    async function runCompletenessCheck() {
      if (!state.currentCampaign) return;
      await loadFlags();
      // 重載章節（含 outcomes）
      const cRes = await adminFetch(`/api/campaigns/${state.currentCampaign.id}`);
      const cData = await cRes.json();
      if (cData.success) state.currentCampaign = cData.data;
      // 各章節的 outcomes 需要逐章讀
      await Promise.all(state.currentCampaign.chapters.map(async (ch) => {
        const r = await adminFetch(`/api/chapters/${ch.id}`);
        const d = await r.json();
        if (d.success) {
          ch.outcomes = d.data.outcomes || [];
          ch.interlude_events = d.data.interlude_events || [];
          ch.linked_stages = d.data.linked_stages || [];
        }
      }));

      const report = {
        campaign: checkCampaignLevel(),
        chapters: checkAllChapters(),
        structure: checkStructuralIntegrity(),
        flags: checkFlagsIntegrity(),
      };
      renderCompletenessReport(report);
    }
    window.runCompletenessCheck = runCompletenessCheck;

    function checkCampaignLevel() {
      const c = state.currentCampaign;
      return [
        { pass: !!c.name_zh, label: '中文名稱已填寫' },
        { pass: (c.cover_narrative || '').length >= 50, label: '封面敘事已撰寫（至少 50 字）' },
        { pass: (c.chapters || []).length === 10, label: '十章骨架齊備' },
      ];
    }

    function checkAllChapters() {
      return (state.currentCampaign.chapters || []).map((ch) => {
        const checks = [
          { pass: !!ch.name_zh, label: '章節名稱已填' },
          { pass: (ch.narrative_intro || '').length >= 30, label: '劇情演示（至少 30 字）' },
          { pass: (ch.outcomes || []).length >= 2, label: '至少 2 種結果分支' },
          { pass: (ch.outcomes || []).every((o) => (o.narrative_text || '').length > 10), label: '每個結果有敘事' },
        ];
        if (ch.chapter_number === 10) {
          checks.push({ pass: (ch.outcomes || []).every((o) => o.next_chapter_version == null), label: '終局章節不指向下一章' });
        } else {
          checks.push({ pass: (ch.outcomes || []).every((o) => !!o.next_chapter_version), label: '每個結果都有下一章指向' });
        }
        return { chapter: ch, checks, overallPass: checks.every((c) => c.pass) };
      });
    }

    function checkStructuralIntegrity() {
      const broken = [];
      for (const ch of state.currentCampaign.chapters || []) {
        if (ch.chapter_number === 10) continue;
        const nextCodes = new Set((state.currentCampaign.chapters || []).map((c) => c.chapter_code));
        for (const o of (ch.outcomes || [])) {
          if (o.next_chapter_version && !nextCodes.has(o.next_chapter_version)) {
            broken.push(`第 ${ch.chapter_number} 章 結果 ${o.outcome_code} → ${o.next_chapter_version}`);
          }
        }
      }
      return [{
        pass: broken.length === 0,
        label: '章節結果指向無斷裂',
        details: broken.length ? `斷裂項：${broken.slice(0, 5).join(', ')}` : null,
      }];
    }

    function checkFlagsIntegrity() {
      const referenced = new Set();
      const collectFrom = (expr) => {
        if (!expr || typeof expr !== 'object') return;
        if (expr.flag_code) referenced.add(expr.flag_code);
        if (Array.isArray(expr.conditions)) expr.conditions.forEach(collectFrom);
      };
      for (const ch of state.currentCampaign.chapters || []) {
        for (const o of (ch.outcomes || [])) {
          collectFrom(o.condition_expression);
          (o.flag_sets || []).forEach((f) => { const c = typeof f === 'string' ? f : f.flag_code; if (c) referenced.add(c); });
        }
        for (const i of (ch.interlude_events || [])) {
          collectFrom(i.trigger_condition);
          (i.operations || []).forEach((op) => { if (op?.params?.flag_code) referenced.add(op.params.flag_code); });
        }
      }
      const defined = new Set(state.currentFlags.map((f) => f.flag_code));
      const orphaned = [...defined].filter((c) => !referenced.has(c));
      const dangling = [...referenced].filter((c) => !defined.has(c));
      return [
        { pass: orphaned.length === 0, label: '無孤立旗標（定義未引用）', details: orphaned.length ? `${orphaned.slice(0, 5).join(', ')}${orphaned.length > 5 ? '…' : ''}` : null },
        { pass: dangling.length === 0, label: '無懸空引用（引用未定義）', details: dangling.length ? `${dangling.slice(0, 5).join(', ')}${dangling.length > 5 ? '…' : ''}` : null },
      ];
    }

    function renderCompletenessReport(report) {
      const allChecks = [...report.campaign, ...report.chapters.flatMap((c) => c.checks), ...report.structure, ...report.flags];
      const allPass = allChecks.every((c) => c.pass);
      const badge = document.getElementById('overall-badge');
      const message = document.getElementById('overall-message');
      if (allPass) { badge.innerHTML = '<span class="status-ok">✓ 可發佈</span>'; message.textContent = '所有檢查通過。'; }
      else { badge.innerHTML = '<span class="status-fail">✗ 尚未就緒</span>'; message.textContent = '以下項目未通過檢查，請先修正。'; }
      renderCheckList('checks-campaign', report.campaign);
      renderCheckList('checks-structure', report.structure);
      renderCheckList('checks-flags', report.flags);
      const chaptersEl = document.getElementById('checks-chapters');
      chaptersEl.innerHTML = report.chapters.map((item) => `
        <details ${item.overallPass ? '' : 'open'} style="margin-bottom:0.4rem;">
          <summary style="cursor:pointer; padding:0.3rem 0;"><span class="${item.overallPass ? 'status-published' : 'status-draft'}" style="margin-right:0.4rem;">${item.overallPass ? '✓' : '✗'}</span>第 ${item.chapter.chapter_number} 章 · ${escHtml(item.chapter.name_zh || item.chapter.chapter_code)}</summary>
          <ul>${item.checks.map((c) => `<li class="${c.pass ? 'pass' : 'fail'}"><span class="indicator">${c.pass ? '✓' : '✗'}</span>${escHtml(c.label)}${c.details ? `<div class="detail">${escHtml(c.details)}</div>` : ''}</li>`).join('')}</ul>
        </details>
      `).join('');
    }

    function renderCheckList(containerId, checks) {
      document.getElementById(containerId).innerHTML = checks.map((c) => `
        <li class="${c.pass ? 'pass' : 'fail'}"><span class="indicator">${c.pass ? '✓' : '✗'}</span>${escHtml(c.label)}${c.details ? `<div class="detail">${escHtml(c.details)}</div>` : ''}</li>
      `).join('');
    }

    // ═══════════════════════════════════════════
    // Part 4：AI 整合（Gemini 2.5 Flash 前端直連）
    // ═══════════════════════════════════════════
    function getGeminiKey() { return localStorage.getItem(LS_API_KEY) || ''; }
    function promptApiKey() {
      const k = prompt('請輸入 Gemini API Key（儲存在瀏覽器本機，與 MOD-01 共用）：', getGeminiKey());
      if (k !== null) { localStorage.setItem(LS_API_KEY, k.trim()); updateApiKeyStatus(); }
    }
    window.promptApiKey = promptApiKey;

    function updateApiKeyStatus() {
      const el = document.getElementById('ai-key-status');
      if (!el) return;
      const has = !!getGeminiKey();
      el.textContent = has ? '🔑 API Key 已設' : '⚠ API Key 未設';
      el.classList.toggle('set', has);
    }
    window.updateApiKeyStatus = updateApiKeyStatus;

    const CTHULHU_SYSTEM = `你是一個克蘇魯神話背景的卡牌合作冒險遊戲的敘事設計助手。
專案特色：
- 背景：1920–30 年代偵探黑色電影 × 宇宙恐怖
- 情感基調：渺小感、未知的不安、真實的代價、探索的驚奇
- 敘事風格：簡潔克制、重氛圍、避免過度血腥、保留想像空間
- 術語規範：克蘇魯神話專有名詞採用台灣 TRPG/桌遊社群慣用譯名（克蘇魯/奈亞拉托提普/印斯茅斯/敦威治/阿卡姆）
設計紅線：
- 不使用網路用語
- 不寫成恐怖片誇張式的血腥
- 不讓角色「無敵」或「樂觀」，保持克蘇魯宿命感
- 傷亡與代價要真實、有重量`;

    async function callGemini(userPrompt, opts = {}) {
      const key = getGeminiKey();
      if (!key) { alert('請先設定 Gemini API Key'); promptApiKey(); throw new Error('no_key'); }
      const model = opts.model || 'gemini-2.5-flash';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
      const body = {
        contents: [{ role: 'user', parts: [{ text: CTHULHU_SYSTEM + '\n\n' + userPrompt }] }],
        generationConfig: { temperature: opts.temperature ?? 0.9, topP: 0.95, maxOutputTokens: 2048 },
      };
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) { throw new Error('Gemini API 錯誤 ' + res.status); }
      const data = await res.json();
      return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }

    function extractJson(text) {
      const cleaned = text.replace(/```json\s*/gi, '').replace(/```\s*$/g, '').trim();
      try { return JSON.parse(cleaned); } catch {
        const m = cleaned.match(/\{[\s\S]*\}/);
        if (m) { try { return JSON.parse(m[0]); } catch {} }
        throw new Error('AI 回應無法解析為 JSON');
      }
    }

    async function aiGenerateCoverNarrative() {
      const c = state.currentCampaign; if (!c) return;
      const p = `請為以下戰役撰寫封面敘事。
戰役名稱：${c.name_zh}
主題：${c.theme || '(未設定)'}
難度：${difficultyLabel(c.difficulty_tier)}
章節數：10 章

要求：
1. 300-500 字中文敘事，第二人稱視角
2. 營造調查員收到線索/邀請/信件的開場氛圍
3. 提示神話威脅但不明示真相
4. 最後以開放性問句或未明結尾收束
5. 同時產出英文翻譯

回應格式（嚴格 JSON）：{"narrative_zh":"...","narrative_en":"..."}`;
      try {
        const text = await callGemini(p);
        const j = extractJson(text);
        if (j.narrative_zh) { document.getElementById('field-cover-narrative').value = j.narrative_zh; markDirty(); showToast('封面敘事已生成', 'success'); }
      } catch (e) { showToast('AI 生成失敗：' + e.message, 'error'); }
    }
    window.aiGenerateCoverNarrative = aiGenerateCoverNarrative;

    async function aiGenerateNarrativeIntro() {
      const ch = state.currentChapter, c = state.currentCampaign; if (!ch || !c) return;
      const p = `請為以下章節撰寫劇情演示。
戰役：${c.name_zh}
本章：第 ${ch.chapter_number} 章 ${ch.name_zh || ch.chapter_code}
要求：
1. 演示文字 200-400 字，第二人稱視角
2. 營造場景、氛圍、情感鋪墊
3. 僅回傳中文演示文字，不要 JSON 包裝`;
      try {
        const text = await callGemini(p);
        document.getElementById('ch-narrative-intro').value = text.trim();
        markDirty(); showToast('劇情演示已生成', 'success');
      } catch (e) { showToast('AI 生成失敗：' + e.message, 'error'); }
    }
    window.aiGenerateNarrativeIntro = aiGenerateNarrativeIntro;

    async function aiGenerateOutcomeNarrative(code) {
      const ch = state.currentChapter; if (!ch) return;
      const contexts = {
        A: '完美成功（目標達成、關鍵旗標保留）',
        B: '帶代價的成功',
        C: '失敗（目標未達成，議案推進）',
        D: '災難級失敗',
        E: '隱藏路線/特殊結果',
      };
      const p = `請為以下章節結果撰寫結算敘事。
戰役：${state.currentCampaign.name_zh}
章節：第 ${ch.chapter_number} 章
結果代碼：${code}
結果含義：${contexts[code]}
要求：100-200 字中文敘事，帶情緒衝擊，與結果基調一致。僅回傳敘事文字。`;
      try {
        const text = await callGemini(p);
        const ta = document.querySelector(`[data-outcome-narrative="${code}"]`);
        if (ta) { ta.value = text.trim(); markDirty(); showToast('結果敘事已生成', 'success'); }
      } catch (e) { showToast('AI 生成失敗：' + e.message, 'error'); }
    }
    window.aiGenerateOutcomeNarrative = aiGenerateOutcomeNarrative;

    async function aiGenerateInterludeNarrative() {
      const e = state.currentInterlude, c = state.currentCampaign; if (!e || !c) return;
      const chapterEl = document.getElementById('iv-chapter');
      const chapter = (c.chapters || []).find((ch) => ch.id === chapterEl.value);
      const ip = document.getElementById('iv-insertion-point').value;
      const p = `請為以下間章事件撰寫敘事。
戰役：${c.name_zh}
章節：第 ${chapter?.chapter_number ?? '?'} 章 ${chapter?.name_zh || ''}
插入點：${ip === 'prologue' ? '章首（長休息後）' : '章末（關卡結束後）'}
要求：
1. 中文敘事 150-300 字
2. 銜接前後章節
3. 同時產出英文翻譯
回應格式（嚴格 JSON）：{"narrative_zh":"...","narrative_en":"..."}`;
      try {
        const text = await callGemini(p);
        const j = extractJson(text);
        if (j.narrative_zh) document.getElementById('iv-narrative-zh').value = j.narrative_zh;
        if (j.narrative_en) document.getElementById('iv-narrative-en').value = j.narrative_en;
        markDirty(); showToast('間章敘事已生成', 'success');
      } catch (err) { showToast('AI 生成失敗：' + err.message, 'error'); }
    }
    window.aiGenerateInterludeNarrative = aiGenerateInterludeNarrative;

    async function aiGenerateFlagDescription() {
      const cat = document.getElementById('fdlg-category').value;
      const ch = document.getElementById('fdlg-chapter').value;
      const suffix = document.getElementById('fdlg-suffix').value.trim();
      const code = `${cat}.${ch ? ch + '_' : ''}${suffix}`;
      if (!suffix) { alert('請先輸入旗標代碼後半部'); return; }
      const p = `請為以下旗標撰寫一句中文描述（15-40 字）。
旗標代碼：${code}
類別：${cat}
所屬章節：${ch || '戰役全域'}
要求：描述該旗標所記錄的遊戲狀態，使用設計師視角語氣。僅回傳描述文字。`;
      try {
        const text = await callGemini(p);
        document.getElementById('fdlg-desc').value = text.trim();
        showToast('旗標描述已生成', 'success');
      } catch (e) { showToast('AI 生成失敗：' + e.message, 'error'); }
    }
    window.aiGenerateFlagDescription = aiGenerateFlagDescription;

    async function aiTranslate(srcId, dstId) {
      const src = document.getElementById(srcId);
      const dst = document.getElementById(dstId);
      if (!src || !dst) return;
      const text = src.value.trim();
      if (!text) { showToast('請先填寫中文內容', 'warn'); return; }
      const p = `請將以下繁體中文翻譯為英文（Lovecraftian 風格，專有名詞保留英文原名）：\n\n${text}\n\n僅回傳英文翻譯，不加說明。`;
      try {
        const out = await callGemini(p, { temperature: 0.3 });
        dst.value = out.trim(); markDirty(); showToast('翻譯完成', 'success');
      } catch (e) { showToast('AI 翻譯失敗：' + e.message, 'error'); }
    }
    window.aiTranslate = aiTranslate;

    // ═══════════════════════════════════════════
    // Part 4：匯出 / 匯入
    // ═══════════════════════════════════════════
    async function exportCampaignJSON() {
      if (!state.currentCampaign) { showToast('請先選擇戰役', 'warn'); return; }
      try {
        const res = await adminFetch(`/api/campaigns/${state.currentCampaign.id}/export`);
        const data = await res.json();
        if (!res.ok) { alert('匯出失敗：' + (data.error || '')); return; }
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `campaign_${state.currentCampaign.code}_v${state.currentCampaign.version}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('已匯出 JSON 檔', 'success');
      } catch (e) { alert('網路錯誤：' + e.message); }
    }
    window.exportCampaignJSON = exportCampaignJSON;

    async function importCampaignJSON(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data.campaign?.code) { alert('檔案格式不正確'); return; }
        if (!confirm(`將匯入戰役「${data.campaign.name_zh}」（代碼 ${data.campaign.code}）。若代碼已存在將覆蓋，確定繼續？`)) return;
        const res = await adminFetch('/api/campaigns/import', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const r = await res.json();
        if (!res.ok) { alert('匯入失敗：' + (r.error || '')); return; }
        await loadCampaignList();
        showToast('戰役已匯入', 'success');
      } catch (e) { alert('匯入失敗：' + e.message); }
      finally { event.target.value = ''; }
    }
    window.importCampaignJSON = importCampaignJSON;

    // ═══════════════════════════════════════════
    // 右欄預覽
    // ═══════════════════════════════════════════
    function updateRightPanel() {
      const el = document.getElementById('preview-content');
      if (!state.currentCampaign) { el.innerHTML = '<p class="placeholder" style="padding:1.5rem;">選擇戰役後顯示預覽</p>'; return; }
      if (state.currentTab === 'overview') {
        const c = state.currentCampaign;
        const chMini = (c.chapters || []).map((ch) => `<div class="mini-ch status-${ch.design_status}" title="第 ${ch.chapter_number} 章 ${escHtml(ch.name_zh || '')}">${ch.chapter_number}</div>`).join('');
        el.innerHTML = `
          <div class="preview-card">
            <h3>${escHtml(c.name_zh)}</h3>
            <p class="theme">${escHtml(c.theme || '—')}</p>
            <div><span class="status-${c.design_status}">${statusLabel(c.design_status)}</span> · <b>${difficultyLabel(c.difficulty_tier)}</b> · v${c.version}</div>
            <p class="cover-narrative">${escHtml(c.cover_narrative || '(尚未撰寫)')}</p>
            <h4>十章進度</h4><div class="chapter-mini-grid">${chMini}</div>
          </div>
        `;
      } else {
        el.innerHTML = '<p class="placeholder" style="padding:1.5rem;">此分頁暫無預覽</p>';
      }
    }

    // ═══════════════════════════════════════════
    // 工具函式
    // ═══════════════════════════════════════════
    function markDirty() { state.dirty = true; updateEditorHeader(); }
    window.markDirty = markDirty;
    function bindBeforeUnload() { window.addEventListener('beforeunload', (e) => { if (state.dirty) { e.preventDefault(); e.returnValue = ''; } }); }
    function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
    function escAttr(s) { return escHtml(s); }
    function statusLabel(s) { return { draft:'草稿', review:'審核中', published:'已發佈' }[s] || s; }
    function difficultyLabel(s) { return { easy:'簡單', standard:'標準', hard:'困難', expert:'專家' }[s] || s; }
    function categoryLabel(s) {
      const c = (state.options?.flag_categories || []).find((x) => x.code === s);
      return c ? c.name_zh : s;
    }
    function visibilityLabel(s) { return { visible:'可見', conditional:'視設計', hidden:'永遠隱藏' }[s] || s; }

    let toastTimer = null;
    function showToast(msg, type = 'success') {
      const old = document.querySelector('.toast'); if (old) old.remove();
      const d = document.createElement('div'); d.className = `toast ${type}`; d.textContent = msg;
      document.body.appendChild(d); clearTimeout(toastTimer);
      toastTimer = setTimeout(() => d.remove(), 3200);
    }
    window.showToast = showToast;
  })();
  </script>
