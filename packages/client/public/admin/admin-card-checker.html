<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>卡片檢查器 — MOD-14</title>
  <link rel="stylesheet" href="admin-shared.css" />
  <style>
    .checker-container { padding: 1rem; max-width: 1400px; margin: 0 auto; }
    .checker-header h1 { margin: 0 0 0.25rem 0; font-size: 1.3rem; }
    .checker-header p { margin: 0; font-size: 0.8rem; color: var(--text-secondary); }

    .summary-row {
      display: flex; gap: 1rem; flex-wrap: wrap;
      padding: 0.75rem; background: var(--bg-secondary);
      border: 1px solid var(--border); border-radius: 4px;
      margin: 0.75rem 0; font-size: 0.85rem;
    }
    .summary-row .stat { display: flex; gap: 0.4rem; align-items: center; }
    .summary-row .stat strong { font-size: 1.1rem; }
    .stat.severity-error strong { color: #ff6a6a; }
    .stat.severity-warn strong { color: #ffd666; }
    .stat.severity-info strong { color: #6ab0ff; }
    .stat.healthy strong { color: #6aff8a; }

    .toolbar {
      display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;
      padding: 0.5rem 0; margin-bottom: 0.5rem; font-size: 0.8rem;
    }
    .toolbar select, .toolbar input {
      padding: 4px 6px; font-size: 0.8rem;
      background: #1a1a1a; color: var(--text-primary);
      border: 1px solid #333; border-radius: 3px;
    }
    .toolbar button {
      padding: 5px 10px; background: #3a5f7f; color: #fff;
      border: none; border-radius: 3px; cursor: pointer; font-size: 0.8rem;
    }
    .toolbar button:hover { background: #4a7598; }
    .toolbar button.danger { background: #6f3a3a; }
    .toolbar button.danger:hover { background: #8f4a4a; }

    .card-row {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: 4px;
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
    }
    .card-row.has-error { border-left-color: #ff6a6a; }
    .card-row.has-warn { border-left-color: #ffd666; }
    .card-row.has-info { border-left-color: #6ab0ff; }
    .card-row.healthy { border-left-color: #6aff8a; opacity: 0.6; }

    .card-row .head {
      display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.3rem;
    }
    .card-row .code {
      font-family: monospace; color: var(--text-tertiary);
      font-size: 0.7rem; min-width: 75px;
    }
    .card-row .name { flex: 1; font-weight: 600; font-size: 0.85rem; }
    .card-row .meta { color: var(--text-tertiary); font-size: 0.7rem; }
    .card-row .actions { display: flex; gap: 4px; }
    .card-row .actions button {
      padding: 2px 8px; font-size: 0.7rem;
      background: #3a5f7f; color: #fff;
      border: none; border-radius: 3px; cursor: pointer;
    }
    .card-row .actions button:hover { background: #4a7598; }
    .card-row .actions button.fix { background: #4a7f4a; }
    .card-row .actions button.fix:hover { background: #5a9f5a; }

    .issue-list { margin: 0; padding: 0 0 0 1.2rem; font-size: 0.75rem; }
    .issue-list li { margin: 2px 0; }
    .issue-list .sev-error { color: #ff8a8a; }
    .issue-list .sev-warn { color: #ffd666; }
    .issue-list .sev-info { color: #6ab0ff; }

    .empty-msg {
      padding: 2rem; text-align: center; color: var(--text-tertiary);
      background: var(--bg-secondary); border-radius: 4px;
    }
    .card-row .actions button.ai {
      background: #6f4a8a;
    }
    .card-row .actions button.ai:hover { background: #8a5fa8; }

    /* AI result modal */
    .ai-modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
    }
    .ai-modal {
      background: var(--bg-primary, #1a1a1a); border: 1px solid var(--border, #333);
      border-radius: 6px; padding: 1.25rem; max-width: 800px; width: 90vw;
      max-height: 85vh; overflow-y: auto; font-size: 0.85rem;
    }
    .ai-modal h2 { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
    .ai-modal pre {
      background: #111; border: 1px solid #333; border-radius: 4px;
      padding: 0.5rem; font-size: 0.75rem; overflow-x: auto; white-space: pre-wrap;
    }
    .ai-modal .actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .ai-modal .actions button {
      padding: 6px 12px; border: none; border-radius: 3px;
      cursor: pointer; font-size: 0.8rem;
    }
    .ai-modal button.apply { background: #4a7f4a; color: #fff; }
    .ai-modal button.apply:hover { background: #5a9f5a; }
    .ai-modal button.close { background: #555; color: #fff; }
    .ai-modal button.close:hover { background: #777; }

    .restructure-badge {
      display: inline-block; padding: 1px 6px; border-radius: 8px;
      font-size: 0.65rem; margin-left: 4px; line-height: 1.4;
    }
    .restructure-badge.done { background: #2a4f2a; color: #9aff9a; border: 1px solid #4a7f4a; }
    .restructure-badge.pending { background: #3f3f1a; color: #d8c87a; border: 1px solid #6a6a3a; }
    .toolbar button.ai-batch { background: #6f4a8a; }
    .toolbar button.ai-batch:hover { background: #8a5fa8; }
</style>
</head>
<body>
  <nav class="admin-nav">
    <a href="index.html" class="nav-back">← 返回首頁</a>
    <span class="nav-title">卡片檢查器</span>
    <span class="nav-code">MOD-14</span>
    <span style="flex:1;"></span>
    <button id="apiKeyBtn" onclick="window.promptGeminiApiKeyDialog && window.promptGeminiApiKeyDialog();" style="padding:4px 10px;background:#3a5f7f;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:0.78rem;">🔑 API Key</button>
  </nav>

  <div class="checker-container">
    <div class="checker-header">
      <h1>卡片檢查器</h1>
      <p>對全 DB 卡片做 L1+L2 健檢:術語白名單 / s06 文法 / 軸向一致性 / 武器風格 / 數值同步 / ő 亂碼 / slot-type 一致 / 主軸群組規模 / 平衡公式。</p>
    </div>

    <div class="summary-row" id="summaryRow">
      <div class="stat">載入中…</div>
    </div>

    <div class="toolbar">
      <label>嚴重度:
        <select id="filterSeverity">
          <option value="">全部</option>
          <option value="error">🔴 嚴重</option>
          <option value="warn">🟡 警告</option>
          <option value="info">🔵 提示</option>
          <option value="healthy">✅ 健康</option>
        </select>
      </label>
      <label>陣營:<select id="filterFaction"><option value="">全部</option></select></label>
      <label>結構化:
        <select id="filterRestructure">
          <option value="">全部</option>
          <option value="pending">⚪ 未結構化</option>
          <option value="done">✓ 已結構化</option>
        </select>
      </label>
      <label>搜尋:<input type="text" id="filterText" placeholder="卡名或代碼" /></label>
      <button id="btnRescan">🔄 重新掃描</button>
      <span style="flex:1;"></span>
      <button class="ai-batch" id="btnBatchRestructurePending">🤖 批次結構化 desc(僅未處理)</button>
      <button class="ai-batch" id="btnBatchRestructureAll">🤖 批次結構化 desc(全部重做)</button>
      <button id="btnClearRestructureLog" style="background:#555;">🗑 清除結構化記錄</button>
      <button class="danger" id="btnFixAllQuotes">⚡ 批次去除書名號(name_zh + axis_value)</button>
      <button class="danger" id="btnFixAllPollution">⚡ 批次修 ő 亂碼</button>
      <button class="danger" id="btnFixAllOrphan">⚡ 批次修 orphan 軸 → faction</button>
    </div>

    <div id="cardList"></div>
  </div>

  <script src="admin-shared.js"></script>
  <script src="admin-ai-tasks/geminiDirectClient.js"></script>
  <script src="admin-card-ai-tools.js"></script>
  <script>
  (() => {
    'use strict';

    const userRaw = localStorage.getItem('admin_user');
    let user = null;
    try { user = userRaw ? JSON.parse(userRaw) : null; } catch { user = null; }
    if (!user || (user.role !== 'admin' && user.role !== 'owner')) {
      document.querySelector('.checker-container').innerHTML =
        '<div style="padding:2rem;text-align:center;"><h1>權限不足</h1><p>本模組僅限管理員。</p><p><a href="index.html">← 返回首頁</a></p></div>';
      return;
    }

    const state = {
      cards: [],
      results: [],
      axisGroupSizes: new Map(),
      filterSeverity: '',
      filterFaction: '',
      filterText: '',
      filterRestructure: '',
      restructureLog: loadRestructureLog(),
    };

    const RESTRUCTURE_LOG_KEY = 'mod14_restructured_log';
    function loadRestructureLog() {
      try {
        const raw = localStorage.getItem(RESTRUCTURE_LOG_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }
    function saveRestructureLog() {
      try { localStorage.setItem(RESTRUCTURE_LOG_KEY, JSON.stringify(state.restructureLog)); }
      catch (e) { console.warn('saveRestructureLog 失敗', e); }
    }
    function markRestructured(id, mode) {
      state.restructureLog[id] = { at: new Date().toISOString(), mode: mode || 'single' };
      saveRestructureLog();
    }
    function isRestructured(id) {
      return !!state.restructureLog[id];
    }
    function clearRestructureLog() {
      state.restructureLog = {};
      saveRestructureLog();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function loadCards() {
      try {
        const res = await window.adminFetch('/api/cards');
        const payload = await res.json();
        if (!payload || !payload.success) {
          document.getElementById('summaryRow').innerHTML = '<div style="color:#ff6a6a;">載入失敗</div>';
          return;
        }
        state.cards = payload.data || [];
        buildAxisGroupSizes();
        runAllValidations();
        renderAll();
      } catch (e) {
        document.getElementById('summaryRow').innerHTML = '<div style="color:#ff6a6a;">載入例外:' + escapeHtml(e.message || String(e)) + '</div>';
      }
    }

    function buildAxisGroupSizes() {
      const m = new Map();
      for (const c of state.cards) {
        if (c.primary_axis_layer !== 'card_name') continue;
        const v = String(c.primary_axis_value || '').replace(/[『』「」"'“”‘’]/g, '').trim();
        if (!v) continue;
        m.set(v, (m.get(v) || 0) + 1);
      }
      state.axisGroupSizes = m;
    }

    function runAllValidations() {
      state.results = state.cards.map(c => {
        const issues = window.runAllCardValidators(c, { axisGroupSizes: state.axisGroupSizes });
        let topSeverity = null;
        for (const it of issues) {
          if (it.severity === 'error') { topSeverity = 'error'; break; }
          if (it.severity === 'warn' && topSeverity !== 'error') topSeverity = 'warn';
          if (it.severity === 'info' && !topSeverity) topSeverity = 'info';
        }
        return { card: c, issues, topSeverity };
      });
    }

    function renderSummary() {
      const total = state.results.length;
      const err = state.results.filter(r => r.topSeverity === 'error').length;
      const warn = state.results.filter(r => r.topSeverity === 'warn').length;
      const info = state.results.filter(r => r.topSeverity === 'info').length;
      const healthy = state.results.filter(r => !r.topSeverity).length;
      const done = state.results.filter(r => isRestructured(r.card.id)).length;
      const pending = total - done;
      document.getElementById('summaryRow').innerHTML =
        '<div class="stat">卡總數 <strong>' + total + '</strong></div>' +
        '<div class="stat severity-error">🔴 嚴重 <strong>' + err + '</strong></div>' +
        '<div class="stat severity-warn">🟡 警告 <strong>' + warn + '</strong></div>' +
        '<div class="stat severity-info">🔵 提示 <strong>' + info + '</strong></div>' +
        '<div class="stat healthy">✅ 健康 <strong>' + healthy + '</strong></div>' +
        '<div class="stat" style="color:#9aff9a;">✓ 已結構化 <strong>' + done + '</strong></div>' +
        '<div class="stat" style="color:#d8c87a;">⚪ 未結構化 <strong>' + pending + '</strong></div>';
    }

    function renderFactions() {
      const set = new Set();
      for (const c of state.cards) if (c.faction) set.add(c.faction);
      const sel = document.getElementById('filterFaction');
      const cur = sel.value;
      sel.innerHTML = '<option value="">全部</option>' + [...set].sort().map(f => '<option value="' + f + '">' + f + '</option>').join('');
      sel.value = cur;
    }

    function matches(r) {
      if (state.filterSeverity === 'healthy' && r.topSeverity) return false;
      if (state.filterSeverity && state.filterSeverity !== 'healthy' && r.topSeverity !== state.filterSeverity) return false;
      if (state.filterFaction && r.card.faction !== state.filterFaction) return false;
      if (state.filterRestructure === 'done' && !isRestructured(r.card.id)) return false;
      if (state.filterRestructure === 'pending' && isRestructured(r.card.id)) return false;
      if (state.filterText) {
        const q = state.filterText.toLowerCase();
        const text = ((r.card.code || '') + ' ' + (r.card.name_zh || '') + ' ' + (r.card.name_en || '')).toLowerCase();
        if (!text.includes(q)) return false;
      }
      return true;
    }

    function renderList() {
      // 排序:error → warn → info → healthy
      const order = { error: 0, warn: 1, info: 2 };
      const sorted = [...state.results].sort((a, b) => {
        const oa = a.topSeverity ? order[a.topSeverity] : 9;
        const ob = b.topSeverity ? order[b.topSeverity] : 9;
        return oa - ob;
      });
      const filtered = sorted.filter(matches);
      const out = [];
      if (filtered.length === 0) {
        out.push('<div class="empty-msg">沒有符合條件的卡片</div>');
      }
      for (const r of filtered) {
        const c = r.card;
        const sevClass = r.topSeverity ? 'has-' + r.topSeverity : 'healthy';
        const fixableCount = r.issues.filter(i => i.fixable).length;
        const issueListHtml = r.issues.length === 0
          ? '<li style="color:var(--text-tertiary);">無問題</li>'
          : r.issues.map(i => '<li class="sev-' + i.severity + '">[' + i.code + '] ' + escapeHtml(i.message) + (i.fixable ? ' <span style="color:#6aff8a;">●可修</span>' : '') + '</li>').join('');
        out.push(
          '<div class="card-row ' + sevClass + '">' +
            '<div class="head">' +
              '<span class="code">' + escapeHtml(c.code || '?') + '</span>' +
              '<span class="name">' + escapeHtml(c.name_zh || '(無名)') + '</span>' +
              '<span class="meta">F=' + (c.faction || '?') + (c.card_type ? ' · ' + c.card_type : '') + (((c.starting_xp ?? c.level) != null) ? ' · ★' + (c.starting_xp ?? c.level) : '') + '</span>' +
              (isRestructured(c.id)
                ? '<span class="restructure-badge done" title="已結構化於 ' + escapeHtml(state.restructureLog[c.id].at) + '">✓ 已結構化</span>'
                : '<span class="restructure-badge pending">⚪ 未結構化</span>') +
              '<div class="actions">' +
                (fixableCount > 0 ? '<button class="fix" data-id="' + c.id + '">⚡ 一鍵修 ' + fixableCount + ' 項</button>' : '') +
                '<button class="ai" data-ai-restructure="' + c.id + '">🤖 結構化 desc</button>' +
                '<button class="ai" data-ai-value="' + c.id + '">🤖 估 V 值</button>' +
                '<button class="ai" data-ai-combo="' + c.id + '">🤖 評 COMBO</button>' +
                '<button data-jump="' + c.id + '">→ MOD-01</button>' +
              '</div>' +
            '</div>' +
            (r.issues.length > 0 ? '<ul class="issue-list">' + issueListHtml + '</ul>' : '') +
          '</div>'
        );
      }
      const listEl = document.getElementById('cardList');
      listEl.innerHTML = out.join('');
      listEl.querySelectorAll('button[data-jump]').forEach(btn => {
        btn.addEventListener('click', () => { window.location.href = 'admin-card-designer.html#card=' + btn.dataset.jump; });
      });
      listEl.querySelectorAll('button.fix').forEach(btn => {
        btn.addEventListener('click', () => window.withButtonLoading(btn, () => fixOneCard(btn.dataset.id), { loadingText: '修復中' }));
      });
      listEl.querySelectorAll('button[data-ai-restructure]').forEach(btn => {
        btn.addEventListener('click', () => window.withButtonLoading(btn, () => aiRestructure(btn.dataset.aiRestructure), { loadingText: 'AI 結構化中' }));
      });
      listEl.querySelectorAll('button[data-ai-value]').forEach(btn => {
        btn.addEventListener('click', () => window.withButtonLoading(btn, () => aiEstimateValue(btn.dataset.aiValue), { loadingText: 'AI 估 V 值中' }));
      });
      listEl.querySelectorAll('button[data-ai-combo]').forEach(btn => {
        btn.addEventListener('click', () => window.withButtonLoading(btn, () => aiScoreCombo(btn.dataset.aiCombo), { loadingText: 'AI 評 COMBO 中' }));
      });
    }

    // ─── AI 動作 ──────────────────
    function showModal(title, bodyHtml, actions) {
      const bg = document.createElement('div');
      bg.className = 'ai-modal-bg';
      bg.innerHTML = '<div class="ai-modal"><h2>' + title + '</h2>' + bodyHtml + '<div class="actions" id="aiModalActions"></div></div>';
      document.body.appendChild(bg);
      const actsEl = bg.querySelector('#aiModalActions');
      (actions || []).forEach(a => {
        const b = document.createElement('button');
        b.className = a.cls || 'close';
        b.textContent = a.label;
        b.onclick = async () => {
          const keep = a.handler ? await a.handler() : false;
          if (!keep) document.body.removeChild(bg);
        };
        actsEl.appendChild(b);
      });
      // Always have a close button
      if (!(actions || []).find(a => a.cls === 'close')) {
        const b = document.createElement('button');
        b.className = 'close';
        b.textContent = '關閉';
        b.onclick = () => document.body.removeChild(bg);
        actsEl.appendChild(b);
      }
      bg.addEventListener('click', e => { if (e.target === bg) document.body.removeChild(bg); });
    }

    async function aiRestructure(id) {
      const r = state.results.find(x => x.card.id === id);
      if (!r) return;
      if (typeof window.ensureGeminiApiKey === 'function' && !window.ensureGeminiApiKey()) return;
      if (!confirm('將送 desc_zh + 現有 effects[] 給 Gemini,讓 AI 反向結構化。可能需要幾秒。確定?')) return;
      try {
        const result = await window.aiRestructureEffects(r.card);
        const newEffects = result.effects;
        showModal('🤖 AI 結構化結果',
          '<p style="color:var(--text-secondary);font-size:0.8rem;">' + escapeHtml(result.changed_summary || '') + '</p>' +
          '<p style="font-size:0.75rem;">建議的新 effects[] 陣列(共 ' + newEffects.length + ' 條):</p>' +
          '<pre>' + escapeHtml(JSON.stringify(newEffects, null, 2)) + '</pre>',
          [
            { label: '✓ 套用並 PUT', cls: 'apply', handler: async () => {
              const updated = { ...r.card, effects: newEffects };
              try {
                const res = await window.adminFetch('/api/cards/' + id, { method: 'PUT', body: JSON.stringify(updated) });
                const p = await res.json();
                if (!res.ok || !p.success) { alert('PUT 失敗:' + (p.error || res.status)); return false; }
                markRestructured(id, 'single');
                await loadCards();
                return false; // close modal
              } catch (e) { alert('PUT 例外:' + (e.message || e)); return true; }
            } },
          ]);
      } catch (e) {
        alert('AI 結構化失敗:' + (e.message || String(e)));
      }
    }

    async function aiEstimateValue(id) {
      const r = state.results.find(x => x.card.id === id);
      if (!r) return;
      if (typeof window.ensureGeminiApiKey === 'function' && !window.ensureGeminiApiKey()) return;
      try {
        const result = await window.aiEstimateCardValue(r.card);
        const breakdownHtml = (result.breakdown || []).map(b => '<li>' + escapeHtml(b.effect_summary) + ' → <strong>' + b.v + 'V</strong> · <span style="color:var(--text-secondary);">' + escapeHtml(b.reason || '') + '</span></li>').join('');
        showModal('🤖 AI V 值重估 ' + escapeHtml(r.card.name_zh || ''),
          '<p>真實總 V 值: <strong style="font-size:1.2rem;color:#6aff8a;">' + result.estimated_total_v + 'V</strong></p>' +
          '<p>建議費用: <strong>' + result.suggested_cost + '</strong>(目前 cost=' + (r.card.cost ?? '?') + ')</p>' +
          '<p>稀有度: ' + escapeHtml(result.calculated_rarity || '') + '</p>' +
          '<p style="color:#ffd666;">📊 ' + escapeHtml(result.balance_diagnosis || '') + '</p>' +
          '<p style="font-size:0.8rem;font-weight:600;margin-top:0.75rem;">效果價值拆解:</p>' +
          '<ul style="font-size:0.8rem;">' + breakdownHtml + '</ul>' +
          (result.notes ? '<p style="font-size:0.75rem;color:var(--text-tertiary);margin-top:0.5rem;">📝 ' + escapeHtml(result.notes) + '</p>' : '')
        );
      } catch (e) {
        alert('AI 估 V 值失敗:' + (e.message || String(e)));
      }
    }

    async function aiScoreCombo(id) {
      const r = state.results.find(x => x.card.id === id);
      if (!r) return;
      if (typeof window.ensureGeminiApiKey === 'function' && !window.ensureGeminiApiKey()) return;
      // 抓同軸 context
      const same = state.cards.filter(c =>
        c.id !== id &&
        c.primary_axis_layer === r.card.primary_axis_layer &&
        String(c.primary_axis_value || '').replace(/[『』「」"'“”‘’]/g, '').trim() === String(r.card.primary_axis_value || '').replace(/[『』「」"'“”‘’]/g, '').trim()
      );
      try {
        const result = await window.aiScoreCardCombo(r.card, same);
        const color = result.combo_score >= 7 ? '#6aff8a' : result.combo_score >= 4 ? '#ffd666' : '#ff8a8a';
        showModal('🤖 COMBO 評分 ' + escapeHtml(r.card.name_zh || ''),
          '<p style="font-size:1.5rem;color:' + color + ';"><strong>' + result.combo_score + ' / 10</strong>' + (result.pattern ? ' · Pattern ' + result.pattern : '') + '</p>' +
          '<p>同軸對照組:' + same.length + ' 張</p>' +
          '<p style="font-size:0.85rem;font-weight:600;">為何給這個分:</p>' +
          '<p style="font-size:0.8rem;">' + escapeHtml(result.why) + '</p>' +
          '<p style="font-size:0.85rem;font-weight:600;margin-top:0.75rem;">改寫建議:</p>' +
          '<p style="font-size:0.8rem;color:#ffd666;">' + escapeHtml(result.suggestion) + '</p>'
        );
      } catch (e) {
        alert('AI 評 COMBO 失敗:' + (e.message || String(e)));
      }
    }

    async function fixOneCard(id) {
      const r = state.results.find(x => x.card.id === id);
      if (!r) return;
      let card = r.card;
      const fixed = [];
      // 套用所有 fixable 修復
      for (const issue of r.issues) {
        if (!issue.fixable) continue;
        if (issue.code === 'axis_value_has_quotes') { card = window.fixAxisValueQuotes(card); fixed.push('去除 axis_value 書名號'); }
        else if (issue.code === 'name_zh_has_quotes') { card = window.fixNameZhQuotes(card); fixed.push('去除 name_zh 書名號'); }
        else if (issue.code === 'o_pollution') { card = window.fixOPollution(card); fixed.push('修 ő 亂碼'); }
        else if (issue.code === 'slot_type_mismatch' || issue.code === 'arcane_slot_required') { card = window.fixSlotByType(card); fixed.push('修 slot'); }
        else if (issue.code === 'card_name_axis_orphan') { card = window.fixOrphanCardNameAxis(card); fixed.push('orphan card_name 軸降為 faction'); }
      }
      if (fixed.length === 0) { alert('無可自動修復項'); return; }
      if (!confirm('將套用以下修復到此卡並 PUT 回 DB:\n· ' + fixed.join('\n· ') + '\n\n確定?')) return;
      try {
        const res = await window.adminFetch('/api/cards/' + id, { method: 'PUT', body: JSON.stringify(card) });
        const payload = await res.json();
        if (!res.ok || !payload.success) {
          alert('修復失敗:' + (payload.error || res.status));
          return;
        }
        await loadCards();
        alert('✓ 修復完成');
      } catch (e) {
        alert('修復例外:' + (e.message || String(e)));
      }
    }

    async function batchAiRestructure(includeProcessed, setProgress) {
      if (typeof window.ensureGeminiApiKey === 'function' && !window.ensureGeminiApiKey()) return;
      const targets = state.cards.filter(c => includeProcessed || !isRestructured(c.id));
      if (targets.length === 0) {
        alert(includeProcessed ? '目前沒有任何卡片' : '所有卡片都已結構化過。如要全部重做請按「批次結構化 desc(全部重做)」。');
        return;
      }
      const skippedCount = state.cards.length - targets.length;
      const msg = '將對 ' + targets.length + ' 張卡呼叫 Gemini 結構化 desc 並 PUT 回 DB' +
        (skippedCount > 0 ? '(已跳過 ' + skippedCount + ' 張已結構化的)' : '') + '。\n\n' +
        '⚠ 注意:\n' +
        '· 每張卡需呼叫一次 Gemini,預估每張 3-6 秒,總計約 ' + Math.ceil(targets.length * 5 / 60) + ' 分鐘\n' +
        '· 中途請保持頁面開啟,不要切走\n' +
        '· 失敗的卡會記錄但不阻擋其他卡片\n\n確定?';
      if (!confirm(msg)) return;
      let ok = 0, fail = 0;
      const failedCards = [];
      for (let i = 0; i < targets.length; i++) {
        const card = targets[i];
        if (setProgress) setProgress(i + 1, targets.length);
        try {
          const result = await window.aiRestructureEffects(card);
          if (!result || !Array.isArray(result.effects)) {
            fail++;
            failedCards.push((card.code || card.id) + '(AI 回傳非陣列)');
            continue;
          }
          const updated = { ...card, effects: result.effects };
          const res = await window.adminFetch('/api/cards/' + card.id, { method: 'PUT', body: JSON.stringify(updated) });
          const p = await res.json();
          if (res.ok && p.success) {
            markRestructured(card.id, 'batch');
            ok++;
          } else {
            fail++;
            failedCards.push((card.code || card.id) + '(PUT ' + (p.error || res.status) + ')');
          }
        } catch (e) {
          fail++;
          failedCards.push((card.code || card.id) + '(' + (e.message || e) + ')');
        }
        // 簡單節流避免 Gemini rate limit(免費層 15 RPM 約等於每 4 秒一次,但 2.5-flash quota 較高,這裡用 600ms 緩衝)
        await new Promise(r => setTimeout(r, 600));
      }
      const failMsg = failedCards.length > 0 ? '\n\n失敗清單(前 10 個):\n' + failedCards.slice(0, 10).join('\n') : '';
      alert('批次結構化完成\n· 成功:' + ok + '\n· 失敗:' + fail + failMsg);
      await loadCards();
    }

    async function fixAllByCode(targetCodes, label, setProgress) {
      // targetCodes 可為 string 或 string[];以「任一 code 命中且 fixable」為篩選條件
      const codes = Array.isArray(targetCodes) ? targetCodes : [targetCodes];
      const targets = state.results.filter(r => r.issues.some(i => codes.includes(i.code) && i.fixable));
      if (targets.length === 0) { alert('沒有需要修的卡片'); return; }
      if (!confirm('將對 ' + targets.length + ' 張卡套用「' + label + '」並逐張 PUT 回 DB(可能需要幾秒)。\n\n確定?')) return;
      let ok = 0, fail = 0;
      for (let i = 0; i < targets.length; i++) {
        const r = targets[i];
        if (setProgress) setProgress(i + 1, targets.length);
        let card = r.card;
        for (const issue of r.issues) {
          if (!codes.includes(issue.code) || !issue.fixable) continue;
          if (issue.code === 'axis_value_has_quotes') card = window.fixAxisValueQuotes(card);
          else if (issue.code === 'name_zh_has_quotes') card = window.fixNameZhQuotes(card);
          else if (issue.code === 'o_pollution') card = window.fixOPollution(card);
          else if (issue.code === 'card_name_axis_orphan') card = window.fixOrphanCardNameAxis(card);
        }
        try {
          const res = await window.adminFetch('/api/cards/' + r.card.id, { method: 'PUT', body: JSON.stringify(card) });
          const payload = await res.json();
          if (res.ok && payload.success) ok++; else fail++;
        } catch { fail++; }
      }
      alert('完成:成功 ' + ok + '、失敗 ' + fail);
      await loadCards();
    }

    function renderAll() {
      renderSummary();
      renderFactions();
      renderList();
    }

    document.getElementById('filterSeverity').addEventListener('change', e => { state.filterSeverity = e.target.value; renderList(); });
    document.getElementById('filterFaction').addEventListener('change', e => { state.filterFaction = e.target.value; renderList(); });
    document.getElementById('filterRestructure').addEventListener('change', e => { state.filterRestructure = e.target.value; renderList(); });
    document.getElementById('filterText').addEventListener('input', e => { state.filterText = e.target.value.trim(); renderList(); });
    document.getElementById('btnRescan').addEventListener('click', (ev) => window.withButtonLoading(ev.currentTarget, loadCards, { loadingText: '掃描中' }));
    document.getElementById('btnBatchRestructurePending').addEventListener('click', (ev) => window.withButtonLoading(ev.currentTarget, (sp) => batchAiRestructure(false, sp), { loadingText: 'AI 批次結構化', showProgress: true }));
    document.getElementById('btnBatchRestructureAll').addEventListener('click', (ev) => window.withButtonLoading(ev.currentTarget, (sp) => batchAiRestructure(true, sp), { loadingText: 'AI 批次結構化', showProgress: true }));
    document.getElementById('btnClearRestructureLog').addEventListener('click', () => {
      const total = Object.keys(state.restructureLog).length;
      if (total === 0) { alert('目前沒有結構化記錄'); return; }
      if (!confirm('將清除 ' + total + ' 張卡片的結構化記錄(只清本地紀錄,不影響 DB 資料)。確定?')) return;
      clearRestructureLog();
      renderList();
      alert('已清除');
    });
    document.getElementById('btnFixAllQuotes').addEventListener('click', (ev) => window.withButtonLoading(ev.currentTarget, (sp) => fixAllByCode(['axis_value_has_quotes', 'name_zh_has_quotes'], '去除 name_zh + axis_value 書名號', sp), { loadingText: '批次修復', showProgress: true }));
    document.getElementById('btnFixAllPollution').addEventListener('click', (ev) => window.withButtonLoading(ev.currentTarget, (sp) => fixAllByCode('o_pollution', '修 ő 亂碼還原為阿拉伯數字', sp), { loadingText: '批次修復', showProgress: true }));
    document.getElementById('btnFixAllOrphan').addEventListener('click', (ev) => window.withButtonLoading(ev.currentTarget, (sp) => fixAllByCode('card_name_axis_orphan', 'orphan card_name 軸降為 faction(陣營字母)', sp), { loadingText: '批次修復', showProgress: true }));

    loadCards();
  })();
  </script>
