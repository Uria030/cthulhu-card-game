<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片設計器 — Admin Module</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-shared.css">
  <style>
    .main-layout { display: flex; gap: 1rem; min-height: calc(100vh - 50px); }
    .panel-left { width: 280px; flex-shrink: 0; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 1rem; overflow-y: auto; max-height: calc(100vh - 50px); }
    .panel-right { flex: 1; padding: 1rem 1.5rem; overflow-y: auto; max-height: calc(100vh - 50px); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
    .toolbar .spacer { flex: 1; }
    .search-box { width: 100%; margin-bottom: 0.75rem; }
    .search-box input { width: 100%; padding: 0.4rem 0.6rem; font-size: 0.8125rem; }
    .filter-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .filter-row select { flex: 1; min-width: 0; padding: 0.3rem 0.4rem; font-size: 0.75rem; }
    .card-list-item { padding: 0.5rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.4rem; cursor: pointer; transition: border-color 0.15s; font-size: 0.8125rem; }
    .card-list-item:hover { border-color: var(--gold-dim); }
    .card-list-item.active { border-color: var(--gold); background: var(--bg-card); }
    .card-list-item .item-name { font-weight: 500; color: var(--text-primary); }
    .card-list-item .item-code { font-family: 'JetBrains Mono', monospace; font-size: 0.6875rem; color: var(--text-tertiary); }
    .card-list-item .item-tags { display: flex; gap: 0.25rem; margin-top: 0.25rem; flex-wrap: wrap; }
    .card-list-item .mini-tag { font-size: 0.625rem; padding: 0 0.3rem; border-radius: 3px; border: 1px solid var(--border); color: var(--text-secondary); }
    .list-stats { font-size: 0.75rem; color: var(--text-tertiary); text-align: center; padding-top: 0.5rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 0.75rem; margin-bottom: 0.2rem; }
    .form-group input, .form-group select, .form-group textarea { font-size: 0.8125rem; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .section-label { font-family: 'Cinzel', serif; font-size: 0.9375rem; color: var(--gold-dim); margin: 1.25rem 0 0.5rem; padding-bottom: 0.25rem; border-bottom: 1px solid var(--border); }
    .section-label:first-of-type { margin-top: 0; }
    .form-group input[type="checkbox"] { width: auto; }
    .check-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; }
    .check-row label { margin-bottom: 0; font-size: 0.8125rem; }
    .hidden { display: none !important; }
    .code-display { font-family: 'JetBrains Mono', monospace; font-size: 1.125rem; color: var(--gold); background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; margin-bottom: 0.75rem; text-align: center; letter-spacing: 0.1em; }
    .code-display .code-label { font-family: 'Noto Sans TC', sans-serif; font-size: 0.6875rem; color: var(--text-tertiary); display: block; margin-bottom: 0.15rem; letter-spacing: 0; }
    .slot-note { font-size: 0.6875rem; color: var(--text-tertiary); margin-top: 0.15rem; }
    .effect-item { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; margin-bottom: 0.75rem; }
    .effect-item .effect-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .effect-item .btn-remove { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.875rem; padding: 0.2rem 0.4rem; }
    .eff-section { margin-bottom: 0.5rem; }
    .eff-section-label { font-size: 0.6875rem; color: var(--text-tertiary); margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.25rem; }
    .eff-section-label .eff-num { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: var(--gold-dim); color: var(--bg-primary); font-size: 0.5625rem; font-weight: 700; }
    .eff-cost-grid { display: flex; flex-wrap: wrap; gap: 0.25rem 0.5rem; }
    .eff-cost-item { display: flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; }
    .eff-cost-item input[type="checkbox"] { width: auto; margin: 0; }
    .eff-cost-item input[type="number"] { width: 50px; padding: 0.15rem 0.3rem; font-size: 0.75rem; }
    .eff-conditions { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .eff-conditions .tag-btn { font-size: 0.6875rem; padding: 0.15rem 0.4rem; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
    .eff-conditions .tag-btn.active { border-color: var(--gold-dim); color: var(--gold); background: rgba(201,168,76,0.1); }
    .eff-conditions .tag-btn:hover { border-color: var(--gold-dim); }
    .eff-cond-param { display: inline-flex; align-items: center; gap: 0.2rem; margin-left: 0.25rem; }
    .eff-cond-param input { width: 40px; padding: 0.1rem 0.2rem; font-size: 0.6875rem; }
    .eff-dynamic-params { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 4px; padding: 0.5rem; margin-top: 0.35rem; }
    .eff-dynamic-params .form-grid { gap: 0.4rem; }
    .eff-desc-block { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border); }
    .eff-desc-block textarea { min-height: 40px; font-size: 0.75rem; }
    .eff-desc-actions { display: flex; gap: 0.25rem; margin-top: 0.25rem; }
    .eff-desc-actions button { font-size: 0.625rem; padding: 0.15rem 0.4rem; }
    .edit-preview-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; }
    .preview-card { width: 300px; min-height: 420px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg-card); padding: 1rem; position: sticky; top: 60px; font-size: 0.8125rem; display: flex; flex-direction: column; }
    .pv-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
    .pv-cost { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-primary); border: 2px solid var(--gold-dim); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 1.125rem; font-weight: 700; color: var(--gold); }
    .pv-faction { font-family: 'JetBrains Mono', monospace; font-size: 0.6875rem; padding: 0.15rem 0.5rem; border-radius: 4px; border: 1px solid; }
    .pv-name { text-align: center; margin-bottom: 0.25rem; }
    .pv-name-zh { font-family: 'Cinzel', serif; font-size: 1.125rem; color: var(--text-primary); font-weight: 600; }
    .pv-name-en { font-size: 0.6875rem; color: var(--text-tertiary); }
    .pv-type { text-align: center; font-size: 0.6875rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .pv-badges { display: flex; justify-content: center; gap: 0.25rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .pv-badge { font-size: 0.5625rem; padding: 0.1rem 0.4rem; border-radius: 3px; font-weight: 500; }
    .pv-badge-signature { background: rgba(201,168,76,0.2); color: var(--gold); border: 1px solid var(--gold-dim); }
    .pv-badge-weakness { background: rgba(184,76,76,0.2); color: var(--danger); border: 1px solid var(--danger); }
    .pv-badge-revelation { background: rgba(123,78,163,0.2); color: var(--oracle); border: 1px solid var(--oracle); }
    .pv-badge-consume { font-size: 0.5625rem; padding: 0.1rem 0.4rem; border-radius: 3px; }
    .pv-badge-long_rest { background: rgba(74,124,155,0.2); color: var(--info); border: 1px solid var(--info); }
    .pv-badge-short_rest { background: rgba(45,139,111,0.2); color: var(--success); border: 1px solid var(--success); }
    .pv-badge-removed { background: rgba(184,76,76,0.2); color: var(--danger); border: 1px solid var(--danger); }
    .pv-divider { border: none; border-top: 1px solid var(--border); margin: 0.5rem 0; }
    .pv-uses { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .pv-effects { font-size: 0.8125rem; color: var(--text-primary); line-height: 1.5; margin-bottom: 0.5rem; white-space: pre-wrap; flex: 1; }
    .pv-flavor { font-style: italic; font-size: 0.75rem; color: var(--text-tertiary); line-height: 1.4; }
    .pv-bottom { display: flex; justify-content: space-around; padding-top: 0.5rem; border-top: 1px solid var(--border); margin-top: auto; }
    .pv-stat { text-align: center; }
    .pv-stat-val { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; }
    .pv-stat-label { font-size: 0.625rem; color: var(--text-tertiary); }
    .ai-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    .ai-section .ai-title { font-family: 'Cinzel', serif; font-size: 0.875rem; color: var(--gold-dim); margin-bottom: 0.5rem; }
    .ai-input-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .ai-input-row textarea { flex: 1; min-height: 50px; font-size: 0.8125rem; resize: vertical; }
    .ai-templates { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .ai-templates button { font-size: 0.6875rem; padding: 0.2rem 0.5rem; }
    .ai-status { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.4rem; }
    .ai-status.ok { color: var(--success); }
    .ai-status.err { color: var(--danger); }
    .ai-loading { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .action-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    @media (max-width: 1100px) { .edit-preview-layout { grid-template-columns: 1fr; } .preview-card { position: static; width: 100%; } }
    @media (max-width: 768px) { .main-layout { flex-direction: column; } .panel-left { width: 100%; max-height: 300px; border-right: none; border-bottom: 1px solid var(--border); } }
  </style>
</head>
<body>
  <nav class="admin-nav">
    <a href="index.html" class="nav-back">&larr; 返回首頁</a>
    <span class="nav-title">卡片設計器</span>
    <span class="nav-code">MOD-01</span>
  </nav>

  <div class="main-layout">
    <!-- Left Panel -->
    <div class="panel-left">
      <div class="search-box"><input type="text" id="searchInput" placeholder="搜尋名稱或代碼…"></div>
      <div class="filter-row">
        <select id="filterFaction"><option value="">全部陣營</option></select>
        <select id="filterStyle"><option value="">全部風格</option></select>
      </div>
      <div class="filter-row">
        <select id="filterType"><option value="">全部類別</option></select>
      </div>
      <div id="cardList"></div>
      <div class="list-stats" id="listStats">0 張卡片</div>
    </div>

    <!-- Right Panel -->
    <div class="panel-right">
      <div class="toolbar">
        <button class="btn btn-primary" onclick="newCard()">+ 新增卡片</button>
        <button class="btn" onclick="showApiKeyDialog()">設定 API Key</button>
        <span id="apiKeyStatus" class="ai-status"></span>
        <span class="spacer"></span>
        <button class="btn" onclick="importJSON()">匯入 JSON</button>
        <button class="btn" onclick="exportJSON()">匯出 JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
      </div>

      <!-- AI -->
      <div class="ai-section">
        <div class="ai-title">AI 卡片生成</div>
        <div class="ai-input-row">
          <textarea id="aiPrompt" placeholder="輸入你想要的卡片描述…&#10;例如：S陣營的進階武器，獵槍，費用4"></textarea>
          <button class="btn btn-primary" id="aiGenBtn" onclick="aiGenerate()">生成</button>
        </div>
        <div class="ai-templates">
          <span style="font-size:0.6875rem;color:var(--text-tertiary);margin-right:0.25rem;">快速模板：</span>
          <button class="btn" onclick="aiTemplate('weapon')">武器</button>
          <button class="btn" onclick="aiTemplate('spell')">法術</button>
          <button class="btn" onclick="aiTemplate('heal')">治療</button>
          <button class="btn" onclick="aiTemplate('event')">事件</button>
          <button class="btn" onclick="aiTemplate('ally')">盟友</button>
          <button class="btn" onclick="aiTemplate('revelation')">神啟</button>
        </div>
        <div id="aiStatusMsg" class="ai-status"></div>
      </div>

      <!-- Edit + Preview -->
      <div class="edit-preview-layout">
        <div class="form-area">
          <!-- Auto-generated code display -->
          <div class="code-display">
            <span class="code-label">自動生成代碼（儲存時確定）</span>
            <span id="codePreview">—</span>
          </div>

          <!-- Identity -->
          <div class="section-label">身份資訊</div>
          <div class="form-grid">
            <div class="form-group"><label>系列</label><select id="f_series"></select></div>
            <div class="form-group"><label>等級 (level)</label><input type="number" id="f_level" value="0" min="0"></div>
            <div class="form-group"><label>中文名稱</label><input type="text" id="f_name_zh" placeholder=".45 自動手槍"></div>
            <div class="form-group"><label>英文名稱</label><input type="text" id="f_name_en" placeholder=".45 Automatic"></div>
            <div class="form-group"><label>陣營極</label><select id="f_faction"></select></div>
            <div class="form-group"><label>卡片風格</label><select id="f_style"></select></div>
            <div class="form-group"><label>卡片類別</label><select id="f_type"></select></div>
            <div class="form-group" id="slotGroup"><label>裝備欄位</label><select id="f_slot"></select><div class="slot-note" id="slotNote"></div></div>
            <div class="form-group full">
              <div class="check-row"><input type="checkbox" id="f_is_unique"><label for="f_is_unique">獨特卡（場上只能存在一張）</label></div>
            </div>
          </div>

          <!-- Special Identity Tags -->
          <div class="section-label">特殊身份標記</div>
          <div class="form-grid">
            <div class="form-group full">
              <div class="check-row"><input type="checkbox" id="f_is_signature"><label for="f_is_signature">簽名卡 — 調查員獨有</label></div>
              <div class="check-row"><input type="checkbox" id="f_is_weakness"><label for="f_is_weakness">弱點 — 負面卡，強制納入牌組</label></div>
              <div class="check-row"><input type="checkbox" id="f_is_revelation"><label for="f_is_revelation">神啟卡 — 詛咒卡，抽到即觸發</label></div>
            </div>
          </div>
          <!-- Signature sub-fields -->
          <div id="signatureFields" class="hidden">
            <div class="form-grid" style="margin-top:0.5rem;">
              <div class="form-group full"><label>歸屬調查員代碼</label><input type="text" id="f_owner_investigator" placeholder="investigator_code"></div>
            </div>
          </div>
          <!-- Revelation sub-fields -->
          <div id="revelationFields" class="hidden">
            <div class="form-grid" style="margin-top:0.5rem;">
              <div class="form-group full">
                <div class="check-row"><input type="checkbox" id="f_removable"><label for="f_removable">可移除</label></div>
                <div class="check-row"><input type="checkbox" id="f_committable"><label for="f_committable">可用作加值</label></div>
              </div>
              <div class="form-group"><label>累計觸發致死次數 (0=不致死)</label><input type="number" id="f_lethal_count" value="0" min="0"></div>
            </div>
          </div>

          <!-- Stats -->
          <div class="section-label">數值資訊</div>
          <div class="form-grid">
            <div class="form-group"><label>費用 (0-6)</label><input type="number" id="f_cost" value="0" min="0" max="6"></div>
            <div class="form-group"><label>費用貨幣</label><select id="f_cost_currency"></select></div>
            <div class="form-group"><label>使用後去向</label><select id="f_consume_type"></select></div>
            <div class="form-group"><label>檢定加值 (0-5)</label><input type="number" id="f_skill_value" value="0" min="0" max="5"></div>
            <div class="form-group"><label>傷害 (0-10)</label><input type="number" id="f_damage" value="0" min="0" max="10"></div>
            <div class="form-group"><label>恐懼傷害 (0-10)</label><input type="number" id="f_horror" value="0" min="0" max="10"></div>
            <div class="form-group"><label>治療 HP (0-10)</label><input type="number" id="f_health_boost" value="0" min="0" max="10"></div>
            <div class="form-group"><label>治療 SAN (0-10)</label><input type="number" id="f_sanity_boost" value="0" min="0" max="10"></div>
            <div class="form-group" id="weaponTierGroup"><label>武器階層</label><select id="f_weapon_tier"><option value="0">無</option></select></div>
            <div class="form-group" id="ammoGroup"><label>彈藥</label><input type="number" id="f_ammo" value="0" min="0"></div>
            <div class="form-group"><label>使用次數</label><input type="number" id="f_uses" value="0" min="0"></div>
            <div class="form-group"><label>檢定屬性</label><select id="f_check_attribute"><option value="">無</option></select></div>
            <div class="form-group"><label>檢定修正 (-3~+5)</label><input type="number" id="f_check_modifier" value="0" min="-3" max="5"></div>
            <div class="form-group"><label>檢定方式</label><select id="f_check_method"></select></div>
            <div class="form-group"><label>手牌上限修改 (-3~0)</label><input type="number" id="f_hand_limit_mod" value="0" min="-3" max="0"></div>
          </div>

          <!-- Effects -->
          <div class="section-label">效果資訊</div>
          <div id="effectsList"></div>
          <button class="btn" onclick="addEffect()" style="margin-top:0.5rem;">+ 新增效果</button>

          <!-- Narrative -->
          <div class="section-label">敘事資訊</div>
          <div class="form-grid">
            <div class="form-group full"><label>風味文字</label><textarea id="f_flavor_text" placeholder="卡片底部的敘事文字…"></textarea></div>
          </div>

          <div class="action-bar">
            <button class="btn btn-primary" onclick="saveCard()">儲存</button>
            <button class="btn" onclick="saveAsNew()">另存新卡</button>
            <button class="btn btn-danger" onclick="deleteCard()">刪除</button>
            <button class="btn" onclick="clearForm()">清空表單</button>
          </div>
        </div>

        <!-- Preview -->
        <div>
          <div class="preview-card" id="previewCard">
            <div class="pv-top">
              <div class="pv-cost" id="pvCost">0</div>
              <div class="pv-faction" id="pvFaction">—</div>
            </div>
            <div class="pv-name">
              <div class="pv-name-zh" id="pvNameZh">卡片名稱</div>
              <div class="pv-name-en" id="pvNameEn">Card Name</div>
            </div>
            <div class="pv-type" id="pvType">類別</div>
            <div class="pv-badges" id="pvBadges"></div>
            <hr class="pv-divider">
            <div class="pv-uses" id="pvUses"></div>
            <div class="pv-effects" id="pvEffects"></div>
            <hr class="pv-divider">
            <div class="pv-flavor" id="pvFlavor"></div>
            <hr class="pv-divider">
            <div class="pv-bottom">
              <div class="pv-stat"><div class="pv-stat-val" id="pvSkill">0</div><div class="pv-stat-label">加值</div></div>
              <div class="pv-stat"><div class="pv-stat-val" id="pvDamage">0</div><div class="pv-stat-label">傷害</div></div>
              <div class="pv-stat"><div class="pv-stat-val" id="pvHorror">0</div><div class="pv-stat-label">恐懼</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="admin-shared.js"></script>
  <script>
  const LS_KEY = 'card_definitions';
  const LS_API_KEY = 'gemini_api_key';
  let cards = [];
  let editingId = null;

  async function init() {
    await loadEffectLanguageOptions();
    populateSelects();
    loadCards();
    renderList();
    bindLivePreview();
    updateApiKeyStatus();
    clearForm();
  }

  function populateSelects() {
    // Series
    const srSel = el('f_series');
    srSel.innerHTML = '';
    for (const [k, v] of Object.entries(SERIES)) srSel.innerHTML += `<option value="${k}">${k} ${v.zh}</option>`;

    // Faction
    const fSel = el('f_faction');
    fSel.innerHTML = '<option value="neutral">中立 N0</option>';
    for (const [k, v] of Object.entries(FACTIONS)) fSel.innerHTML += `<option value="${k}">${v.zh} ${k}</option>`;

    // Style
    const sSel = el('f_style');
    sSel.innerHTML = '';
    for (const [k, v] of Object.entries(CARD_STYLES)) sSel.innerHTML += `<option value="${k}">${v.zh} (${v.code})</option>`;

    // Type (only 4 now)
    const tSel = el('f_type');
    tSel.innerHTML = '';
    for (const [k, v] of Object.entries(CARD_TYPES)) tSel.innerHTML += `<option value="${k}">${v.zh}</option>`;

    // Slot (new structure)
    const slSel = el('f_slot');
    slSel.innerHTML = '';
    for (const [k, v] of Object.entries(SLOTS)) slSel.innerHTML += `<option value="${k}">${v.zh} (${v.en})</option>`;

    // Weapon tier
    const wtSel = el('f_weapon_tier');
    wtSel.innerHTML = '<option value="0">無</option>';
    for (const [k, v] of Object.entries(WEAPON_TIERS)) wtSel.innerHTML += `<option value="${k}">${v.name} (${v.en}) — 傷害 ${v.damage}</option>`;

    // Check attribute
    const caSel = el('f_check_attribute');
    caSel.innerHTML = '<option value="">無</option>';
    for (const [k, v] of Object.entries(ATTRIBUTES)) caSel.innerHTML += `<option value="${k}">${v.zh} (${v.abbr})</option>`;

    // Check method
    const cmSel = el('f_check_method');
    cmSel.innerHTML = '';
    for (const [k, v] of Object.entries(CHECK_METHODS)) cmSel.innerHTML += `<option value="${k}">${v.zh}</option>`;

    // Cost currency
    const ccSel = el('f_cost_currency');
    ccSel.innerHTML = '';
    for (const [k, v] of Object.entries(COST_CURRENCIES)) ccSel.innerHTML += `<option value="${k}">${v.zh}</option>`;

    // Consume type
    const ctSel = el('f_consume_type');
    ctSel.innerHTML = '';
    for (const [k, v] of Object.entries(CONSUME_TYPES)) ctSel.innerHTML += `<option value="${k}">${v.zh}</option>`;

    // Filters
    const ff = el('filterFaction');
    for (const [k, v] of Object.entries(FACTIONS)) ff.innerHTML += `<option value="${k}">${v.zh} ${k}</option>`;
    ff.innerHTML += '<option value="neutral">中立</option>';
    const fs = el('filterStyle');
    for (const [k, v] of Object.entries(CARD_STYLES)) fs.innerHTML += `<option value="${k}">${v.zh}</option>`;
    const ft = el('filterType');
    for (const [k, v] of Object.entries(CARD_TYPES)) ft.innerHTML += `<option value="${k}">${v.zh}</option>`;
  }

  function loadCards() { try { cards = JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { cards = []; } }
  function saveCards() { localStorage.setItem(LS_KEY, JSON.stringify(cards)); }

  /* ── Auto Code Generation ── */
  function generateCode(series, faction, style) {
    const factionCode = faction === 'neutral' ? 'N0' : faction;
    const prefix = `${series}${factionCode}${style}`;
    const existing = cards.filter(c => c.code && c.code.startsWith(prefix + '-'));
    let maxNum = 0;
    existing.forEach(c => {
      const match = c.code.match(/-(\d+)$/);
      if (match) maxNum = Math.max(maxNum, parseInt(match[1], 10));
    });
    const next = String(maxNum + 1).padStart(2, '0');
    return `${prefix}-${next}`;
  }

  function updateCodePreview() {
    const series = el('f_series').value;
    const faction = el('f_faction').value;
    const style = el('f_style').value;
    if (editingId) {
      const c = cards.find(x => x.id === editingId);
      el('codePreview').textContent = c?.code || '—';
    } else {
      el('codePreview').textContent = generateCode(series, faction, style);
    }
  }

  /* ── Card List ── */
  function renderList() {
    const search = el('searchInput').value.toLowerCase();
    const fFac = el('filterFaction').value;
    const fSty = el('filterStyle').value;
    const fTyp = el('filterType').value;
    let filtered = cards.filter(c => {
      if (search && !(c.name_zh||'').toLowerCase().includes(search) && !(c.name_en||'').toLowerCase().includes(search) && !(c.code||'').toLowerCase().includes(search)) return false;
      if (fFac && c.faction !== fFac) return false;
      if (fSty && c.style !== fSty) return false;
      if (fTyp && c.type !== fTyp) return false;
      return true;
    });
    const list = el('cardList');
    list.innerHTML = filtered.map(c => {
      const facLabel = c.faction === 'neutral' ? '中立' : (FACTIONS[c.faction]?.zh || c.faction);
      const typeLabel = CARD_TYPES[c.type]?.zh || c.type;
      const isActive = c.id === editingId ? ' active' : '';
      let badges = '';
      if (c.is_signature) badges += '<span class="mini-tag" style="border-color:var(--gold);color:var(--gold)">簽名</span>';
      if (c.is_weakness) badges += '<span class="mini-tag" style="border-color:var(--danger);color:var(--danger)">弱點</span>';
      if (c.is_revelation) badges += '<span class="mini-tag" style="border-color:var(--oracle);color:var(--oracle)">神啟</span>';
      return `<div class="card-list-item${isActive}" onclick="loadCard('${c.id}')">
        <div class="item-name">${c.name_zh || '(未命名)'}</div>
        <div class="item-code">${c.code || '—'}</div>
        <div class="item-tags">
          <span class="mini-tag" style="border-color:${FACTIONS[c.faction]?.color || 'var(--border)'};color:${FACTIONS[c.faction]?.color || 'var(--text-secondary)'}">${facLabel}</span>
          <span class="mini-tag">${typeLabel}</span>${badges}
        </div>
      </div>`;
    }).join('');
    el('listStats').textContent = `${filtered.length} / ${cards.length} 張卡片`;
  }

  /* ── Load / Collect / Save ── */
  function loadCard(id) {
    const c = cards.find(x => x.id === id);
    if (!c) return;
    editingId = id;
    el('f_series').value = c.series || 'C';
    el('f_name_zh').value = c.name_zh || '';
    el('f_name_en').value = c.name_en || '';
    el('f_faction').value = c.faction || 'neutral';
    el('f_style').value = c.style || 'AH';
    el('f_type').value = c.type || 'asset';
    el('f_slot').value = c.slot || 'one_hand';
    el('f_is_unique').checked = !!c.is_unique;
    el('f_level').value = c.level || 0;
    el('f_is_signature').checked = !!c.is_signature;
    el('f_is_weakness').checked = !!c.is_weakness;
    el('f_is_revelation').checked = !!c.is_revelation;
    el('f_owner_investigator').value = c.owner_investigator || '';
    el('f_removable').checked = !!c.removable;
    el('f_committable').checked = !!c.committable;
    el('f_lethal_count').value = c.lethal_count ?? 0;
    el('f_cost').value = c.cost ?? 0;
    el('f_cost_currency').value = c.cost_currency || 'resource';
    el('f_consume_type').value = c.consume_type || 'discard';
    el('f_skill_value').value = c.skill_value ?? 0;
    el('f_damage').value = c.damage ?? 0;
    el('f_horror').value = c.horror ?? 0;
    el('f_health_boost').value = c.health_boost ?? 0;
    el('f_sanity_boost').value = c.sanity_boost ?? 0;
    el('f_weapon_tier').value = c.weapon_tier ?? 0;
    el('f_ammo').value = c.ammo ?? 0;
    el('f_uses').value = c.uses ?? 0;
    el('f_check_attribute').value = c.check_attribute || '';
    el('f_check_modifier').value = c.check_modifier ?? 0;
    el('f_check_method').value = c.check_method || 'dice';
    el('f_hand_limit_mod').value = c.hand_limit_mod ?? 0;
    el('f_flavor_text').value = c.flavor_text || '';
    // Migrate old effect format if needed
    const effects = (c.effects || []).map(e => {
      if (e.effect_params && !e.params) { e.params = e.effect_params; delete e.effect_params; }
      if (!e.duration) e.duration = 'instant';
      if (!e.target) e.target = '';
      if (!e.cost) e.cost = {};
      return e;
    });
    renderEffects(effects);
    toggleConditionalFields();
    updateCodePreview();
    updatePreview();
    renderList();
  }

  function collectForm() {
    return {
      id: editingId || crypto.randomUUID(),
      code: editingId ? (cards.find(c => c.id === editingId)?.code || '') : generateCode(el('f_series').value, el('f_faction').value, el('f_style').value),
      series: el('f_series').value,
      name_zh: el('f_name_zh').value.trim(),
      name_en: el('f_name_en').value.trim(),
      faction: el('f_faction').value,
      style: el('f_style').value,
      type: el('f_type').value,
      slot: el('f_slot').value,
      is_unique: el('f_is_unique').checked,
      level: intVal('f_level'),
      is_signature: el('f_is_signature').checked,
      is_weakness: el('f_is_weakness').checked,
      is_revelation: el('f_is_revelation').checked,
      owner_investigator: el('f_owner_investigator').value.trim() || null,
      removable: el('f_removable').checked,
      committable: el('f_committable').checked,
      lethal_count: intVal('f_lethal_count'),
      cost: intVal('f_cost'),
      cost_currency: el('f_cost_currency').value,
      consume_type: el('f_consume_type').value,
      skill_value: intVal('f_skill_value'),
      damage: intVal('f_damage'),
      horror: intVal('f_horror'),
      health_boost: intVal('f_health_boost'),
      sanity_boost: intVal('f_sanity_boost'),
      weapon_tier: intVal('f_weapon_tier'),
      ammo: intVal('f_ammo'),
      uses: intVal('f_uses') || null,
      check_attribute: el('f_check_attribute').value || null,
      check_modifier: intVal('f_check_modifier'),
      check_method: el('f_check_method').value,
      hand_limit_mod: intVal('f_hand_limit_mod'),
      subtypes: [],
      effects: collectEffects(),
      flavor_text: el('f_flavor_text').value.trim(),
      version: 1,
      created_at: editingId ? (cards.find(c => c.id === editingId)?.created_at || new Date().toISOString()) : new Date().toISOString(),
      updated_at: new Date().toISOString(),
    };
  }

  function validate(data) {
    const errors = [];
    if (!data.name_zh) errors.push('中文名稱為必填');
    if (!data.name_en) errors.push('英文名稱為必填');
    if (data.cost < 0 || data.cost > 6) errors.push('費用須在 0-6 之間');
    return errors;
  }

  function saveCard() {
    const data = collectForm();
    const errors = validate(data);
    if (errors.length) { alert('驗證錯誤：\n' + errors.join('\n')); return; }
    const idx = cards.findIndex(c => c.id === data.id);
    if (idx >= 0) cards[idx] = data;
    else cards.push(data);
    editingId = data.id;
    saveCards();
    updateCodePreview();
    renderList();
    alert('已儲存 — 代碼：' + data.code);
  }

  function saveAsNew() {
    editingId = null;
    updateCodePreview();
    alert('已切換為新卡模式，按儲存即可建立');
  }

  function deleteCard() {
    if (!editingId) return;
    if (!confirm('確定要刪除這張卡片嗎？')) return;
    cards = cards.filter(c => c.id !== editingId);
    saveCards(); clearForm(); renderList();
  }

  function newCard() { clearForm(); el('f_name_zh').focus(); }

  function clearForm() {
    editingId = null;
    document.querySelectorAll('.form-area input[type="text"], .form-area input[type="number"], .form-area textarea').forEach(i => { if (i.type === 'number') i.value = i.min || 0; else i.value = ''; });
    document.querySelectorAll('.form-area input[type="checkbox"]').forEach(i => i.checked = false);
    el('f_series').value = 'C';
    el('f_faction').value = 'neutral';
    el('f_style').value = 'AH';
    el('f_type').value = 'asset';
    el('f_slot').value = 'one_hand';
    el('f_cost_currency').value = 'resource';
    el('f_consume_type').value = 'stay';
    el('f_check_method').value = 'dice';
    el('f_weapon_tier').value = '0';
    renderEffects([]);
    toggleConditionalFields();
    updateCodePreview();
    updatePreview();
    renderList();
  }

  /* ── Effect Language Options ── */
  let EL = null; // effect-language-options data

  async function loadEffectLanguageOptions() {
    try {
      const res = await fetch('./data/effect-language-options.json');
      EL = await res.json();
    } catch (err) { console.error('Failed to load effect-language-options.json', err); }
  }

  function renderGroupedSelect(data, selectedVal) {
    let html = '<option value="">— 選擇 —</option>';
    if (!data) return html;
    for (const [group, opts] of Object.entries(data)) {
      html += `<optgroup label="${group}">`;
      for (const o of opts) html += `<option value="${o.code}" ${o.code === selectedVal ? 'selected' : ''}>${o.zh} (${o.code})</option>`;
      html += '</optgroup>';
    }
    return html;
  }

  function renderFlatSelect(arr, selectedVal, placeholder) {
    let html = `<option value="">${placeholder || '— 選擇 —'}</option>`;
    if (!arr) return html;
    for (const o of arr) html += `<option value="${o.code || o.value}" ${(o.code || o.value) === selectedVal ? 'selected' : ''}>${o.zh}</option>`;
    return html;
  }

  /* ── Effects ── */
  function renderEffects(effects) {
    el('effectsList').innerHTML = effects.map((e, i) => effectHTML(e, i)).join('');
    // Bind dynamic param rendering for each effect
    document.querySelectorAll('.eff-effect-code').forEach((sel, i) => {
      sel.addEventListener('change', () => renderDynamicParams(i));
    });
    // Bind auto-description
    document.querySelectorAll('.effect-item').forEach((item, i) => {
      item.querySelectorAll('select, input').forEach(inp => {
        inp.addEventListener('change', () => { autoGenerateDesc(i); updatePreview(); });
        inp.addEventListener('input', () => updatePreview());
      });
    });
  }

  function effectHTML(e, i) {
    if (!EL) return `<div class="effect-item" data-idx="${i}"><span style="color:var(--danger)">效果語言資料載入中…</span></div>`;

    // Migrate old format: effect_params -> params, effect_code stays
    const trigger = e.trigger || '';
    const conditions = e.condition ? (Array.isArray(e.condition) ? e.condition : [e.condition]) : [];
    const condParams = e.condition_params || {};
    const cost = e.cost || {};
    const target = e.target || '';
    const effectCode = e.effect_code || '';
    const params = e.params || e.effect_params || {};
    const duration = e.duration || 'instant';
    const scope = e.scope || '';
    const descZh = e.desc_zh || '';
    const descEn = e.desc_en || '';

    // ① Trigger
    const triggerSelect = renderGroupedSelect(EL.triggers, trigger);

    // ② Conditions (tag buttons)
    let condHTML = '';
    const allConds = Object.values(EL.conditions).flat();
    for (const [group, conds] of Object.entries(EL.conditions)) {
      condHTML += `<span style="font-size:0.5625rem;color:var(--text-tertiary);margin-right:0.15rem;">${group}:</span>`;
      for (const c of conds) {
        const isActive = conditions.includes(c.code);
        condHTML += `<button type="button" class="tag-btn ${isActive ? 'active' : ''}" data-code="${c.code}" onclick="toggleCondition(this, ${i})">${c.zh}</button>`;
        if (c.has_param && isActive) {
          condHTML += `<span class="eff-cond-param"><input type="number" class="cond-param" data-cond="${c.code}" value="${condParams[c.code] || ''}" placeholder="${c.param_label_zh}"></span>`;
        }
      }
    }

    // ③ Cost (checkboxes with amounts)
    let costHTML = '';
    for (const c of EL.costs) {
      const isChecked = cost[c.code] !== undefined;
      const val = cost[c.code] === true ? '' : (cost[c.code] || '');
      costHTML += `<div class="eff-cost-item"><input type="checkbox" class="cost-check" data-code="${c.code}" ${isChecked ? 'checked' : ''}><span>${c.zh}</span>`;
      if (c.has_amount) costHTML += `<input type="number" class="cost-amount" data-code="${c.code}" value="${val}" min="1" max="10" ${isChecked ? '' : 'disabled'}>`;
      costHTML += '</div>';
    }

    // ④ Target
    const targetSelect = renderGroupedSelect(EL.targets, target);

    // ⑤ Effect Code
    const effectCodeSelect = renderGroupedSelect(EL.effect_codes, effectCode);

    // ⑤ Dynamic params
    const dynParamsHTML = buildDynamicParamsHTML(effectCode, params);

    // ⑥ Duration
    const durationSelect = renderGroupedSelect(EL.durations, duration);
    const durationDef = Object.values(EL.durations).flat().find(d => d.code === duration);
    const showScope = durationDef?.has_scope;
    const showDurationParam = durationDef?.has_param;

    return `<div class="effect-item" data-idx="${i}">
      <div class="effect-header"><span style="font-size:0.75rem;color:var(--text-tertiary)">效果 #${i+1}</span><button class="btn-remove" onclick="removeEffect(${i})">&#10005;</button></div>

      <div class="eff-section"><div class="eff-section-label"><span class="eff-num">1</span> 觸發時機</div>
        <select class="eff-trigger" style="width:100%;">${triggerSelect}</select></div>

      <div class="eff-section"><div class="eff-section-label"><span class="eff-num">2</span> 條件限制 <span style="font-size:0.5625rem;color:var(--text-tertiary)">(可選，可多選)</span></div>
        <div class="eff-conditions">${condHTML}</div></div>

      <div class="eff-section"><div class="eff-section-label"><span class="eff-num">3</span> 費用類型 <span style="font-size:0.5625rem;color:var(--text-tertiary)">(可多選)</span></div>
        <div class="eff-cost-grid">${costHTML}</div></div>

      <div class="eff-section"><div class="eff-section-label"><span class="eff-num">4</span> 目標指定</div>
        <select class="eff-target" style="width:100%;">${targetSelect}</select></div>

      <div class="eff-section"><div class="eff-section-label"><span class="eff-num">5</span> 效果動詞 <span style="font-size:0.5625rem;color:var(--gold-dim)">(核心)</span></div>
        <select class="eff-effect-code" style="width:100%;">${effectCodeSelect}</select>
        <div class="eff-dynamic-params-wrap" id="dynParams_${i}">${dynParamsHTML}</div></div>

      <div class="eff-section"><div class="eff-section-label"><span class="eff-num">6</span> 持續時間</div>
        <div class="form-grid"><div class="form-group"><select class="eff-duration" onchange="onDurationChange(${i})">${durationSelect}</select></div>
        <div class="form-group eff-duration-param ${showDurationParam ? '' : 'hidden'}"><label style="font-size:0.6875rem">回合數</label><input type="number" class="eff-duration-val" value="${e.duration_value || ''}" min="1" max="20"></div>
        <div class="form-group eff-scope ${showScope ? '' : 'hidden'}"><label style="font-size:0.6875rem">範圍</label><select class="eff-scope-sel">${renderFlatSelect(EL.scopes, scope, '— 範圍 —')}</select></div></div></div>

      <div class="eff-desc-block">
        <div class="form-grid">
          <div class="form-group full"><label style="font-size:0.6875rem">中文描述</label><textarea class="eff-desc-zh" rows="2">${descZh}</textarea></div>
          <div class="form-group full"><label style="font-size:0.6875rem">英文描述</label><textarea class="eff-desc-en" rows="2">${descEn}</textarea></div>
        </div>
        <div class="eff-desc-actions"><button class="btn" type="button" onclick="autoGenerateDesc(${i})">🔄 重新生成描述</button></div>
      </div>
    </div>`;
  }

  function buildDynamicParamsHTML(effectCode, params) {
    if (!EL || !effectCode || !EL.effect_params[effectCode]) return '';
    const def = EL.effect_params[effectCode];
    const allFields = [...(def.required || []), ...(def.optional || [])];
    if (!allFields.length) return '';

    let html = '<div class="eff-dynamic-params"><div class="form-grid">';
    for (const f of allFields) {
      const isOptional = (def.optional || []).includes(f);
      const val = getNestedParam(params, f.key);
      const label = `${f.zh}${isOptional ? ' (選填)' : ''}`;

      if (f.type === 'number') {
        html += `<div class="form-group"><label style="font-size:0.6875rem">${label}</label><input type="number" class="dyn-param" data-key="${f.key}" value="${val ?? ''}" min="${f.min ?? 0}" max="${f.max ?? 99}"></div>`;
      } else if (f.type === 'text') {
        html += `<div class="form-group"><label style="font-size:0.6875rem">${label}</label><input type="text" class="dyn-param" data-key="${f.key}" value="${val || ''}"></div>`;
      } else if (f.type === 'checkbox') {
        html += `<div class="form-group"><div class="check-row"><input type="checkbox" class="dyn-param" data-key="${f.key}" ${val ? 'checked' : ''}><label style="font-size:0.6875rem">${f.zh}</label></div></div>`;
      } else if (f.type === 'select') {
        let opts = f.options || resolveOptionsRef(f.options_ref);
        let selectHTML = '<option value="">—</option>';
        if (opts) {
          if (Array.isArray(opts) && opts[0] && typeof opts[0] === 'object') {
            for (const o of opts) selectHTML += `<option value="${o.code || o.value}" ${(o.code || o.value) === val ? 'selected' : ''}>${o.zh}</option>`;
          }
        }
        html += `<div class="form-group"><label style="font-size:0.6875rem">${label}</label><select class="dyn-param" data-key="${f.key}">${selectHTML}</select></div>`;
      }
    }
    html += '</div></div>';
    return html;
  }

  function resolveOptionsRef(ref) {
    if (!ref || !EL) return [];
    if (ref === 'elements') return EL.elements;
    if (ref === 'statuses') return Object.values(EL.statuses).flat();
    if (ref === 'attributes') return EL.attributes;
    if (ref === 'resource_types') return EL.resource_types;
    if (ref === 'factions') return EL.factions;
    if (ref === 'targets_flat') return Object.values(EL.targets).flat();
    return [];
  }

  function getNestedParam(params, key) {
    if (!params) return undefined;
    if (key.includes('.')) {
      const parts = key.split('.');
      let val = params;
      for (const p of parts) { val = val?.[p]; }
      return val;
    }
    return params[key];
  }

  function renderDynamicParams(idx) {
    const item = document.querySelectorAll('.effect-item')[idx];
    if (!item) return;
    const code = item.querySelector('.eff-effect-code').value;
    const wrap = item.querySelector('.eff-dynamic-params-wrap');
    // Try to preserve existing params
    const existingParams = collectSingleEffectParams(item);
    wrap.innerHTML = buildDynamicParamsHTML(code, existingParams);
    autoGenerateDesc(idx);
  }

  function onDurationChange(idx) {
    const item = document.querySelectorAll('.effect-item')[idx];
    if (!item) return;
    const dur = item.querySelector('.eff-duration').value;
    const durDef = Object.values(EL.durations).flat().find(d => d.code === dur);
    const paramEl = item.querySelector('.eff-duration-param');
    const scopeEl = item.querySelector('.eff-scope');
    if (paramEl) paramEl.classList.toggle('hidden', !durDef?.has_param);
    if (scopeEl) scopeEl.classList.toggle('hidden', !durDef?.has_scope);
  }

  function toggleCondition(btn, idx) {
    btn.classList.toggle('active');
    // If it has a param, we need to toggle param input visibility
    const code = btn.dataset.code;
    const cond = Object.values(EL.conditions).flat().find(c => c.code === code);
    if (cond?.has_param) {
      const item = document.querySelectorAll('.effect-item')[idx];
      // Re-render conditions section to add/remove param input
      const current = collectSingleEffectConditions(item);
      // Simple approach: just toggle, param inputs are re-created on next full render
    }
    autoGenerateDesc(idx);
    updatePreview();
  }

  function addEffect() {
    const e = collectEffects();
    e.push({ trigger: 'free_action', condition: null, cost: {}, target: 'self', effect_code: '', params: {}, duration: 'instant', scope: '', desc_zh: '', desc_en: '' });
    renderEffects(e);
  }

  function removeEffect(i) { const e = collectEffects(); e.splice(i, 1); renderEffects(e); }

  function collectEffects() {
    return Array.from(document.querySelectorAll('.effect-item')).map(item => collectSingleEffect(item));
  }

  function collectSingleEffect(item) {
    const trigger = item.querySelector('.eff-trigger')?.value || '';
    const conditions = collectSingleEffectConditions(item);
    const condParams = collectSingleEffectCondParams(item);
    const cost = collectSingleEffectCost(item);
    const target = item.querySelector('.eff-target')?.value || '';
    const effectCode = item.querySelector('.eff-effect-code')?.value || '';
    const params = collectSingleEffectParams(item);
    const duration = item.querySelector('.eff-duration')?.value || 'instant';
    const durationValue = parseInt(item.querySelector('.eff-duration-val')?.value) || null;
    const scope = item.querySelector('.eff-scope-sel')?.value || '';
    const descZh = item.querySelector('.eff-desc-zh')?.value?.trim() || '';
    const descEn = item.querySelector('.eff-desc-en')?.value?.trim() || '';

    const result = { trigger, condition: conditions.length ? (conditions.length === 1 ? conditions[0] : conditions) : null, cost: Object.keys(cost).length ? cost : null, target, effect_code: effectCode, params, duration, desc_zh: descZh, desc_en: descEn };
    if (Object.keys(condParams).length) result.condition_params = condParams;
    if (durationValue) result.duration_value = durationValue;
    if (scope) result.scope = scope;
    return result;
  }

  function collectSingleEffectConditions(item) {
    return Array.from(item.querySelectorAll('.eff-conditions .tag-btn.active')).map(b => b.dataset.code);
  }

  function collectSingleEffectCondParams(item) {
    const p = {};
    item.querySelectorAll('.cond-param').forEach(inp => {
      if (inp.value) p[inp.dataset.cond] = parseInt(inp.value) || inp.value;
    });
    return p;
  }

  function collectSingleEffectCost(item) {
    const cost = {};
    item.querySelectorAll('.cost-check:checked').forEach(cb => {
      const code = cb.dataset.code;
      const amtInput = item.querySelector(`.cost-amount[data-code="${code}"]`);
      cost[code] = amtInput ? (parseInt(amtInput.value) || 1) : true;
    });
    return cost;
  }

  function collectSingleEffectParams(item) {
    const p = {};
    item.querySelectorAll('.dyn-param').forEach(inp => {
      const key = inp.dataset.key;
      let val;
      if (inp.type === 'checkbox') val = inp.checked || undefined;
      else if (inp.type === 'number') val = inp.value !== '' ? (parseInt(inp.value) || 0) : undefined;
      else val = inp.value || undefined;
      if (val !== undefined) {
        if (key.includes('.')) {
          const parts = key.split('.');
          if (!p[parts[0]]) p[parts[0]] = {};
          p[parts[0]][parts[1]] = val;
        } else {
          p[key] = val;
        }
      }
    });
    return p;
  }

  // Enable/disable cost amount inputs
  document.addEventListener('change', (e) => {
    if (e.target.classList.contains('cost-check')) {
      const code = e.target.dataset.code;
      const item = e.target.closest('.effect-item');
      const amtInput = item.querySelector(`.cost-amount[data-code="${code}"]`);
      if (amtInput) { amtInput.disabled = !e.target.checked; if (e.target.checked && !amtInput.value) amtInput.value = 1; }
    }
  });

  /* ── Auto Description Generation ── */
  function autoGenerateDesc(idx) {
    const item = document.querySelectorAll('.effect-item')[idx];
    if (!item || !EL) return;
    const eff = collectSingleEffect(item);
    item.querySelector('.eff-desc-zh').value = generateDescZh(eff);
    item.querySelector('.eff-desc-en').value = generateDescEn(eff);
  }

  function generateDescZh(eff) {
    const parts = [];
    // Cost
    if (eff.cost && Object.keys(eff.cost).length) {
      const costParts = [];
      const costLookup = {};
      for (const c of EL.costs) costLookup[c.code] = c;
      for (const [k, v] of Object.entries(eff.cost)) {
        const def = costLookup[k];
        if (!def) continue;
        if (v === true) costParts.push(def.zh);
        else costParts.push(`${v} ${def.zh}`);
      }
      if (costParts.length) parts.push(costParts.join('，'));
    }
    // Condition
    if (eff.condition) {
      const conds = Array.isArray(eff.condition) ? eff.condition : [eff.condition];
      const allConds = Object.values(EL.conditions).flat();
      const condTexts = conds.map(c => {
        const def = allConds.find(x => x.code === c);
        if (!def) return c;
        if (def.has_param && eff.condition_params?.[c]) return def.zh.replace('X', eff.condition_params[c]);
        return def.zh;
      });
      if (condTexts.length) parts.push(`當${condTexts.join('且')}時`);
    }
    // Target
    const allTargets = Object.values(EL.targets).flat();
    const targetDef = allTargets.find(t => t.code === eff.target);
    const targetText = targetDef?.zh || '';
    // Effect
    const effectText = getEffectTextZh(eff.effect_code, eff.params, targetText);
    if (effectText) parts.push(effectText);
    // Duration
    if (eff.duration && eff.duration !== 'instant') {
      const durDef = Object.values(EL.durations).flat().find(d => d.code === eff.duration);
      if (durDef) {
        let durText = durDef.zh;
        if (eff.duration === 'x_rounds' && eff.duration_value) durText = `${eff.duration_value} 回合`;
        parts.push(`（${durText}）`);
      }
    }
    return parts.join(parts[0] && !parts[0].endsWith('時') ? '：' : '').replace('：（', '（');
  }

  function getEffectTextZh(code, params, targetText) {
    if (!code) return '';
    const p = params || {};
    const elemZh = { physical: '物理', fire: '火焰', ice: '冰冷', lightning: '電擊', arcane: '神秘' };
    const statusZh = {};
    if (EL) Object.values(EL.statuses).flat().forEach(s => statusZh[s.code] = s.zh);
    const attrZh = {};
    if (EL) EL.attributes.forEach(a => attrZh[a.code] = a.zh);

    const t = targetText && targetText !== '自己' ? `對${targetText}` : '';

    switch (code) {
      case 'deal_damage': return `${t}造成 ${p.amount || '?'} 點${elemZh[p.element] || ''}傷害${p.direct ? '（直擊）' : ''}${p.area ? `（廣域 ${p.area}）` : ''}`;
      case 'deal_horror': return `${t}造成 ${p.amount || '?'} 點恐懼傷害${p.direct ? '（直擊）' : ''}`;
      case 'heal_hp': return `${t}恢復 ${p.amount || '?'} 點 HP`;
      case 'heal_san': return `${t}恢復 ${p.amount || '?'} 點 SAN`;
      case 'restore_hp_max': return `${t}恢復 ${p.amount || '?'} 點 HP 上限`;
      case 'restore_san_max': return `${t}恢復 ${p.amount || '?'} 點 SAN 上限`;
      case 'draw_card': return `抽 ${p.amount || '?'} 張卡`;
      case 'reveal_top': return `翻開牌庫頂 ${p.count || '?'} 張`;
      case 'search_deck': return `搜尋牌庫頂 ${p.count || '?'} 張${p.filter?.keyword ? `（${p.filter.keyword}）` : ''}`;
      case 'gain_resource': return `獲得 ${p.amount || '?'} 資源`;
      case 'move_investigator': return `移動最多 ${p.distance || '?'} 個板塊${p.ignore_enemy ? '（無視交戰）' : ''}`;
      case 'move_enemy': return `${t}移動 ${p.distance || '?'} 個板塊（${p.direction === 'away' ? '遠離' : '靠近'}）`;
      case 'add_status': return `${t}施加${statusZh[p.status] || p.status || '?'}${p.value ? ` ${p.value}` : ''}`;
      case 'remove_status': return `${t}移除${statusZh[p.status] || p.status || '?'}`;
      case 'attack': return `${t}進行攻擊${p.check_attribute ? `（${attrZh[p.check_attribute] || p.check_attribute}${p.check_modifier ? ` +${p.check_modifier}` : ''}）` : ''}`;
      case 'evade': return `進行閃避檢定${p.check_modifier ? `（+${p.check_modifier}）` : ''}`;
      case 'taunt': return `${t}嘲諷，拉入交戰`;
      case 'counterattack': return `反擊造成 ${p.damage || '?'} 點${elemZh[p.element] || ''}傷害`;
      case 'make_test': return `進行${attrZh[p.attribute] || ''}檢定（DC ${p.difficulty || '?'}）`;
      case 'modify_test': return `檢定修正 ${p.modifier > 0 ? '+' : ''}${p.modifier || '?'}`;
      case 'reroll': return `重擲${p.keep_better ? '（取較佳）' : ''}`;
      case 'place_clue': return `放置 ${p.amount || '?'} 線索`;
      case 'discover_clue': return `直接發現 ${p.amount || '?'} 線索`;
      case 'place_doom': return `放置 ${p.amount || '?'} 毀滅標記`;
      case 'remove_doom': return `移除 ${p.amount || '?'} 毀滅標記`;
      case 'add_bless': return `在混沌袋放入 ${p.amount || '?'} 個祝福`;
      case 'add_curse': return `在混沌袋放入 ${p.amount || '?'} 個詛咒`;
      case 'create_light': return `創造光源（半徑 ${p.radius || '?'}）`;
      case 'jump': return `跳躍移動 ${p.distance || '?'} 個板塊（不觸發交戰）`;
      default: {
        const allCodes = Object.values(EL.effect_codes).flat();
        const def = allCodes.find(c => c.code === code);
        return def ? `${t}${def.zh}` : code;
      }
    }
  }

  function generateDescEn(eff) {
    const parts = [];
    if (eff.cost && Object.keys(eff.cost).length) {
      const costParts = [];
      const costLookup = {};
      for (const c of EL.costs) costLookup[c.code] = c;
      for (const [k, v] of Object.entries(eff.cost)) {
        const def = costLookup[k];
        if (!def) continue;
        if (v === true) costParts.push(def.en);
        else costParts.push(`${v} ${def.en}`);
      }
      if (costParts.length) parts.push('Spend ' + costParts.join(', '));
    }
    const allTargets = Object.values(EL.targets).flat();
    const targetDef = allTargets.find(t => t.code === eff.target);
    const targetText = targetDef?.en || '';
    const effectText = getEffectTextEn(eff.effect_code, eff.params, targetText);
    if (effectText) parts.push(effectText);
    if (eff.duration && eff.duration !== 'instant') {
      const durDef = Object.values(EL.durations).flat().find(d => d.code === eff.duration);
      if (durDef) {
        let dt = durDef.en;
        if (eff.duration === 'x_rounds' && eff.duration_value) dt = `for ${eff.duration_value} rounds`;
        parts.push(`(${dt})`);
      }
    }
    return parts.join(': ').replace(': (', ' (');
  }

  function getEffectTextEn(code, params, targetText) {
    if (!code) return '';
    const p = params || {};
    const t = targetText && targetText !== 'Self' ? ` ${targetText.toLowerCase()}` : '';

    switch (code) {
      case 'deal_damage': return `Deal ${p.amount || '?'} ${p.element || ''} damage${t}${p.direct ? ' (direct)' : ''}`;
      case 'deal_horror': return `Deal ${p.amount || '?'} horror${t}`;
      case 'heal_hp': return `Heal ${p.amount || '?'} HP${t}`;
      case 'heal_san': return `Heal ${p.amount || '?'} SAN${t}`;
      case 'draw_card': return `Draw ${p.amount || '?'} card(s)`;
      case 'gain_resource': return `Gain ${p.amount || '?'} resource(s)`;
      case 'attack': return `Attack${t}${p.check_modifier ? ` (+${p.check_modifier})` : ''}`;
      case 'evade': return `Evade${p.check_modifier ? ` (+${p.check_modifier})` : ''}`;
      case 'add_status': return `Apply ${p.status || '?'}${p.value ? ` ${p.value}` : ''}${t}`;
      case 'move_investigator': return `Move up to ${p.distance || '?'} location(s)`;
      case 'jump': return `Jump ${p.distance || '?'} location(s)`;
      default: {
        const allCodes = Object.values(EL.effect_codes).flat();
        const def = allCodes.find(c => c.code === code);
        return def ? `${def.en}${t}` : code;
      }
    }
  }

  /* ── Import / Export ── */
  function exportJSON() {
    if (!cards.length) { alert('沒有卡片可匯出'); return; }
    const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `card_definitions_${new Date().toISOString().slice(0,10)}.json`; a.click();
  }
  function importJSON() { el('importFile').click(); }
  function handleImport(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) { alert('JSON 格式錯誤：需要是陣列'); return; }
        const mode = confirm(`匯入 ${data.length} 張卡片。\n\n確定 = 合併\n取消 = 覆蓋`);
        if (mode) { const exist = new Set(cards.map(c => c.code)); const n = data.filter(c => !exist.has(c.code)); cards = cards.concat(n); alert(`合併完成，新增 ${n.length} 張`); }
        else { cards = data; alert(`已覆蓋，共 ${cards.length} 張`); }
        saveCards(); renderList();
      } catch (err) { alert('JSON 解析失敗：' + err.message); }
    };
    reader.readAsText(file); e.target.value = '';
  }

  function buildGeminiPrompt(userDescription) {
    return `你是一個克蘇魯神話卡牌遊戲的卡片設計師。請根據以下完整規則和使用者需求，生成一張完全符合規範的卡片。

## 一、遊戲基礎規則

### 骰子與檢定
- 骰子系統：d20
- 檢定公式：d20 + 屬性修正(0~5) + 熟練/專精(0~3) + 裝備/卡牌加值(0~4)
- 自然 20：爆擊，2 倍傷害
- 自然 1：大失敗，可能傷害隊友

### 七大屬性
力量(Strength)、敏捷(Agility)、體質(Constitution)、智力(Intellect)、意志(Willpower)、感知(Perception)、魅力(Charisma)

### 數值規格
- 卡片費用範圍：0-6
- 武器傷害階層：隨身1 / 基礎2 / 標準3 / 進階4 / 稀有5 / 傳奇6
- 檢定加值範圍：0-5
- HP 公式：體質 × 2 + 5（範圍 7-25）
- SAN 公式：意志 × 2 + 5（範圍 7-25）
- 手牌上限：8 張
- 每回合行動點：3 點
- 起始資源：5 點，每回合 +1

## 二、回合結構
1. 回合開始 → 短休息決定
2. 調查員階段（3 行動點）
3. 敵人階段（城主行動 + 神話卡 + Agenda 毀滅標記）
4. 回合結束階段（每人抽 1 張、+1 資源、橫置卡轉正）

## 三、八陣營極定義
| 極 | 名稱 | 機制關鍵字 |
|----|------|-----------|
| E | 號令 | 團隊增益、共享資源、NPC 互動、領導光環 |
| I | 深淵 | 單獨加成、牌庫操控、自我增幅、專精強化 |
| S | 鐵證 | 裝備加成、物理攻擊、消耗品效率、環境互動 |
| N | 天啟 | 混沌袋操控、預見事件、法術強化、預知反應 |
| T | 解析 | 弱點揭露、敵人預測、檢定重擲、資源效率 |
| F | 聖燼 | 治療、替人承傷、犧牲換效果、信念計數器 |
| J | 鐵壁 | 傷害減免、回合佈局、牌組一致性、堅守強化 |
| P | 流影 | 反應行動、棄牌堆回收、隨機獎勵、逆境觸發 |

## 四、卡片分類
### 卡片風格
- AH（直接正面）：直接幫助自己或隊友
- AC（直接負面）：直接傷害或妨礙敵人
- OH（間接正面）：迂迴地創造優勢
- OC（間接負面）：迂迴地製造劣勢

### 卡片類別
- asset（資產）：打出後留在場上
- event（事件）：一次性效果，進棄牌堆
- ally（盟友）：打出後留在場上的 NPC 夥伴
- skill（技能）：專門用於檢定加值

### 特殊身份標記（可疊加）
- is_signature：簽名卡
- is_weakness：弱點
- is_revelation：神啟卡

### 裝備欄位
one_hand, two_hand, head, body, accessory, arcane, talent, expertise, none

### 使用後去向
stay, discard, long_rest, short_rest, removed

## 五、卡片效果語言（核心）
每個效果必須包含六大要素：

### 5.1 觸發時機 (trigger)

  const VALID_EFFECT_CODES = new Set([
    'deal_damage','deal_horror','heal_hp','heal_san','restore_hp_max','restore_san_max','transfer_damage','transfer_horror',
    'draw_card','reveal_top','search_deck','retrieve_card','return_to_deck','discard_card','shuffle_deck','remove_from_game',
    'gain_resource','spend_resource','steal_resource','transfer_resource',
    'move_investigator','move_enemy','swap_position','place_enemy','jump',
    'engage_enemy','disengage_enemy','exhaust_card','ready_card','stun_enemy','add_status','remove_status',
    'make_test','modify_test','reroll','auto_success','auto_fail',
    'attack','evade','taunt','counterattack','extra_attack',
    'place_clue','discover_clue','place_doom','remove_doom','seal_gate','spawn_enemy','remove_enemy','execute_enemy',
    'reveal_tile','place_tile','remove_tile','place_haunting','remove_haunting','advance_act','advance_agenda','connect_tiles','disconnect_tiles',
    'create_light','extinguish_light','create_darkness','remove_darkness','create_fire','extinguish_fire',
    'add_keyword','remove_keyword','add_bless','add_curse','remove_bless','remove_curse','look_chaos_bag','manipulate_chaos_bag'
  ]);

  function validateAndFixCardData(d) {
    d.cost = Math.max(0, Math.min(6, d.cost || 0));
    d.damage = Math.max(0, Math.min(10, d.damage || 0));
    d.horror = Math.max(0, Math.min(10, d.horror || 0));
    d.skill_value = Math.max(0, Math.min(5, d.skill_value || 0));
    if (d.effects) {
      for (const eff of d.effects) {
        // Migrate old format
        if (eff.effect_params && !eff.params) { eff.params = eff.effect_params; delete eff.effect_params; }
        if (!VALID_EFFECT_CODES.has(eff.effect_code)) {
          console.warn('Invalid effect_code from AI:', eff.effect_code);
          eff._invalid = true;
        }
      }
    }
    return d;
  }

  async function aiGenerate() {
    const apiKey = localStorage.getItem(LS_API_KEY);
    if (!apiKey) { alert('請先設定 Gemini API Key'); return; }
    const userDesc = el('aiPrompt').value.trim();
    if (!userDesc) { alert('請輸入卡片描述'); return; }
    const statusEl = el('aiStatusMsg'); const btn = el('aiGenBtn');
    btn.disabled = true;
    statusEl.innerHTML = '<span class="ai-loading">&#8635;</span> 生成中…';
    statusEl.className = 'ai-status';

    const prompt = buildGeminiPrompt(userDesc);

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: 'application/json', temperature: 0.7 } })
      });
      if (!res.ok) throw new Error(`API 錯誤 ${res.status}`);
      const result = await res.json();
      const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error('API 回應為空');
      const cleanJson = text.replace(/```json\n?|\n?```/g, '').trim();
      const d = validateAndFixCardData(JSON.parse(cleanJson));
      fillFormFromData(d);
      statusEl.textContent = '生成完成！請檢查並儲存。'; statusEl.className = 'ai-status ok';
    } catch (err) { statusEl.textContent = '生成失敗：' + err.message; statusEl.className = 'ai-status err'; }
    finally { btn.disabled = false; }
  }

  function fillFormFromData(d) {
    editingId = null;
    el('f_series').value = d.series || 'C';
    el('f_name_zh').value = d.name_zh || '';
    el('f_name_en').value = d.name_en || '';
    el('f_faction').value = d.faction || 'neutral';
    el('f_style').value = d.style || 'AH';
    el('f_type').value = d.type || 'asset';
    el('f_slot').value = d.slot || 'one_hand';
    el('f_is_unique').checked = !!d.is_unique;
    el('f_level').value = d.level ?? 0;
    el('f_is_signature').checked = !!d.is_signature;
    el('f_is_weakness').checked = !!d.is_weakness;
    el('f_is_revelation').checked = !!d.is_revelation;
    el('f_owner_investigator').value = d.owner_investigator || '';
    el('f_removable').checked = !!d.removable;
    el('f_committable').checked = !!d.committable;
    el('f_lethal_count').value = d.lethal_count ?? 0;
    el('f_cost').value = d.cost ?? 0;
    el('f_cost_currency').value = d.cost_currency || 'resource';
    el('f_consume_type').value = d.consume_type || 'discard';
    el('f_skill_value').value = d.skill_value ?? 0;
    el('f_damage').value = d.damage ?? 0;
    el('f_horror').value = d.horror ?? 0;
    el('f_health_boost').value = d.health_boost ?? 0;
    el('f_sanity_boost').value = d.sanity_boost ?? 0;
    el('f_weapon_tier').value = d.weapon_tier ?? 0;
    el('f_ammo').value = d.ammo ?? 0;
    el('f_uses').value = d.uses ?? 0;
    el('f_check_attribute').value = d.check_attribute || '';
    el('f_check_modifier').value = d.check_modifier ?? 0;
    el('f_check_method').value = d.check_method || 'dice';
    el('f_hand_limit_mod').value = d.hand_limit_mod ?? 0;
    el('f_flavor_text').value = d.flavor_text || '';
    // Migrate old effect format if needed
    const effects = (d.effects || []).map(e => {
      if (e.effect_params && !e.params) { e.params = e.effect_params; delete e.effect_params; }
      if (!e.duration) e.duration = 'instant';
      if (!e.target) e.target = '';
      if (!e.cost) e.cost = {};
      return e;
    });
    renderEffects(effects);
    toggleConditionalFields();
    updateCodePreview();
    updatePreview();
  }

  function el(id) { return document.getElementById(id); }
  function intVal(id) { return parseInt(el(id).value, 10) || 0; }
  function toggle(id, show) { el(id).classList.toggle('hidden', !show); }

  init();
  </script>
