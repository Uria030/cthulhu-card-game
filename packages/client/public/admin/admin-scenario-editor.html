  // 簡化：以 JSON prompt 輸入
  const json = prompt('輸入新目標卡 JSON（需含 name_zh、front_narrative 等欄位）');
  if (!json) return;
  try {
    const parsed = JSON.parse(json);
    const overrides = currentStage.return_overrides || {};
    overrides.act_cards = overrides.act_cards || {};
    const newKeys = Object.keys(overrides.act_cards).filter(k => k.startsWith('new_'));
    const nextKey = 'new_' + (newKeys.length + 1);
    overrides.act_cards[nextKey] = parsed;
    currentStage.return_overrides = overrides;
    markDirty();
    renderOvActCardsList();
    showToast('已新增（需儲存）', 'success');
  } catch (e) { alert('JSON 格式錯誤'); }
}

function collectOverrides() {
  const overrides = { ...(currentStage.return_overrides || {}) };

  // metadata
  const meta = {};
  const n = document.getElementById('ov-name-zh').value.trim();
  const nar = document.getElementById('ov-narrative').value.trim();
  if (n) meta.name_zh = n;
  if (nar) meta.narrative = nar;
  if (Object.keys(meta).length) overrides.stage_metadata = meta; else delete overrides.stage_metadata;

  // act cards
  const ac = overrides.act_cards || {};
  // 保留 new_* 鍵
  const newKeys = Object.fromEntries(Object.entries(ac).filter(([k]) => k.startsWith('new_')));
  const acOverrides = { ...newKeys };
  document.querySelectorAll('.ov-act-fn').forEach(ta => {
    const order = ta.dataset.cardOrder;
    const fn = ta.value.trim();
    const bn = document.querySelector(`.ov-act-bn[data-card-order="${order}"]`)?.value.trim();
    const acText = document.querySelector(`.ov-act-ac[data-card-order="${order}"]`)?.value.trim();
    const rwText = document.querySelector(`.ov-act-rw[data-card-order="${order}"]`)?.value.trim();
    const entry = {};
    if (fn) entry.front_narrative = fn;
    if (bn) entry.back_narrative = bn;
    if (acText) { try { entry.front_advance_condition = JSON.parse(acText); } catch (e) { throw new Error('目標卡 ' + order + ' 推進條件 JSON 錯誤'); } }
    if (rwText) { try { entry.back_rewards = JSON.parse(rwText); } catch (e) { throw new Error('目標卡 ' + order + ' 獎勵 JSON 錯誤'); } }
    if (Object.keys(entry).length) acOverrides[order] = entry;
  });
  if (Object.keys(acOverrides).length) overrides.act_cards = acOverrides; else delete overrides.act_cards;

  // agenda cards
  const agOverrides = {};
  document.querySelectorAll('.ov-ag-fn').forEach(ta => {
    const order = ta.dataset.cardOrder;
    const fn = ta.value.trim();
    const dt = document.querySelector(`.ov-ag-dt[data-card-order="${order}"]`)?.value.trim();
    const bn = document.querySelector(`.ov-ag-bn[data-card-order="${order}"]`)?.value.trim();
    const entry = {};
    if (fn) entry.front_narrative = fn;
    if (dt) entry.front_doom_threshold = parseInt(dt, 10);
    if (bn) entry.back_narrative = bn;
    if (Object.keys(entry).length) agOverrides[order] = entry;
  });
  if (Object.keys(agOverrides).length) overrides.agenda_cards = agOverrides; else delete overrides.agenda_cards;

  // monsters
  const tierAdj = document.getElementById('ov-primary-tier-adjust').value;
  const bossOrig = document.getElementById('ov-boss-original').value.trim();
  const bossNew = document.getElementById('ov-boss-new').value.trim();
  const mp = {};
  if (tierAdj) mp.primary_family_tier_adjustment = tierAdj;
  if (bossOrig && bossNew) mp.fixed_boss_replacement = { original_boss_id: bossOrig, new_boss_id: bossNew };
  if (Object.keys(mp).length) overrides.monster_pool = mp; else delete overrides.monster_pool;

  // chaos bag
  const cb = {};
  const addText = document.getElementById('ov-chaos-add').value.trim();
  const rmText = document.getElementById('ov-chaos-rm').value.trim();
  const preset = document.getElementById('ov-chaos-preset').value;
  if (addText) { try { cb.additions = JSON.parse(addText); } catch (e) { throw new Error('混沌袋新增 JSON 錯誤'); } }
  if (rmText) { try { cb.removals = JSON.parse(rmText); } catch (e) { throw new Error('混沌袋移除 JSON 錯誤'); } }
  if (preset) cb.difficulty_preset = preset;
  if (Object.keys(cb).length) overrides.chaos_bag = cb; else delete overrides.chaos_bag;

  // pools
  const mAdd = document.getElementById('ov-myth-add').value.split(',').map(s => s.trim()).filter(Boolean);
  const mRm = document.getElementById('ov-myth-rm').value.split(',').map(s => s.trim()).filter(Boolean);
  const mp2 = {};
  if (mAdd.length) mp2.add_cards = mAdd.map(id => ({ mythos_card_id: id, weight: 1 }));
  if (mRm.length) mp2.remove_cards = mRm.map(id => ({ mythos_card_id: id }));
  if (Object.keys(mp2).length) overrides.mythos_pool = mp2; else delete overrides.mythos_pool;

  const eAdd = document.getElementById('ov-enc-add').value.split(',').map(s => s.trim()).filter(Boolean);
  const eRm = document.getElementById('ov-enc-rm').value.split(',').map(s => s.trim()).filter(Boolean);
  const ep = {};
  if (eAdd.length) ep.add_cards = eAdd.map(id => ({ encounter_card_id: id, weight: 1 }));
  if (eRm.length) ep.remove_cards = eRm.map(id => ({ encounter_card_id: id }));
  if (Object.keys(ep).length) overrides.encounter_pool = ep; else delete overrides.encounter_pool;

  return overrides;
}

async function saveReturnOverrides() {
  let overrides;
  try { overrides = collectOverrides(); } catch (e) { alert(e.message); return; }
  const payload = {
    return_stage_number: parseInt(document.getElementById('return-stage-number').value, 10) || 1,
    return_overrides: overrides,
  };
  const { ok, data } = await apiJson(`/api/stages/${currentStage.id}`, {
    method: 'PUT', body: JSON.stringify(payload)
  });
  if (!ok) { alert('儲存失敗：' + (data.error || '')); return; }
  await reloadStage();
  showToast('覆寫已儲存', 'success');
}

async function runCompletenessCheck() {
  if (!currentStage) return;
  const report = {
    metadata: checkMetadata(),
    scenarios: checkScenarios(),
    decks: checkDecks(),
    pools: checkPools(),
    references: await checkReferences(),
    typeSpecific: checkTypeSpecific(),
  };
  renderCompletenessReport(report);
}

function checkMetadata() {
  return [
    { pass: !!currentStage.name_zh, label: '中文名稱已填寫' },
    { pass: !!currentStage.narrative && currentStage.narrative.length >= 30, label: '敘事定位（≥30 字）' },
  ];
}

function checkScenarios() {
  const scs = currentStage.scenarios || [];
  const starting = scs.find(s => s.scenario_order === 1);
  return [
    { pass: scs.length >= 1, label: '至少 1 個場景' },
    { pass: !!starting && (starting.initial_location_codes || []).length >= 1, label: '起始場景至少 1 個初始地點' },
    { pass: !!starting?.investigator_spawn_location, label: '起始場景有指定調查員進場地點' },
  ];
}

function checkDecks() {
  return [
    { pass: (currentStage.act_cards || []).length >= 2, label: '至少 2 張目標卡' },
    { pass: (currentStage.agenda_cards || []).length >= 2, label: '至少 2 張議案卡' },
  ];
}

function checkPools() {
  return [
    { pass: currentStage.chaos_bag && Object.keys(currentStage.chaos_bag.number_markers || {}).length > 0, label: '混沌袋數字標記已配置' },
    { pass: (currentStage.monster_pool || []).some(p => p.role === 'primary'), label: '至少 1 個主家族' },
  ];
}

async function checkReferences() {
  try {
    const { ok, data } = await apiJson(`/api/stages/${currentStage.id}/references-check`);
    if (!ok) return [{ pass: false, label: '引用檢查失敗' }];
    const m = data.data.missing;
    return [
      { pass: !m.flags.length, label: '所有引用的旗標都存在', details: m.flags.length ? '缺漏：' + m.flags.join(', ') : null },
      { pass: !m.locations.length, label: '所有引用的地點都存在', details: m.locations.length ? '缺漏：' + m.locations.join(', ') : null },
      { pass: !m.families.length, label: '所有引用的家族都存在', details: m.families.length ? '缺漏：' + m.families.join(', ') : null },
      { pass: !m.mythos_cards.length, label: '所有神話卡引用都存在', details: m.mythos_cards.length ? '缺漏：' + m.mythos_cards.join(', ') : null },
      { pass: !m.encounter_cards.length, label: '所有遭遇卡引用都存在', details: m.encounter_cards.length ? '缺漏：' + m.encounter_cards.join(', ') : null },
      { pass: !m.boss_ids.length, label: '所有固定頭目都存在', details: m.boss_ids.length ? '缺漏：' + m.boss_ids.join(', ') : null },
    ];
  } catch (e) { return [{ pass: false, label: '引用檢查失敗：' + e.message }]; }
}

function checkTypeSpecific() {
  switch (currentStage.stage_type) {
    case 'main': return [
      { pass: !!currentStage.chapter_id, label: '已綁定章節' },
      { pass: (currentStage.completion_flags || []).length > 0, label: '至少授予 1 個通關旗標' },
      { pass: (currentStage.mythos_pool || []).length > 0, label: '神話卡池至少 1 張（主線需要）' },
    ];
    case 'side': return [
      { pass: (currentStage.completion_flags || []).length === 0, label: '不產生任何旗標（支線規則）' },
    ];
    case 'side_return': return [
      { pass: !!currentStage.return_parent_id, label: '已指定原始支線關卡' },
      { pass: Object.keys(currentStage.return_overrides || {}).length > 0, label: 'Overrides 中至少有一項變化' },
    ];
    case 'side_random':
      const gen = currentStage.random_generator;
      return [
        { pass: gen && (gen.location_pool || []).length >= 5, label: '地點池至少 5 個候選地點' },
        { pass: (gen?.topology_rules?.min_count || 0) >= 3, label: '拓撲地點下限 ≥ 3' },
        { pass: (gen?.act_template_pool?.templates || []).length >= 1, label: '目標模板池至少 1 套' },
        { pass: !!gen?.seed_verified_at, label: '種子驗證器至少執行過 1 次' },
      ];
  }
  return [];
}

function renderCompletenessReport(report) {
  const all = [...report.metadata, ...report.scenarios, ...report.decks, ...report.pools, ...report.references, ...report.typeSpecific];
  const allPass = all.every(c => c.pass);
  document.getElementById('overall-badge').innerHTML = allPass
    ? '<span class="status-ok">✓ 可發佈</span>'
    : '<span class="status-fail">✗ 尚未就緒</span>';
  document.getElementById('overall-message').textContent = allPass
    ? '所有檢查通過，關卡可設為「已發佈」。'
    : '以下項目未通過檢查，請先修正。';
  renderCheckList('checks-metadata', report.metadata);
  renderCheckList('checks-scenarios', report.scenarios);
  renderCheckList('checks-decks', report.decks);
  renderCheckList('checks-pools', report.pools);
  renderCheckList('checks-references', report.references);
  renderCheckList('checks-type-specific', report.typeSpecific);
}

function renderCheckList(id, checks) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = checks.map(c => `
    <li class="${c.pass ? 'pass' : 'fail'}">
      <span class="indicator">${c.pass ? '✓' : '✗'}</span>
      ${escapeHtml(c.label)}
      ${c.details ? `<div class="detail">${escapeHtml(c.details)}</div>` : ''}
    </li>
  `).join('');
}
