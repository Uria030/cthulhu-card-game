<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>關卡編輯器 | UG 後台</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-shared.css">
  <style>
    :root {
      --st-gold: #c9a961;
      --st-gold-dim: #8a7540;
      --st-success: #6b9c5a;
      --st-warn: #c99738;
      --st-danger: #c14a4a;
      --st-info: #5a8fc9;
    }
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-primary); color: var(--text-primary); }

    .layout-container {
      display: grid;
      grid-template-columns: 300px 1fr 340px;
      height: calc(100vh - 52px);
    }
    .left-panel, .right-panel { background: var(--bg-card); overflow-y: auto; }
    .left-panel { border-right: 1px solid var(--border); }
    .right-panel { border-left: 1px solid var(--border); }
    .main-panel { overflow-y: auto; padding: 0.9rem 1.1rem; }

    .panel-header {
      padding: 0.7rem 0.9rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .panel-header h2 {
      font-family: 'Cinzel', serif; font-size: 0.95rem;
      color: var(--st-gold); margin: 0;
    }
    .panel-filters {
      padding: 0.45rem 0.75rem; border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .panel-filters input, .panel-filters select {
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.3rem 0.5rem; font-family: inherit; font-size: 0.8rem;
    }

    .stage-group { margin-top: 0.4rem; }
    .stage-group-header {
      padding: 0.4rem 0.85rem; background: rgba(201,169,97,0.07);
      color: var(--st-gold-dim); font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.05em; margin: 0;
      font-family: 'Cinzel', serif;
    }
    .stage-item {
      padding: 0.55rem 0.85rem; border-bottom: 1px solid var(--border);
      cursor: pointer; border-left: 3px solid transparent;
      transition: background 0.1s, border-left-color 0.1s;
    }
    .stage-item:hover { background: rgba(201,169,97,0.06); }
    .stage-item.active {
      background: rgba(201,169,97,0.10);
      border-left-color: var(--st-gold);
    }
    .stage-name { font-size: 0.88rem; color: var(--text-primary); margin-bottom: 0.15rem; }
    .stage-meta {
      font-size: 0.7rem; color: var(--text-secondary);
      display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap;
    }
    .stage-meta code {
      background: var(--bg-primary); padding: 0.1rem 0.3rem; border-radius: 3px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.65rem;
    }
    .ch-label { color: var(--st-gold-dim); }
    .status-draft { color: var(--text-tertiary); }
    .status-review { color: var(--st-warn); }
    .status-published { color: var(--st-success); }

    .btn {
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.4rem 0.75rem; font-family: inherit; font-size: 0.8rem;
      cursor: pointer; transition: background 0.15s;
    }
    .btn:hover { background: rgba(201,169,97,0.12); border-color: var(--st-gold-dim); }
    .btn-primary {
      background: rgba(201,169,97,0.18); color: var(--st-gold);
      border-color: var(--st-gold-dim);
    }
    .btn-primary:hover { background: rgba(201,169,97,0.28); }
    .btn-danger {
      background: rgba(193,74,74,0.15); color: var(--st-danger);
      border-color: var(--st-danger);
    }
    .btn-sm { padding: 0.2rem 0.45rem; font-size: 0.72rem; }

    .editor-header {
      display: flex; align-items: baseline; gap: 0.75rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }
    .editor-header h2 {
      font-family: 'Cinzel', serif; color: var(--st-gold);
      font-size: 1.25rem; margin: 0;
    }
    .editor-meta { display: flex; gap: 0.5rem; font-size: 0.75rem; color: var(--text-tertiary); }
    .badge { padding: 0.1rem 0.45rem; border-radius: 3px; font-size: 0.7rem; border: 1px solid var(--border); }
    .badge-main { color: var(--st-gold); border-color: var(--st-gold-dim); }
    .badge-side { color: var(--st-info); border-color: var(--st-info); }
    .badge-return { color: var(--st-warn); border-color: var(--st-warn); }
    .badge-random { color: #a36ad6; border-color: #a36ad6; }

    .tab-bar {
      display: flex; flex-wrap: wrap; border-bottom: 2px solid var(--border);
      gap: 0; margin-bottom: 0.75rem;
    }
    .tab-btn {
      padding: 0.5rem 0.8rem; font-size: 0.82rem; background: transparent;
      color: var(--text-secondary); border: none; border-bottom: 2px solid transparent;
      cursor: pointer; font-family: inherit; margin-bottom: -2px;
    }
    .tab-btn:hover { color: var(--st-gold); }
    .tab-btn.active {
      color: var(--st-gold); border-bottom-color: var(--st-gold);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .editor-section {
      margin-bottom: 1rem; padding: 0.9rem;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    }
    .editor-section h3 {
      font-family: 'Cinzel', serif; color: var(--st-gold);
      font-size: 1rem; margin: 0 0 0.6rem; padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }
    .editor-section h4 { color: var(--st-gold-dim); font-size: 0.85rem; margin: 0.6rem 0 0.35rem; }
    .editor-section h5 { color: var(--text-secondary); font-size: 0.78rem; margin: 0.5rem 0 0.3rem; }
    .editor-section label {
      display: block; margin-bottom: 0.55rem; font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .editor-section label > input[type=text], .editor-section label > input[type=number],
    .editor-section label > select, .editor-section label > textarea,
    .editor-section input[type=text], .editor-section input[type=number],
    .editor-section select, .editor-section textarea {
      width: 100%; box-sizing: border-box;
      background: var(--bg-primary); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.35rem 0.5rem; font-family: inherit; font-size: 0.85rem;
      margin-top: 0.15rem;
    }
    .editor-section textarea { min-height: 70px; resize: vertical; }
    .hint { font-size: 0.72rem; color: var(--text-tertiary); margin: 0.2rem 0; }
    .empty { color: var(--text-tertiary); font-size: 0.8rem; padding: 0.5rem; text-align: center; }
    .placeholder { color: var(--text-tertiary); padding: 1.5rem; text-align: center; font-size: 0.85rem; }

    .scaling-grid, .rewards-editor-grid, .penalties-grid, .topology-grid, .reward-rules-grid, .number-markers-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.5rem;
    }
    .encounter-draws-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.3rem; margin-top: 0.2rem; }

    .editor-footer {
      display: flex; justify-content: space-between; gap: 0.5rem;
      margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border);
    }
    .editor-footer > div { display: flex; gap: 0.5rem; }

    /* Dialogs */
    .dialog {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .dialog-content {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.25rem;
      max-width: 90vw; max-height: 85vh; overflow-y: auto;
      min-width: 400px;
    }
    .dialog-large .dialog-content { width: 85vw; max-width: 1000px; min-height: 60vh; }
    .dialog h3 {
      font-family: 'Cinzel', serif; color: var(--st-gold);
      margin: 0 0 0.75rem; font-size: 1.1rem;
    }
    .dialog-footer {
      display: flex; justify-content: space-between; gap: 0.5rem;
      margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border);
    }
    .dialog-footer > div { display: flex; gap: 0.5rem; }

    /* Scenarios */
    .scenarios-layout { display: grid; grid-template-columns: 260px 1fr; gap: 1rem; }
    .scenario-item {
      padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 5px;
      margin-bottom: 0.4rem; cursor: pointer; background: var(--bg-card);
    }
    .scenario-item.active { border-color: var(--st-gold); background: rgba(201,169,97,0.10); }
    .scenario-header { display: flex; gap: 0.4rem; align-items: center; margin-bottom: 0.25rem; font-size: 0.82rem; }
    .scenario-actions { display: flex; gap: 0.25rem; justify-content: flex-end; }
    .badge-starting { background: rgba(107,156,90,0.25); color: var(--st-success); padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.65rem; }
    .badge-memo { background: rgba(100,100,100,0.25); color: var(--text-secondary); padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.65rem; }

    /* Card list/editor common */
    .cards-layout { display: grid; grid-template-columns: 260px 1fr; gap: 1rem; }
    .card-item {
      padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 5px;
      margin-bottom: 0.4rem; cursor: pointer; background: var(--bg-card);
    }
    .card-item.active { border-color: var(--st-gold); background: rgba(201,169,97,0.10); }
    .card-order { font-size: 0.7rem; color: var(--st-gold-dim); }
    .card-name { font-size: 0.88rem; margin-bottom: 0.15rem; }
    .objective-badge {
      display: inline-block; font-size: 0.65rem; padding: 0.05rem 0.3rem;
      background: rgba(74,124,155,0.2); border-radius: 3px; color: var(--st-info);
      margin-right: 0.2rem;
    }
    .card-face { margin-top: 0.75rem; }
    .card-front { border-left: 3px solid var(--st-info); padding-left: 0.75rem; }
    .card-back { border-left: 3px solid var(--st-gold); padding-left: 0.75rem; }

    /* Map ops editor */
    .map-ops-editor .ops-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.5rem; }
    .op-row {
      display: grid; grid-template-columns: 20px 1fr 2fr auto;
      gap: 0.5rem; align-items: center;
      padding: 0.5rem; background: var(--bg-primary);
      border: 1px solid var(--border); border-radius: 5px;
    }
    .op-handle { color: var(--text-tertiary); font-size: 1rem; cursor: grab; text-align: center; }
    .op-verb-display { font-size: 0.82rem; }
    .op-verb-display .op-icon { margin-right: 0.3rem; }
    .op-params {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.35rem;
    }
    .op-params .param-label { font-size: 0.68rem; color: var(--text-tertiary); margin-bottom: 0.1rem; }
    .op-params .param-input, .op-params select {
      width: 100%; box-sizing: border-box;
      background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 0.2rem 0.35rem; font-size: 0.75rem;
    }
    .op-actions { display: flex; gap: 0.2rem; }
    .location-chip {
      display: inline-block; padding: 0.15rem 0.4rem; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 3px;
      font-size: 0.72rem; margin-right: 0.2rem;
    }
    .location-chip.empty { color: var(--text-tertiary); }
    .param-location-picker, .param-location-picker-multi {
      display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center;
    }

    /* Verb picker grid */
    .verb-picker-grid { display: flex; flex-direction: column; gap: 0.75rem; }
    .verb-group h4 { color: var(--st-gold-dim); font-size: 0.8rem; margin: 0 0 0.35rem; }
    .verb-buttons {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.4rem;
    }
    .verb-btn {
      display: flex; flex-direction: column; align-items: flex-start;
      padding: 0.55rem 0.7rem; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 5px;
      cursor: pointer; font-family: inherit; color: var(--text-primary);
      text-align: left;
    }
    .verb-btn:hover { border-color: var(--st-gold); background: rgba(201,169,97,0.10); }
    .verb-btn .verb-icon { font-size: 1.2rem; margin-bottom: 0.15rem; }
    .verb-btn .verb-name { font-size: 0.82rem; color: var(--st-gold); }
    .verb-btn .verb-desc { font-size: 0.68rem; color: var(--text-tertiary); margin-top: 0.15rem; }

    /* Location picker */
    .loc-picker-list {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.5rem; max-height: 55vh; overflow-y: auto; padding: 0.5rem 0;
    }
    .loc-card {
      padding: 0.55rem 0.7rem; border: 1px solid var(--border); border-radius: 5px;
      cursor: pointer; background: var(--bg-primary);
    }
    .loc-card:hover { border-color: var(--st-gold-dim); }
    .loc-card.selected { border-color: var(--st-gold); background: rgba(201,169,97,0.12); }
    .loc-card-header { display: flex; justify-content: space-between; margin-bottom: 0.25rem; }
    .loc-card-header strong { color: var(--st-gold); font-size: 0.85rem; }
    .loc-card-header code { font-size: 0.68rem; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }
    .loc-card-body { font-size: 0.72rem; color: var(--text-secondary); display: flex; gap: 0.5rem; }
    .weight-input { display: inline-flex; align-items: center; gap: 0.3rem; margin-top: 0.3rem; font-size: 0.72rem; }
    .weight-input input { width: 50px; padding: 0.1rem 0.3rem; }
    .loc-picker-toolbar { display: flex; gap: 0.35rem; margin-bottom: 0.5rem; }
    .loc-picker-toolbar input, .loc-picker-toolbar select { padding: 0.3rem 0.5rem; font-size: 0.8rem; }

    /* Pool tables */
    .pool-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .pool-table th, .pool-table td {
      text-align: left; padding: 0.35rem 0.5rem; border-bottom: 1px solid var(--border);
    }
    .pool-table th { color: var(--st-gold-dim); font-family: 'Cinzel', serif; font-size: 0.75rem; }
    .picker-list {
      max-height: 55vh; overflow-y: auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.5rem; padding: 0.5rem 0;
    }
    .picker-card {
      padding: 0.5rem 0.65rem; border: 1px solid var(--border); border-radius: 5px;
      cursor: pointer; background: var(--bg-primary);
    }
    .picker-card.selected { border-color: var(--st-gold); background: rgba(201,169,97,0.12); }
    .picker-card-header { display: flex; justify-content: space-between; margin-bottom: 0.25rem; }
    .picker-card-header strong { color: var(--st-gold); font-size: 0.88rem; }
    .picker-card-body { font-size: 0.75rem; color: var(--text-secondary); }

    /* Monster pool */
    .family-pool-row {
      padding: 0.6rem 0.85rem; border: 1px solid var(--border); border-radius: 5px;
      margin-bottom: 0.4rem; background: var(--bg-primary);
    }
    .family-pool-row.primary { border-left: 3px solid var(--st-gold); }
    .family-pool-row.secondary { border-left: 3px solid var(--st-info); }
    .family-tiers { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; align-items: center; }
    .tier-chip {
      font-size: 0.72rem; color: var(--text-secondary);
      display: inline-flex; gap: 0.25rem; align-items: center;
    }
    .role-badge { font-size: 0.68rem; padding: 0.1rem 0.4rem; border-radius: 3px; margin-right: 0.3rem; }
    .role-primary { background: rgba(201,169,97,0.2); color: var(--st-gold); }
    .role-secondary { background: rgba(90,143,201,0.2); color: var(--st-info); }
    .tier-badge { font-size: 0.68rem; padding: 0.1rem 0.4rem; border-radius: 3px; background: var(--bg-primary); border: 1px solid var(--border); }
    .family-card, .boss-card {
      padding: 0.55rem 0.7rem; border: 1px solid var(--border); border-radius: 5px;
      cursor: pointer; background: var(--bg-primary); margin-bottom: 0.35rem;
    }
    .family-card:hover, .boss-card:hover { border-color: var(--st-gold); }

    /* Chaos bag */
    .difficulty-presets { display: flex; gap: 0.35rem; margin-top: 0.4rem; }
    .scenario-marker-row, .mythos-marker-row {
      display: grid; grid-template-columns: 1fr 1.5fr 100px 1fr;
      gap: 0.5rem; align-items: end;
      padding: 0.5rem; background: var(--bg-primary);
      border: 1px solid var(--border); border-radius: 4px;
      margin-bottom: 0.4rem;
    }
    .mythos-marker-row { grid-template-columns: 1fr 100px; }
    .family-suggestion { font-size: 0.7rem; }
    .family-suggestion button { font-size: 0.7rem; padding: 0.1rem 0.35rem; margin-left: 0.3rem; }
    .chaos-bag-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.4rem; font-size: 0.85rem; }
    .chaos-bag-stats p { margin: 0; padding: 0.4rem 0.6rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 4px; }

    /* Return overrides */
    .overrides-layout { display: grid; grid-template-columns: 1fr 1.4fr; gap: 1rem; }
    .original-pane, .overrides-pane {
      padding: 0.75rem; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px;
    }
    .original-pane h3, .overrides-pane h3 { font-family: 'Cinzel', serif; color: var(--st-gold); margin: 0 0 0.5rem; font-size: 0.95rem; }
    .readonly-fields dt { font-weight: bold; color: var(--st-gold-dim); margin-top: 0.35rem; font-size: 0.78rem; }
    .readonly-fields dd { margin: 0 0 0.25rem 0; font-size: 0.8rem; color: var(--text-secondary); }
    .mini-card, .mini-pool { padding: 0.35rem 0.55rem; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 0.3rem; font-size: 0.78rem; }
    .snippet { color: var(--text-tertiary); font-size: 0.75rem; margin: 0.2rem 0 0; }
    .override-subtab-bar { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
    .subtab-btn { padding: 0.35rem 0.65rem; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text-secondary); cursor: pointer; font-size: 0.78rem; font-family: inherit; }
    .subtab-btn.active { color: var(--st-gold); border-bottom-color: var(--st-gold); }
    .override-subtab, .gen-subtab { display: none; }
    .override-subtab.active, .gen-subtab.active { display: block; }
    .ov-indicator { font-size: 0.72rem; margin-right: 0.3rem; color: var(--text-tertiary); }
    .ov-indicator.has-override { color: var(--st-gold); }
    .original-value { color: var(--text-tertiary); font-size: 0.72rem; margin: 0.2rem 0 0; }
    .config-json { background: var(--bg-primary); padding: 0.4rem; border-radius: 4px; font-size: 0.7rem; overflow-x: auto; }

    /* Random generator */
    .random-gen-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1rem; }
    .gen-seed-verifier {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.75rem;
    }
    .gen-subtab-bar { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
    .preview-result section { margin-top: 0.6rem; }
    .preview-result h4, .preview-result h5 { color: var(--st-gold-dim); font-family: 'Cinzel', serif; font-size: 0.85rem; margin: 0.4rem 0 0.25rem; }
    .preview-result ul { padding-left: 1.2rem; font-size: 0.78rem; }

    /* Completeness */
    .completeness-summary {
      padding: 0.75rem; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 0.8rem; text-align: center;
    }
    .checks-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 0.6rem; }
    .check-section {
      padding: 0.6rem 0.8rem; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 6px;
    }
    .check-section h3 {
      font-family: 'Cinzel', serif; font-size: 0.9rem;
      color: var(--st-gold-dim); margin: 0 0 0.4rem;
    }
    .check-section ul { list-style: none; padding: 0; margin: 0; font-size: 0.82rem; }
    .check-section li { padding: 0.25rem 0; display: flex; gap: 0.4rem; align-items: start; }
    .check-section li.pass { color: var(--st-success); }
    .check-section li.fail { color: var(--st-danger); }
    .check-section .indicator { width: 1em; display: inline-block; }
    .check-section .detail { color: var(--text-tertiary); font-size: 0.72rem; margin-left: 1.4em; }
    .status-ok { color: var(--st-success); font-weight: bold; }
    .status-fail { color: var(--st-danger); font-weight: bold; }
    .warning-banner {
      padding: 0.5rem 0.75rem; background: rgba(201,151,56,0.15);
      color: var(--st-warn); border: 1px solid var(--st-warn); border-radius: 5px;
      margin-bottom: 0.5rem; font-size: 0.82rem;
    }

    /* AI key button */
    .nav-right { display: flex; gap: 0.5rem; align-items: center; }
    .key-ok { color: var(--st-success); border-color: var(--st-gold-dim); }

const CTHULHU_SYSTEM_BASE = `你是一個克蘇魯神話背景的卡牌合作冒險遊戲的敘事設計助手。

專案特色：
- 背景：1920-30 年代偵探黑色電影 × 宇宙恐怖
- 情感基調：渺小感、未知的不安、真實的代價、探索的驚奇
- 敘事風格：簡潔克制、重氛圍、避免過度血腥、保留想像空間

設計紅線：

- 不寫成恐怖片誇張式的血腥
- 不讓角色「無敵」或「樂觀」，保持克蘇魯宿命感
`;

// --- 工具 ---
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}
function markDirty() { dirty = true; }
function clearDirty() { dirty = false; }
function stageTypeLabel(t) { return ({ main: '主線', side: '支線', side_return: '重返版', side_random: '隨機地城' })[t] || t; }
function statusLabel(s) { return ({ draft: '草稿', review: '審核中', published: '已發佈' })[s] || s; }
function tierLabel(t) { return ({ minion: '雜兵', threat: '威脅', elite: '精英', boss: '頭目', titan: '巨頭' })[t] || t; }
function scaleLabel(s) { return ({ room: '房間', block: '街區', city: '城市', intercontinental: '跨國' })[s] || s || '-'; }
function objectiveTypeLabel(t) { return ({ seal_gate: '封印次元門', defeat_titan: '擊敗巨頭', uncover_truth: '發覺真相', escape: '逃脫', endurance: '撐時間' })[t] || t; }

function showToast(msg, type = 'info') {

  setTimeout(() => t.remove(), 3000);

async function apiJson(url, opts) {

// --- Gemini ---
function getGeminiKey() { return localStorage.getItem('gemini_api_key') || ''; }
function promptApiKey() {
  const key = prompt('請輸入 Gemini API Key（儲存於瀏覽器本機）：', getGeminiKey());
  if (key !== null) {
    localStorage.setItem('gemini_api_key', key.trim());
    updateApiKeyStatus();
  }
}
function updateApiKeyStatus() {
  const el = document.getElementById('ai-key-status');
  if (!el) return;
  if (getGeminiKey()) {
    el.textContent = '🔑 已設定';
    el.className = 'btn btn-sm key-ok';
  } else {
    el.textContent = '⚠️ 未設定';
    el.className = 'btn btn-sm key-missing';
  }
}
async function callGemini(systemPrompt, userPrompt) {
  const key = getGeminiKey();
  if (!key) { alert('請先設定 Gemini API Key'); promptApiKey(); throw new Error('no_api_key'); }
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
  const body = {
    contents: [{ role: 'user', parts: [{ text: systemPrompt + '\n\n' + userPrompt }] }],
    generationConfig: { temperature: 0.9, topP: 0.95, maxOutputTokens: 2048 }
  };
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) { const err = await res.text(); throw new Error(`Gemini API 錯誤：${err.substring(0, 200)}`); }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}
function extractJson(text) {
  const cleaned = text.replace(/```json\s*/gi, '').replace(/```\s*$/g, '').trim();
  try { return JSON.parse(cleaned); } catch (e) {
    const m = cleaned.match(/\{[\s\S]*\}/);
    if (m) { try { return JSON.parse(m[0]); } catch (e2) { throw new Error('AI 回應無法解析為 JSON'); } }
    throw new Error('AI 回應不含 JSON');
  }
}
async function aiTranslate(srcId, tgtId) {
  const src = document.getElementById(srcId)?.value?.trim();
  if (!src) { showToast('請先填寫中文內容', 'warn'); return; }
  try {
    const resp = await callGemini(CTHULHU_SYSTEM_BASE,
      `請將以下繁體中文翻譯為英文，採用 Lovecraftian 風格，專有名詞使用英文原名（Cthulhu, Nyarlathotep, Innsmouth 等），僅回傳英文翻譯：\n\n${src}`);
    document.getElementById(tgtId).value = resp.trim();
    markDirty();
    showToast('翻譯完成', 'success');
  } catch (e) { showToast('翻譯失敗：' + e.message, 'error'); }
}

async function loadStageList() {
  const { ok, data } = await apiJson('/api/stages');
  if (!ok) { showToast('載入關卡列表失敗', 'error'); return; }
  currentStageList = data.data || [];
  renderStageList();
}

async function loadChaptersForFilter() {
  const { ok, data } = await apiJson('/api/campaigns');
  if (!ok) return;
  const campaigns = data.data || [];
  // 合併所有戰役的章節
  const chSel = document.getElementById('stage-chapter-filter');
  const chMap = new Map();
  for (const c of campaigns) {
    const chr = await apiJson(`/api/campaigns/${c.id}/chapters`);
    if (chr.ok) for (const ch of (chr.data.data || [])) {
      chMap.set(ch.id, { ...ch, campaign_name: c.name_zh });
    }
  }
  for (const [id, ch] of chMap) {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = `[${ch.campaign_name}] 第 ${ch.chapter_number} 章 ${ch.name_zh}`;
    chSel.appendChild(opt);
  }
}

function renderStageList() {
  const search = document.getElementById('stage-search').value.toLowerCase();
  const typeF = document.getElementById('stage-type-filter').value;
  const chapterF = document.getElementById('stage-chapter-filter').value;
  const statusF = document.getElementById('stage-status-filter').value;

  const filtered = currentStageList.filter(s => {
    if (search && !s.name_zh.toLowerCase().includes(search) && !s.code.toLowerCase().includes(search)) return false;
    if (typeF && s.stage_type !== typeF) return false;
    if (chapterF && s.chapter_id !== chapterF) return false;
    if (statusF && s.design_status !== statusF) return false;
    return true;
  });

  const groups = { main: [], side: [], side_return: [], side_random: [] };
  filtered.forEach(s => { (groups[s.stage_type] || []).push(s); });

  const container = document.getElementById('stage-list');
  container.innerHTML = '';
  if (filtered.length === 0) {
    container.innerHTML = '<p class="empty">無關卡</p>';
    return;
  }
  for (const [type, list] of Object.entries(groups)) {
    if (!list.length) continue;
    const g = document.createElement('div');
    g.className = 'stage-group';
    g.innerHTML = `<h4 class="stage-group-header">${stageTypeLabel(type)} (${list.length})</h4>` +
      list.map(renderStageListItem).join('');
    container.appendChild(g);
  }
}

function renderStageListItem(s) {
  const chLabel = s.chapter_number ? `<span class="ch-label">第 ${s.chapter_number} 章</span>` : '';
  const active = currentStage?.id === s.id ? 'active' : '';
  return `
    <div class="stage-item ${active}" onclick="selectStage('${s.id}')">
      <div class="stage-name">${escapeHtml(s.name_zh || '(未命名)')}</div>
      <div class="stage-meta">
        ${chLabel}
        <code>${escapeHtml(s.code)}</code>
        <span class="status-${s.design_status}">${statusLabel(s.design_status)}</span>
      </div>
    </div>
  `;
}

async function selectStage(stageId) {
  if (dirty && !confirm('有未儲存變更，要放棄嗎？')) return;
  clearDirty();
  const { ok, data } = await apiJson(`/api/stages/${stageId}`);
  if (!ok) { showToast('載入關卡失敗', 'error'); return; }
  currentStage = data.data;
  currentScenario = null;
  currentActCard = null;
  currentAgendaCard = null;

  // 載入戰役旗標字典
  currentCampaignFlags = [];
  if (currentStage.stage_type === 'main' && currentStage.campaign_id) {
    const fRes = await apiJson(`/api/campaigns/${currentStage.campaign_id}/flags`);
    if (fRes.ok) currentCampaignFlags = fRes.data.data || [];
  }

  document.getElementById('no-stage-placeholder').style.display = 'none';
  document.getElementById('stage-editor').style.display = '';
  document.getElementById('editor-title').textContent = currentStage.name_zh;
  const tb = document.getElementById('editor-type-badge');
  tb.textContent = stageTypeLabel(currentStage.stage_type);
  tb.className = 'badge badge-' + (currentStage.stage_type === 'side_return' ? 'return'
    : currentStage.stage_type === 'side_random' ? 'random'
    : currentStage.stage_type === 'side' ? 'side' : 'main');
  const sb = document.getElementById('editor-status-badge');
  sb.textContent = statusLabel(currentStage.design_status);
  sb.className = 'badge status-' + currentStage.design_status;
  document.getElementById('editor-version').textContent = `v${currentStage.version}`;

  updateConditionalTabs();
  switchTab('overview');
  renderStageList();
}

function updateConditionalTabs() {
  if (!currentStage) return;
  document.querySelectorAll('.tab-conditional').forEach(btn => {
    const req = btn.dataset.stageType;
    btn.style.display = currentStage.stage_type === req ? '' : 'none';
  });
}

async function reloadStage() {
  if (!currentStage) return;
  const { ok, data } = await apiJson(`/api/stages/${currentStage.id}`);
  if (!ok) return;
  currentStage = data.data;
  clearDirty();
  switchTab(currentTab);
}

function switchTab(tabName) {
  if (dirty && currentTab !== tabName && !confirm('有未儲存變更，要放棄嗎？')) return;
  clearDirty();
  currentTab = tabName;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tabName);
  });
  document.querySelectorAll('.tab-content').forEach(s => {
    s.classList.toggle('active', s.id === 'tab-' + tabName);
  });

  switch (tabName) {
    case 'overview': renderOverviewTab(); break;
    case 'scenarios': renderScenariosTab(); break;
    case 'act-cards': renderActCardsTab(); break;
    case 'agenda-cards': renderAgendaCardsTab(); break;
    case 'encounter-pool': renderEncounterPoolTab(); break;
    case 'mythos-pool': renderMythosPoolTab(); break;
    case 'chaos-bag': renderChaosBagTab(); break;
    case 'monster-pool': renderMonsterPoolTab(); break;
    case 'return-overrides': renderReturnOverridesTab(); break;
    case 'random-generator': renderRandomGeneratorTab(); break;
    case 'completeness': renderCompletenessTab(); break;
  }
  updateRightPanel();
}

// 建立關卡對話框
// ══════════════════════════════════════════════
async function openCreateStageDialog() {
  document.getElementById('new-stage-code').value = '';
  document.getElementById('new-stage-name-zh').value = '';
  const type = document.getElementById('new-stage-type');
  type.value = 'main';
  onNewStageTypeChange();

  // 載入戰役
  const { ok, data } = await apiJson('/api/campaigns');
  const csel = document.getElementById('new-stage-campaign');
  csel.innerHTML = '<option value="">(選擇戰役)</option>';
  if (ok) for (const c of (data.data || [])) {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.name_zh;
    csel.appendChild(o);
  }
  document.getElementById('new-stage-chapter').innerHTML = '<option value="">(先選擇戰役)</option>';

  // 載入 side 關卡給重返版選
  const psel = document.getElementById('new-stage-parent');
  psel.innerHTML = '<option value="">(載入中)</option>';
  const sides = currentStageList.filter(s => s.stage_type === 'side');
  psel.innerHTML = '<option value="">(選擇支線)</option>' +
    sides.map(s => `<option value="${s.id}">${escapeHtml(s.name_zh)} (${escapeHtml(s.code)})</option>`).join('');

  openDialog('create-stage');
}

function onNewStageTypeChange() {
  const type = document.getElementById('new-stage-type').value;
  document.getElementById('new-stage-chapter-section').style.display = type === 'main' ? '' : 'none';
  document.getElementById('new-stage-parent-section').style.display = type === 'side_return' ? '' : 'none';
}

async function onNewCampaignChange() {
  const cid = document.getElementById('new-stage-campaign').value;
  const csel = document.getElementById('new-stage-chapter');
  csel.innerHTML = '<option value="">(載入中)</option>';
  if (!cid) { csel.innerHTML = '<option value="">(先選擇戰役)</option>'; return; }
  const { ok, data } = await apiJson(`/api/campaigns/${cid}/chapters`);
  csel.innerHTML = '<option value="">(選擇章節)</option>';
  if (ok) for (const ch of (data.data || [])) {
    const o = document.createElement('option');
    o.value = ch.id; o.textContent = `第 ${ch.chapter_number} 章 ${ch.name_zh || ch.chapter_code}`;
    csel.appendChild(o);
  }
}

async function confirmCreateStage() {
  const type = document.getElementById('new-stage-type').value;
  const code = document.getElementById('new-stage-code').value.trim();
  const name = document.getElementById('new-stage-name-zh').value.trim();
  if (!code || !name) { alert('請填代碼與中文名稱'); return; }

  const body = { code, name_zh: name, stage_type: type };
  if (type === 'main') {
    const chId = document.getElementById('new-stage-chapter').value;
    if (!chId) { alert('請選擇章節'); return; }
    body.chapter_id = chId;
  }
  if (type === 'side_return') {
    const p = document.getElementById('new-stage-parent').value;
    if (!p) { alert('請選擇原始支線'); return; }
    body.return_parent_id = p;
    body.return_stage_number = parseInt(document.getElementById('new-stage-return-number').value, 10) || 1;
  }
  const { ok, data } = await apiJson('/api/stages', {
    method: 'POST', body: JSON.stringify(body)
  });
  if (!ok) { alert('建立失敗：' + (data.error || '')); return; }
  closeDialog('create-stage');
  await loadStageList();
  selectStage(data.data.id);
  showToast('關卡已建立', 'success');
}

function renderFlagMultiSelect(selected) {
  if (!currentCampaignFlags.length) {
    return '<p class="empty">此戰役尚無旗標字典（請先於 MOD-06 建立）</p>';
  }
  const selectedCodes = new Set((selected || []).map(x => typeof x === 'string' ? x : x.flag_code));
  return `
    <div style="display:flex;flex-wrap:wrap;gap:0.3rem;">
      ${currentCampaignFlags.map(f => `
        <label style="display:inline-flex;gap:0.3rem;align-items:center;padding:0.2rem 0.5rem;background:var(--bg-primary);border:1px solid var(--border);border-radius:4px;font-size:0.78rem">
          <input type="checkbox" class="completion-flag-chk" value="${escapeHtml(f.flag_code)}" ${selectedCodes.has(f.flag_code) ? 'checked' : ''} onchange="markDirty()">
          ${escapeHtml(f.flag_code)}
        </label>
      `).join('')}
    </div>
  `;
}

function collectScalingRules() {
  return {
    enemy_hp_per_player: parseFloat(document.getElementById('scale-enemy-hp')?.value) || 0,
    clue_multiplier: parseFloat(document.getElementById('scale-clues')?.value) || 1,
    encounter_draws: {
      1: parseInt(document.getElementById('scale-enc-1p')?.value, 10) || 1,
      2: parseInt(document.getElementById('scale-enc-2p')?.value, 10) || 1,
      3: parseInt(document.getElementById('scale-enc-3p')?.value, 10) || 2,
      4: parseInt(document.getElementById('scale-enc-4p')?.value, 10) || 2,
    }
  };
}

function collectCompletionFlags() {
  const out = [];
  document.querySelectorAll('.completion-flag-chk:checked').forEach(el => out.push(el.value));
  return out;
}

async function saveStage() {
  if (!currentStage) return;
  const payload = {
    name_zh: document.getElementById('stage-name-zh').value,
    name_en: document.getElementById('stage-name-en').value,
    narrative: document.getElementById('stage-narrative').value,
    design_status: document.getElementById('stage-design-status').value,
    scaling_rules: collectScalingRules(),
  };
  if (currentStage.stage_type === 'main') {
    const ecText = document.getElementById('stage-entry-condition')?.value?.trim();
    if (ecText) {
      try { payload.entry_condition = JSON.parse(ecText); }
      catch (e) { alert('進入條件 JSON 格式錯誤'); return; }
    } else payload.entry_condition = null;
    payload.completion_flags = collectCompletionFlags();
  } else if (currentStage.stage_type === 'side') {
    payload.side_signature_card_id = document.getElementById('stage-signature-card')?.value?.trim() || null;
    const ecText = document.getElementById('stage-entry-condition')?.value?.trim();
    if (ecText) try { payload.entry_condition = JSON.parse(ecText); } catch (e) { alert('進入條件 JSON 格式錯誤'); return; }
  }
  const { ok, data } = await apiJson(`/api/stages/${currentStage.id}`, {
    method: 'PUT', body: JSON.stringify(payload)
  });
  if (!ok) { alert('儲存失敗：' + (data.error || '未知錯誤')); return; }
  await loadStageList();
  await reloadStage();
  showToast('關卡已儲存', 'success');
}

async function deleteStage() {
  if (!currentStage) return;
  if (!confirm(`確定刪除關卡「${currentStage.name_zh}」？此操作無法還原`)) return;
  const { ok, data } = await apiJson(`/api/stages/${currentStage.id}`, { method: 'DELETE' });
  if (!ok) {
    if (data.dependent_returns) {
      alert('無法刪除，有以下重返版依賴：\n' + data.dependent_returns.map(r => `• ${r.name_zh}`).join('\n'));
    } else alert('刪除失敗：' + (data.error || ''));
    return;
  }
  currentStage = null;
  document.getElementById('no-stage-placeholder').style.display = '';
  document.getElementById('stage-editor').style.display = 'none';
  await loadStageList();
  showToast('關卡已刪除', 'success');
}

async function exportStageJSON() {
  if (!currentStage) return;
  const res = await adminFetch(`/api/stages/${currentStage.id}/export`);
  const data = await res.json();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `stage_${currentStage.code}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function renderScenariosTab() {
  if (!currentStage) return;
  document.getElementById('tab-scenarios').innerHTML = `
    <div class="scenarios-layout">
      <div>
        <button class="btn btn-primary btn-sm" onclick="addScenario()">＋ 新增場景</button>
        <div id="scenarios-list" style="margin-top:0.5rem"></div>
      </div>
      <div id="scenario-editor-container">
        <div class="placeholder">請選擇或新增場景</div>
      </div>
    </div>
  `;
  renderScenariosList();
  if (currentScenario) renderScenarioEditor();
}

function renderScenariosList() {
  const list = document.getElementById('scenarios-list');
  if (!list) return;
  const scs = currentStage.scenarios || [];
  if (!scs.length) {
    list.innerHTML = '<p class="empty">尚未新增場景</p>';
    return;
  }
  list.innerHTML = scs.map((s, idx) => `
    <div class="scenario-item ${currentScenario?.id === s.id ? 'active' : ''}" onclick="selectScenario('${s.id}')">
      <div class="scenario-header">
        <span style="color:var(--text-tertiary)">#${s.scenario_order}</span>
        ${s.scenario_order === 1 ? '<span class="badge-starting">起始</span>' : '<span class="badge-memo">備忘錄</span>'}
        <span>${escapeHtml(s.name_zh || '(未命名)')}</span>
      </div>
      <div class="scenario-actions">
        ${idx > 0 ? `<button class="btn btn-sm" onclick="moveScenario('${s.id}', -1); event.stopPropagation()">↑</button>` : ''}
        ${idx < scs.length - 1 ? `<button class="btn btn-sm" onclick="moveScenario('${s.id}', 1); event.stopPropagation()">↓</button>` : ''}
        ${s.scenario_order !== 1 ? `<button class="btn btn-sm btn-danger" data-min-role="admin" onclick="deleteScenario('${s.id}'); event.stopPropagation()">🗑</button>` : ''}
      </div>
    </div>
  `).join('');
}

function selectScenario(id) {
  if (dirty && !confirm('有未儲存變更，要放棄嗎？')) return;
  clearDirty();
  currentScenario = (currentStage.scenarios || []).find(s => s.id === id) || null;
  renderScenariosList();
  renderScenarioEditor();
  updateRightPanel();
}

async function addScenario() {
  if (!currentStage) return;
  const { ok, data } = await apiJson(`/api/stages/${currentStage.id}/scenarios`, {
    method: 'POST', body: JSON.stringify({ name_zh: '新場景' })
  });
  if (!ok) { showToast('新增失敗：' + (data.error || ''), 'error'); return; }
  await reloadStage();
  selectScenario(data.data.id);
}

async function moveScenario(id, delta) {
  const scs = currentStage.scenarios || [];
  const idx = scs.findIndex(s => s.id === id);
  const newOrder = scs[idx].scenario_order + delta;
  if (newOrder < 1) return;
  const { ok } = await apiJson(`/api/scenarios/${id}/reorder`, {
    method: 'POST', body: JSON.stringify({ new_order: newOrder })
  });
  if (ok) await reloadStage();
}

async function deleteScenario(id) {
  if (!confirm('確定刪除此場景？')) return;
  const { ok, data } = await apiJson(`/api/scenarios/${id}`, { method: 'DELETE' });
  if (!ok) { showToast('刪除失敗：' + (data.error || ''), 'error'); return; }
  if (currentScenario?.id === id) currentScenario = null;
  await reloadStage();
}

async function ensureLocationsCache() {
  if (allLocationsCache) return;
  const res = await adminFetch('/api/admin/locations');
  const data = await res.json();
  allLocationsCache = Array.isArray(data) ? data : (data.data || []);
}

async function renderScenarioEditor() {
  await ensureLocationsCache();
  const c = document.getElementById('scenario-editor-container');
  if (!currentScenario) { c.innerHTML = '<div class="placeholder">請選擇場景</div>'; return; }
  const s = currentScenario;
  const isStarting = s.scenario_order === 1;
  const locs = s.initial_location_codes || [];
  const conns = s.initial_connections || [];
  const enemies = s.initial_enemies || [];
  const env = s.initial_environment || {};

  c.innerHTML = `
    <section class="editor-section">
      <h3>場景基本資料 #${s.scenario_order}</h3>
      <label>中文名稱 <input type="text" id="sc-name-zh" value="${escapeHtml(s.name_zh || '')}" oninput="markDirty()"></label>
      <label>英文名稱
        <input type="text" id="sc-name-en" value="${escapeHtml(s.name_en || '')}" oninput="markDirty()">
        <button class="btn btn-sm" onclick="aiTranslate('sc-name-zh','sc-name-en')" type="button">中譯英</button>
      </label>
      <label>場景敘事
        <textarea id="sc-narrative" rows="4" oninput="markDirty()">${escapeHtml(s.narrative || '')}</textarea>
        <button class="btn btn-sm" onclick="aiGenerateSceneNarrative()" type="button">AI 生成</button>
      </label>
    </section>

    ${isStarting ? `
      <section class="editor-section">
        <h3>起始場景配置</h3>

        <h4>初始地點</h4>
        <div id="sc-initial-locations-chips" style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.4rem"></div>
        <button class="btn btn-sm" onclick="pickScenarioInitialLocations()" type="button">＋ 挑選地點</button>

        <h4>初始連接關係</h4>
        <div id="sc-connections-list"></div>
        <button class="btn btn-sm" onclick="addConnection()" type="button">＋ 新增連接</button>

        <h4>調查員進場地點</h4>
        <select id="sc-spawn-location" onchange="markDirty()">
          <option value="">(選擇地點)</option>
          ${locs.map(code => {
            const loc = allLocationsCache?.find(l => l.code === code);
            return `<option value="${escapeHtml(code)}" ${s.investigator_spawn_location === code ? 'selected' : ''}>${escapeHtml(loc?.name_zh || code)}</option>`;
          }).join('')}
        </select>

        <h4>初始環境</h4>
        <label>預設光照
          <select id="sc-env-default-light" onchange="markDirty()">
            <option value="day" ${env.default_light === 'day' ? 'selected' : ''}>白天（全亮）</option>
            <option value="night" ${env.default_light === 'night' ? 'selected' : ''}>夜間（僅光源照明）</option>
          </select>
        </label>
        <label>光源地點（逗號分隔代碼）
          <input type="text" id="sc-env-lights" value="${escapeHtml((env.lights || []).join(','))}" oninput="markDirty()">
        </label>
        <label>失火地點（逗號分隔代碼）
          <input type="text" id="sc-env-fires" value="${escapeHtml((env.fires || []).join(','))}" oninput="markDirty()">
        </label>

        <h4>初始怪物</h4>
        <div id="sc-initial-enemies-list"></div>
        <button class="btn btn-sm" onclick="addInitialEnemy()" type="button">＋ 新增怪物</button>
      </section>
    ` : `
      <section class="editor-section">
        <h3>場景備忘錄</h3>
        <p class="hint">此場景代表關卡推進後的地圖狀態快照，供設計師與 AI 參考。實際切換由目標/議案卡背面的地圖操作指令觸發。</p>

        <h4>預期地點組合</h4>
        <div id="sc-initial-locations-chips" style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.4rem"></div>
        <button class="btn btn-sm" onclick="pickScenarioInitialLocations()" type="button">＋ 加入地點（預期）</button>

        <h4>預期怪物配置</h4>
        <div id="sc-initial-enemies-list"></div>
        <button class="btn btn-sm" onclick="addInitialEnemy()" type="button">＋ 新增怪物</button>
      </section>
    `}

    <div class="editor-footer">
      <div></div>
      <div><button class="btn btn-primary" onclick="saveScenario()">儲存場景</button></div>
    </div>
  `;
  renderScenarioLocationChips();
  if (isStarting) renderScenarioConnections(conns);
  renderScenarioEnemies(enemies);
}

function renderScenarioLocationChips() {
  const el = document.getElementById('sc-initial-locations-chips');
  if (!el) return;
  const locs = currentScenario?.initial_location_codes || [];
  if (!locs.length) { el.innerHTML = '<span class="hint">尚無地點</span>'; return; }
  el.innerHTML = locs.map(code => {
    const loc = allLocationsCache?.find(l => l.code === code);
    return `<span class="location-chip"><code>${escapeHtml(code)}</code> ${escapeHtml(loc?.name_zh || '?')}
      <button class="btn btn-sm" onclick="removeScenarioLocation('${code}')" style="margin-left:0.2rem">✖</button></span>`;
  }).join('');
}

function removeScenarioLocation(code) {
  currentScenario.initial_location_codes = (currentScenario.initial_location_codes || []).filter(c => c !== code);
  renderScenarioLocationChips();
  markDirty();
}

function pickScenarioInitialLocations() {
  openLocationPicker('scenario-initial', {
    mode: 'single_list',
    title: '挑選場景初始地點',
    currentSelection: currentScenario.initial_location_codes || [],
    onConfirm: (sel) => {
      currentScenario.initial_location_codes = sel.map(x => typeof x === 'string' ? x : x.code);
      renderScenarioLocationChips();
      markDirty();
      renderScenarioEditor();
    }
  });
}

function renderScenarioConnections(conns) {
  const el = document.getElementById('sc-connections-list');
  if (!el) return;
  if (!conns.length) { el.innerHTML = '<p class="hint">尚無連接</p>'; return; }
  el.innerHTML = conns.map((c, idx) => `
    <div style="display:grid;grid-template-columns:1fr 1fr 80px 40px;gap:0.4rem;margin-bottom:0.3rem;align-items:center">
      <input type="text" value="${escapeHtml(c.from || '')}" oninput="updateConnectionField(${idx}, 'from', this.value)" placeholder="地點 A 代碼">
      <input type="text" value="${escapeHtml(c.to || '')}" oninput="updateConnectionField(${idx}, 'to', this.value)" placeholder="地點 B 代碼">
      <input type="number" value="${c.cost || 1}" min="1" max="5" oninput="updateConnectionField(${idx}, 'cost', parseInt(this.value,10))">
      <button class="btn btn-sm btn-danger" onclick="removeConnection(${idx})">✖</button>
    </div>
  `).join('');
}

function updateConnectionField(idx, key, val) {
  currentScenario.initial_connections[idx][key] = val;
  markDirty();
}

function addConnection() {
  currentScenario.initial_connections = currentScenario.initial_connections || [];
  currentScenario.initial_connections.push({ from: '', to: '', cost: 1 });
  renderScenarioConnections(currentScenario.initial_connections);
  markDirty();
}

function removeConnection(idx) {
  currentScenario.initial_connections.splice(idx, 1);
  renderScenarioConnections(currentScenario.initial_connections);
  markDirty();
}

function renderScenarioEnemies(enemies) {
  const el = document.getElementById('sc-initial-enemies-list');
  if (!el) return;
  if (!enemies.length) { el.innerHTML = '<p class="hint">尚無初始怪物</p>'; return; }
  el.innerHTML = enemies.map((e, idx) => `
    <div style="display:grid;grid-template-columns:1fr 120px 1fr 80px 40px;gap:0.4rem;margin-bottom:0.3rem">
      <input type="text" value="${escapeHtml(e.family_code || '')}" oninput="updateEnemyField(${idx},'family_code',this.value)" placeholder="家族代碼">
      <select onchange="updateEnemyField(${idx},'tier',this.value)">
        <option value="">(位階)</option>
        ${['minion','threat','elite','boss','titan'].map(t => `<option value="${t}" ${e.tier === t ? 'selected' : ''}>${tierLabel(t)}</option>`).join('')}
      </select>
      <input type="text" value="${escapeHtml(e.location_code || '')}" oninput="updateEnemyField(${idx},'location_code',this.value)" placeholder="地點代碼">
      <input type="number" value="${e.count || 1}" min="1" max="6" oninput="updateEnemyField(${idx},'count',parseInt(this.value,10))">
      <button class="btn btn-sm btn-danger" onclick="removeInitialEnemy(${idx})">✖</button>
    </div>
  `).join('');
}

function updateEnemyField(idx, key, val) {
  currentScenario.initial_enemies[idx][key] = val;
  markDirty();
}

function addInitialEnemy() {
  currentScenario.initial_enemies = currentScenario.initial_enemies || [];
  currentScenario.initial_enemies.push({ family_code: '', tier: 'minion', location_code: '', count: 1 });
  renderScenarioEnemies(currentScenario.initial_enemies);
  markDirty();
}

function removeInitialEnemy(idx) {
  currentScenario.initial_enemies.splice(idx, 1);
  renderScenarioEnemies(currentScenario.initial_enemies);
  markDirty();
}

async function saveScenario() {
  if (!currentScenario) return;
  const env = {
    default_light: document.getElementById('sc-env-default-light')?.value || 'day',
    lights: (document.getElementById('sc-env-lights')?.value || '').split(',').map(s => s.trim()).filter(Boolean),
    fires: (document.getElementById('sc-env-fires')?.value || '').split(',').map(s => s.trim()).filter(Boolean),
  };
  const payload = {
    name_zh: document.getElementById('sc-name-zh').value,
    name_en: document.getElementById('sc-name-en').value,
    narrative: document.getElementById('sc-narrative').value,
    initial_location_codes: currentScenario.initial_location_codes || [],
    initial_connections: currentScenario.initial_connections || [],
    investigator_spawn_location: document.getElementById('sc-spawn-location')?.value || null,
    initial_environment: env,
    initial_enemies: currentScenario.initial_enemies || [],
  };
  const { ok, data } = await apiJson(`/api/scenarios/${currentScenario.id}`, {
    method: 'PUT', body: JSON.stringify(payload)
  });
  if (!ok) {
    if (data.details) {
      const msgs = [];
      if (data.details.missing_locations?.length) msgs.push('缺漏地點：' + data.details.missing_locations.join(', '));
      if (data.details.missing_families?.length) msgs.push('缺漏家族：' + data.details.missing_families.join(', '));
      alert('儲存失敗：\n' + msgs.join('\n'));
    } else alert('儲存失敗：' + (data.error || ''));
    return;
  }
  await reloadStage();
  showToast('場景已儲存', 'success');
}

function renderScenarioMapPreview(c) {
  if (!currentScenario) { c.innerHTML = '<p class="placeholder">選擇場景後顯示地圖</p>'; return; }
  const locs = (currentScenario.initial_location_codes || [])
    .map(code => allLocationsCache?.find(l => l.code === code))
    .filter(Boolean);
  if (!locs.length) { c.innerHTML = '<p class="placeholder">場景尚未配置地點</p>'; return; }
  const conns = currentScenario.initial_connections || [];
  const spawn = currentScenario.investigator_spawn_location;

  // 環形排列
  const count = locs.length, cx = 150, cy = 120, r = 90;
  const pos = {};
  locs.forEach((loc, i) => {
    const a = (i / count) * Math.PI * 2 - Math.PI / 2;
    pos[loc.code] = { x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r };
  });
  const edges = conns.map(cn => {
    const f = pos[cn.from], t = pos[cn.to];
    if (!f || !t) return '';
    return `<line x1="${f.x}" y1="${f.y}" x2="${t.x}" y2="${t.y}" stroke="#8a7540" stroke-width="2"/>`;
  }).join('');
  const nodes = locs.map(loc => {
    const p = pos[loc.code];
    const isSpawn = loc.code === spawn;
    const name = loc.name_zh || loc.code;
    return `
      <g transform="translate(${p.x},${p.y})">
        <circle r="16" fill="${isSpawn ? '#c99738' : '#374151'}" stroke="#a78b5a" stroke-width="2"/>
        <text text-anchor="middle" dy="30" fill="#e5e7eb" font-size="10">${escapeHtml(name.substring(0, 8))}</text>
      </g>
    `;
  }).join('');

  c.innerHTML = `
    <div class="preview-card">
      <h4>場景 #${currentScenario.scenario_order} 地圖</h4>
      <svg viewBox="0 0 300 240" xmlns="http://www.w3.org/2000/svg">
        ${edges}${nodes}
      </svg>
      <p class="hint">橘色 = 調查員起點</p>
    </div>
  `;
}

function openLocationPicker(context, options) {
  locPickerContext = {
    caller: context,
    mode: options.mode || 'single_list',
    currentSelection: (options.currentSelection || []).map(s => s),
    onConfirm: options.onConfirm,
  };
  document.getElementById('loc-picker-title').textContent = options.title || '挑選地點';
  document.getElementById('loc-picker-hint').textContent = options.hint || '';
  ensureLocationsCache().then(() => {
    renderLocationPickerList();
    openDialog('location-picker');
  });
}

function renderLocationPickerList() {
  const search = document.getElementById('loc-picker-search').value.toLowerCase();
  const scaleF = document.getElementById('loc-picker-scale-filter').value;
  const mode = locPickerContext.mode;
  const selected = new Set(locPickerContext.currentSelection.map(s => typeof s === 'string' ? s : s.code));

  const filtered = (allLocationsCache || []).filter(loc => {
    if (search && !(loc.name_zh || '').toLowerCase().includes(search) &&
        !(loc.code || '').toLowerCase().includes(search)) return false;
    if (scaleF && loc.scale_tag !== scaleF) return false;
    return true;
  });

  document.getElementById('loc-picker-list').innerHTML = filtered.map(loc => {
    const isSel = selected.has(loc.code);
    let weightHtml = '';
    if (mode === 'weighted_list' && isSel) {
      const entry = locPickerContext.currentSelection.find(s => (typeof s === 'object' ? s.code : s) === loc.code);
      const w = (entry && typeof entry === 'object') ? (entry.weight || 1) : 1;
      weightHtml = `<label class="weight-input" onclick="event.stopPropagation()">權重
        <input type="number" min="1" max="10" value="${w}" onchange="setLocWeight('${loc.code}', this.value)"></label>`;
    }
    return `
      <div class="loc-card ${isSel ? 'selected' : ''}" onclick="toggleLocationPick('${loc.code}')">
        <div class="loc-card-header">
          <strong>${escapeHtml(loc.name_zh)}</strong>
          <code>${escapeHtml(loc.code)}</code>
        </div>
        <div class="loc-card-body">
          <span>尺度：${scaleLabel(loc.scale_tag)}</span>
          <span>DC：${loc.shroud}</span>
          <span>線索：${loc.clues_base}</span>
        </div>
        ${weightHtml}
      </div>
    `;
  }).join('');

  const cnt = locPickerContext.currentSelection.length;
  document.getElementById('loc-picker-selected-summary').textContent = `已選 ${cnt}`;
}

function toggleLocationPick(code) {
  const mode = locPickerContext.mode;
  const cur = locPickerContext.currentSelection;
  const findIdx = () => cur.findIndex(s => (typeof s === 'object' ? s.code : s) === code);
  if (mode === 'replace') {
    locPickerContext.currentSelection = [mode === 'weighted_list' ? { code, weight: 1 } : code];
  } else {
    const i = findIdx();
    if (i >= 0) cur.splice(i, 1);
    else cur.push(mode === 'weighted_list' ? { code, weight: 1 } : code);
  }
  renderLocationPickerList();
}

function setLocWeight(code, w) {
  const v = Math.max(1, parseInt(w, 10) || 1);
  const entry = locPickerContext.currentSelection.find(s => (typeof s === 'object' ? s.code : s) === code);
  if (entry && typeof entry === 'object') entry.weight = v;
}

function confirmLocationPicker() {
  if (locPickerContext.onConfirm) locPickerContext.onConfirm(locPickerContext.currentSelection);
  closeDialog('location-picker');
}

async function ensureFamiliesCache() {
  if (allFamiliesCache) return;
  const res = await adminFetch('/api/admin/monsters/families');
  const data = await res.json();
  allFamiliesCache = Array.isArray(data) ? data : (data.data || data.families || []);
}

function renderMapOperationsEditor(container, operations, onChange) {
  container.dataset.opsJson = JSON.stringify(operations || []);
  container.classList.add('map-ops-editor');
  container.innerHTML = `
    <div class="ops-list"></div>
    <button type="button" class="btn btn-sm btn-add-op">＋ 新增操作</button>
  `;
  container.querySelector('.btn-add-op').onclick = () => addOperation(container, onChange);
  renderOpsList(container, onChange);
}

function renderOpsList(container, onChange) {
  const ops = JSON.parse(container.dataset.opsJson || '[]');
  const list = container.querySelector('.ops-list');
  if (!ops.length) { list.innerHTML = '<p class="empty">尚無操作指令</p>'; return; }
  list.innerHTML = '';
  ops.forEach((op, idx) => {
    const row = document.createElement('div');
    row.className = 'op-row';
    row.dataset.index = idx;
    row.innerHTML = renderOpRowHTML(op, idx, ops.length);
    list.appendChild(row);
    bindOpRowEvents(row, container, onChange);
  });
}

function renderOpRowHTML(op, idx, total) {
  const def = mapOperationsSchema.verbs.find(v => v.code === op.verb);
  if (!def) return `<div>未知動詞：${escapeHtml(op.verb || '')}</div>`;
  return `
    <div class="op-handle">⋮⋮</div>
    <div class="op-verb-display"><span class="op-icon">${def.icon || ''}</span><strong>${escapeHtml(def.name_zh)}</strong></div>
    <div class="op-params">
      ${def.params.map(p => renderParamField(p, op.params?.[p.key])).join('') || '<span class="hint">無參數</span>'}
    </div>
    <div class="op-actions">
      ${idx > 0 ? `<button class="btn btn-sm btn-move-up" type="button">↑</button>` : ''}
      ${idx < total - 1 ? `<button class="btn btn-sm btn-move-down" type="button">↓</button>` : ''}
      <button class="btn btn-sm btn-duplicate" type="button">⧉</button>
      <button class="btn btn-sm btn-danger btn-remove" type="button">🗑</button>
    </div>
  `;
}

function renderParamField(p, val) {
  const label = `<div class="param-label">${escapeHtml(p.label_zh)}${p.required ? ' *' : ''}</div>`;
  switch (p.type) {
    case 'text':
      return `${label}<input type="text" class="param-input" data-key="${p.key}" value="${escapeHtml(val || '')}">`;
    case 'number':
      return `${label}<input type="number" class="param-input" data-key="${p.key}" value="${val ?? p.default ?? ''}" min="${p.min ?? ''}" max="${p.max ?? ''}">`;
    case 'select':
      return `${label}<select class="param-input" data-key="${p.key}">
        ${p.options.map(o => `<option value="${o.value}" ${val === o.value ? 'selected' : ''}>${escapeHtml(o.label_zh)}</option>`).join('')}
      </select>`;
    case 'location_picker':
      return `${label}<div class="param-location-picker" data-key="${p.key}" data-mode="${p.mode || 'replace'}">
        ${renderLocationChip(val)}<button class="btn btn-sm btn-pick-location" type="button">挑選</button>
      </div>`;
    case 'location_picker_multi':
      return `${label}<div class="param-location-picker-multi" data-key="${p.key}">
        ${(val || []).map(c => renderLocationChip(c)).join('')}<button class="btn btn-sm btn-pick-locations-multi" type="button">加入</button>
      </div>`;
    case 'family_picker':
      return `${label}<select class="param-input" data-key="${p.key}">
        <option value="">(家族)</option>
        ${(allFamiliesCache || []).map(f => `<option value="${escapeHtml(f.code)}" ${val === f.code ? 'selected' : ''}>${escapeHtml(f.name_zh)}</option>`).join('')}
      </select>`;
    case 'tier_select':
      return `${label}<select class="param-input" data-key="${p.key}">
        <option value="">(位階)</option>
        ${['minion','threat','elite','boss','titan'].map(t => `<option value="${t}" ${val === t ? 'selected' : ''}>${tierLabel(t)}</option>`).join('')}
      </select>`;
    default: return '';
  }
}

function renderLocationChip(code) {
  if (!code) return '<span class="location-chip empty">(未選擇)</span>';
  const loc = allLocationsCache?.find(l => l.code === code);
  return `<span class="location-chip"><code>${escapeHtml(code)}</code> ${escapeHtml(loc?.name_zh || '?')}</span>`;
}

function bindOpRowEvents(row, container, onChange) {
  const idx = parseInt(row.dataset.index, 10);

  row.querySelectorAll('.param-input').forEach(inp => {
    inp.onchange = () => updateOpParam(container, idx, inp.dataset.key, inp.value, onChange);
  });

  row.querySelectorAll('.btn-pick-location').forEach(btn => {
    btn.onclick = () => {
      const parent = btn.parentElement;
      const key = parent.dataset.key;
      const ops = JSON.parse(container.dataset.opsJson);
      const cur = ops[idx].params?.[key];
      openLocationPicker(`map-op-${idx}-${key}`, {
        mode: 'replace', title: '選擇地點',
        currentSelection: cur ? [cur] : [],
        onConfirm: (sel) => {
          const code = typeof sel[0] === 'object' ? sel[0].code : sel[0];
          updateOpParam(container, idx, key, code, onChange);
          renderOpsList(container, onChange);
        }
      });
    };
  });

  row.querySelectorAll('.btn-pick-locations-multi').forEach(btn => {
    btn.onclick = () => {
      const parent = btn.parentElement;
      const key = parent.dataset.key;
      const ops = JSON.parse(container.dataset.opsJson);
      const cur = ops[idx].params?.[key] || [];
      openLocationPicker(`map-op-${idx}-${key}-multi`, {
        mode: 'single_list', title: '選擇多個地點',
        currentSelection: cur,
        onConfirm: (sel) => {
          const codes = sel.map(s => typeof s === 'object' ? s.code : s);
          updateOpParam(container, idx, key, codes, onChange);
          renderOpsList(container, onChange);
        }
      });
    };
  });

  row.querySelector('.btn-move-up')?.addEventListener('click', () => moveOp(container, idx, -1, onChange));
  row.querySelector('.btn-move-down')?.addEventListener('click', () => moveOp(container, idx, 1, onChange));
  row.querySelector('.btn-duplicate')?.addEventListener('click', () => duplicateOp(container, idx, onChange));
  row.querySelector('.btn-remove')?.addEventListener('click', () => removeOp(container, idx, onChange));
}

function updateOpParam(container, idx, key, val, onChange) {
  const ops = JSON.parse(container.dataset.opsJson);
  ops[idx].params = ops[idx].params || {};
  ops[idx].params[key] = val;
  container.dataset.opsJson = JSON.stringify(ops);
  markDirty();
  onChange?.(ops);
}

function moveOp(container, idx, delta, onChange) {
  const ops = JSON.parse(container.dataset.opsJson);
  const j = idx + delta;
  if (j < 0 || j >= ops.length) return;
  [ops[idx], ops[j]] = [ops[j], ops[idx]];
  container.dataset.opsJson = JSON.stringify(ops);
  renderOpsList(container, onChange);
  markDirty();
  onChange?.(ops);
}

function duplicateOp(container, idx, onChange) {
  const ops = JSON.parse(container.dataset.opsJson);
  ops.splice(idx + 1, 0, JSON.parse(JSON.stringify(ops[idx])));
  container.dataset.opsJson = JSON.stringify(ops);
  renderOpsList(container, onChange);
  markDirty();
  onChange?.(ops);
}

function removeOp(container, idx, onChange) {
  if (!confirm('確定刪除此操作？')) return;
  const ops = JSON.parse(container.dataset.opsJson);
  ops.splice(idx, 1);
  container.dataset.opsJson = JSON.stringify(ops);
  renderOpsList(container, onChange);
  markDirty();
  onChange?.(ops);
}

function addOperation(container, onChange) {
  openVerbPickerDialog((code) => {
    const ops = JSON.parse(container.dataset.opsJson);
    const def = mapOperationsSchema.verbs.find(v => v.code === code);
    const defaultParams = {};
    (def?.params || []).forEach(p => { if (p.default !== undefined) defaultParams[p.key] = p.default; });
    ops.push({ verb: code, params: defaultParams });
    container.dataset.opsJson = JSON.stringify(ops);
    renderOpsList(container, onChange);
    markDirty();
    onChange?.(ops);
  });
}

function openVerbPickerDialog(onSelect) {
  const grid = document.getElementById('verb-picker-grid');
  const byCat = {};
  (mapOperationsSchema.verbs || []).forEach(v => {
    const cat = v.category || 'other';
    (byCat[cat] = byCat[cat] || []).push(v);
  });
  const labels = mapOperationsSchema.category_labels || {};
  grid.innerHTML = Object.entries(byCat).map(([cat, verbs]) => `
    <div class="verb-group">
      <h4>${escapeHtml(labels[cat] || cat)}</h4>
      <div class="verb-buttons">
        ${verbs.map(v => `
          <button class="verb-btn" data-code="${v.code}" type="button">
            <span class="verb-icon">${v.icon || ''}</span>
            <span class="verb-name">${escapeHtml(v.name_zh)}</span>
            ${v.description_zh ? `<span class="verb-desc">${escapeHtml(v.description_zh)}</span>` : ''}
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');
  grid.querySelectorAll('.verb-btn').forEach(btn => {
    btn.onclick = () => { onSelect(btn.dataset.code); closeDialog('verb-picker'); };
  });
  openDialog('verb-picker');
}

function renderFlagSetsPicker(flagSets) {
  if (!currentCampaignFlags.length) {

  }
  const setMap = {};
  (flagSets || []).forEach(f => {

    const val = typeof f === 'object' ? f.value : true;
    setMap[code] = val;
  });
  return `
    <div style="display:flex;flex-direction:column;gap:0.2rem;">
      ${currentCampaignFlags.map(f => `
        <label style="display:inline-flex;gap:0.4rem;align-items:center;font-size:0.78rem">

          ${escapeHtml(f.flag_code)}
          <select class="flag-set-val" data-code="${escapeHtml(f.flag_code)}" onchange="markDirty()">
            <option value="true" ${setMap[f.flag_code] === true ? 'selected' : ''}>true</option>
            <option value="false" ${setMap[f.flag_code] === false ? 'selected' : ''}>false</option>
          </select>
        </label>
      `).join('')}

  `;
}

function collectFlagSets(containerId) {
  const out = [];
  document.querySelectorAll(`#${containerId} .flag-set-chk:checked`).forEach(chk => {
    const code = chk.value;
    const valEl = document.querySelector(`#${containerId} .flag-set-val[data-code="${code}"]`);
    const v = valEl ? valEl.value === 'true' : true;
    out.push({ flag_code: code, value: v });
  });
  return out;
}

function collectSelectedObjectiveTypes() {
  const out = [];
  document.querySelectorAll('.ac-obj-type:checked').forEach(el => out.push(el.value));
  return out;
}

async function saveActCard() {
  if (!currentActCard) return;
  let adv = {};
  const advText = document.getElementById('ac-advance-condition').value.trim();
  if (advText) { try { adv = JSON.parse(advText); } catch (e) { alert('推進條件 JSON 格式錯誤'); return; } }

  const mapOpsEl = document.getElementById('ac-map-operations');
  const payload = {
    name_zh: document.getElementById('ac-name-zh').value,
    name_en: document.getElementById('ac-name-en').value,
    front_narrative: document.getElementById('ac-front-narrative').value,
    front_objective_types: collectSelectedObjectiveTypes(),
    front_advance_condition: adv,
    front_scaling: { scaling_enabled: document.getElementById('ac-scaling-enabled').checked },
    back_narrative: document.getElementById('ac-back-narrative').value,
    back_flag_sets: collectFlagSets('ac-flag-sets'),
    back_rewards: {
      xp: parseInt(document.getElementById('rw-xp').value, 10) || 0,
      talent_point: parseInt(document.getElementById('rw-tp').value, 10) || 0,
      cohesion: parseInt(document.getElementById('rw-cohesion').value, 10) || 0,
      resources: parseInt(document.getElementById('rw-resources').value, 10) || 0,
    },
    back_map_operations: JSON.parse(mapOpsEl.dataset.opsJson || '[]'),
    back_resolution_code: document.getElementById('ac-resolution-code').value,
  };
  const { ok, data } = await apiJson(`/api/act-cards/${currentActCard.id}`, {
    method: 'PUT', body: JSON.stringify(payload)
  });
  if (!ok) {
    if (data.details) {
      const msgs = [];
      if (data.details.missing_flags?.length) msgs.push('缺漏旗標：' + data.details.missing_flags.join(', '));
      if (data.details.missing_locations?.length) msgs.push('缺漏地點：' + data.details.missing_locations.join(', '));
      if (data.details.missing_families?.length) msgs.push('缺漏家族：' + data.details.missing_families.join(', '));
      alert('儲存失敗：\n' + msgs.join('\n'));
    } else alert('儲存失敗：' + (data.error || ''));
    return;
  }
  await reloadStage();
  currentActCard = (currentStage.act_cards || []).find(c => c.id === currentActCard.id);
  renderActCardsList();
  showToast('目標卡已儲存', 'success');
}

function applyChaosBagPreset(preset) {
  if (!confirm(`套用「${preset}」預設會覆蓋目前配置，確定？`)) return;
  const p = stageOptions?.difficulty_presets?.[preset];
  if (!p) return;
  // 數字
  Object.entries(p.number_markers || {}).forEach(([k, v]) => {
    const el = document.querySelector(`.num-marker[data-marker="${k}"]`);
    if (el) el.value = v;
  });
  // 情境
  Object.entries(p.scenario_markers || {}).forEach(([m, cfg]) => {
    const c = document.querySelector(`.scen-count[data-marker="${m}"]`);
    const e = document.querySelector(`.scen-effect[data-marker="${m}"]`);
    const v = document.querySelector(`.scen-value[data-marker="${m}"]`);
    if (c) c.value = cfg.count;
    if (e) e.value = cfg.effect;
    if (v) v.value = cfg.value;
  });
  // 神話
  Object.entries(p.mythos_markers || {}).forEach(([m, cfg]) => {
    const c = document.querySelector(`.myth-count[data-marker="${m}"]`);
    const v = document.querySelector(`.myth-value[data-marker="${m}"]`);
    if (c) c.value = cfg.count;
    if (v) v.value = cfg.value;
  });
  markDirty();
  updateChaosBagStats();
  showToast(`已套用 ${preset}`, 'success');
}

function collectChaosBagFromForm() {
  const nums = {};
  document.querySelectorAll('.num-marker').forEach(el => { nums[el.dataset.marker] = parseInt(el.value, 10) || 0; });
  const scens = {};
  document.querySelectorAll('.scenario-marker-row').forEach(row => {
    const m = row.dataset.marker;
    scens[m] = {
      count: parseInt(row.querySelector('.scen-count').value, 10) || 0,
      effect: row.querySelector('.scen-effect').value || '',
      value: parseInt(row.querySelector('.scen-value').value, 10) || 0,
    };
  });
  const myth = {};
  document.querySelectorAll('.mythos-marker-row').forEach(row => {
    const m = row.dataset.marker;
    myth[m] = {
      count: parseInt(row.querySelector('.myth-count').value, 10) || 0,
      value: parseInt(row.querySelector('.myth-value').value, 10) || 0,
    };
  });
  return {
    difficulty_preset: currentStage.chaos_bag?.difficulty_preset || 'standard',
    number_markers: nums,
    scenario_markers: scens,
    mythos_markers: myth,
    dynamic_markers: {
      bless: parseInt(document.getElementById('dyn-bless')?.value, 10) || 0,
      curse: parseInt(document.getElementById('dyn-curse')?.value, 10) || 0,
    },
  };
}

function updateChaosBagStats() {
  const bag = collectChaosBagFromForm();
  let total = 0, sum = 0, failCount = 0;
  for (const [k, n] of Object.entries(bag.number_markers)) {
    total += n;
    sum += (parseInt(k, 10) || 0) * n;
    if ((parseInt(k, 10) || 0) <= -3) failCount += n;
  }
  for (const cfg of Object.values(bag.scenario_markers)) {
    total += cfg.count;
    sum += cfg.value * cfg.count;
    if (cfg.value <= -3) failCount += cfg.count;
  }
  for (const cfg of Object.values(bag.mythos_markers)) {
    total += cfg.count;
    sum += cfg.value * cfg.count;
    if (cfg.value <= -3) failCount += cfg.count;
  }
  total += 2; // extreme markers
  const expected = total > 0 ? sum / total : 0;
  const fail = total > 0 ? failCount / total : 0;
  const extreme = total > 0 ? 2 / total : 0;
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  set('chaos-total-count', total);
  set('chaos-expected-value', expected.toFixed(2));
  set('chaos-fail-rate-dc4', (fail * 100).toFixed(1) + '%');
  set('chaos-extreme-rate', (extreme * 100).toFixed(1) + '%');
}

function renderMonsterPoolList() {
  const el = document.getElementById('monster-pool-list');
  if (!el) return;
  if (!currentMonsterPool.length) { el.innerHTML = '<p class="empty">尚未指派家族</p>'; return; }
  el.innerHTML = currentMonsterPool.map(it => {
    const fam = allFamiliesCache?.find(f => f.code === it.family_code);
    const name = fam?.name_zh || it.family_code;
    return `
      <div class="family-pool-row ${it.role}">
        <div>
          <span class="role-badge role-${it.role}">${it.role === 'primary' ? '主' : '副'}</span>
          <strong>${escapeHtml(name)}</strong>
          <code style="margin-left:0.3rem;font-size:0.7rem;color:var(--text-tertiary)">${escapeHtml(it.family_code)}</code>
          <button class="btn btn-sm btn-danger" style="float:right" onclick="removeFamilyFromPool('${it.id}')">移除</button>
        </div>
        <div class="family-tiers">
          <span class="hint">允許位階：</span>
          ${['minion','threat','elite','boss','titan'].map(t => `
            <label class="tier-chip">
              <input type="checkbox" value="${t}" ${(it.allowed_tiers || []).includes(t) ? 'checked' : ''} onchange="updatePoolTier('${it.id}','${t}',this.checked)">
              ${tierLabel(t)}
            </label>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function openFamilyPicker(role) {
  document.getElementById('family-picker-title').textContent = role === 'primary' ? '選擇主家族' : '選擇副家族';
  const existing = new Set(currentMonsterPool.map(p => p.family_code));
  const avail = (allFamiliesCache || []).filter(f => !existing.has(f.code));
  const list = document.getElementById('family-picker-list');
  list.innerHTML = avail.map(f => `
    <div class="family-card" onclick="addFamilyToPool('${escapeHtml(f.code)}','${role}')">
      <strong>${escapeHtml(f.name_zh)}</strong>
      <code style="margin-left:0.4rem;font-size:0.72rem;color:var(--text-tertiary)">${escapeHtml(f.code)}</code>
      <p style="margin:0.2rem 0 0;font-size:0.75rem;color:var(--text-secondary)">${escapeHtml((f.theme_zh || '').substring(0, 80))}</p>
    </div>
  `).join('') || '<p class="empty">無可用家族</p>';
  openDialog('family-picker');
}

async function addFamilyToPool(code, role) {
  const primaryCount = currentMonsterPool.filter(p => p.role === 'primary').length;
  if (role === 'primary' && primaryCount >= 2) { alert('主家族已達 2 個上限'); return; }
  const { ok, data } = await apiJson(`/api/stages/${currentStage.id}/monster-pool`, {
    method: 'POST', body: JSON.stringify({ family_code: code, role, allowed_tiers: ['minion', 'threat'] })
  });
  if (!ok) { alert('加入失敗：' + (data.error || '')); return; }
  closeDialog('family-picker');
  await renderMonsterPoolTab();
}

async function updatePoolTier(poolId, tier, checked) {
  const item = currentMonsterPool.find(p => p.id === poolId);
  if (!item) return;
  const cur = new Set(item.allowed_tiers || []);
  if (checked) cur.add(tier); else cur.delete(tier);
  await apiJson(`/api/monster-pool/${poolId}`, {
    method: 'PUT', body: JSON.stringify({ allowed_tiers: [...cur] })
  });
  item.allowed_tiers = [...cur];
}

async function removeFamilyFromPool(id) {
  if (!confirm('移除此家族？')) return;
  await apiJson(`/api/monster-pool/${id}`, { method: 'DELETE' });
  await renderMonsterPoolTab();
}

async function openBossPicker() {
  if (!allBossVariantsCache) {
    const res = await adminFetch('/api/admin/monsters/variants');
    const data = await res.json();
    const all = Array.isArray(data) ? data : (data.data || data.variants || []);
    allBossVariantsCache = all.filter(v => v.tier >= 4); // boss=4, titan=5
  }
  renderBossPickerList();
  openDialog('boss-picker');
}

function renderBossPickerList() {
  const search = document.getElementById('boss-picker-search').value.toLowerCase();
  const tierF = document.getElementById('boss-picker-tier-filter').value;
  const filtered = (allBossVariantsCache || []).filter(v => {
    if (search && !(v.name_zh || '').toLowerCase().includes(search)) return false;
    if (tierF && String(v.tier) !== tierF) return false;
    return true;
  });
  document.getElementById('boss-picker-list').innerHTML = filtered.map(v => `
    <div class="boss-card" onclick="addFixedBoss('${v.id}')">
      <strong>${escapeHtml(v.name_zh)}</strong>
      <span class="tier-badge">${v.tier === 5 ? '巨頭' : '頭目'}</span>
      <p style="font-size:0.75rem;color:var(--text-secondary);margin:0.2rem 0 0">HP ${v.hp_base} / DMG ${v.damage_physical}</p>
    </div>
  `).join('') || '<p class="empty">無可用頭目</p>';
}

async function addFixedBoss(variantId) {
  const variant = allBossVariantsCache.find(v => v.id === variantId);
  if (!variant) return;
  // 取得 species -> family
  let familyCode = variant.family_code;
  if (!familyCode) {
    // fallback: 從 species 查
    const sRes = await adminFetch('/api/admin/monsters/species');
    const sData = await sRes.json();
    const species = (Array.isArray(sData) ? sData : (sData.data || sData.species || []))
      .find(s => s.id === variant.species_id);
    if (species) {
      const fam = (allFamiliesCache || []).find(f => f.id === species.family_id);
      familyCode = fam?.code;
    }
  }
  if (!familyCode) { alert('無法判斷頭目所屬家族'); return; }
  let targetPool = currentMonsterPool.find(p => p.family_code === familyCode);
  if (!targetPool) {
    const r = await apiJson(`/api/stages/${currentStage.id}/monster-pool`, {
      method: 'POST', body: JSON.stringify({ family_code: familyCode, role: 'primary', allowed_tiers: ['boss', 'titan'] })
    });
    if (r.ok) targetPool = r.data.data;
  }
  if (!targetPool) return;
  const newIds = [...(targetPool.fixed_boss_ids || []), variantId];
  await apiJson(`/api/monster-pool/${targetPool.id}`, {
    method: 'PUT', body: JSON.stringify({ fixed_boss_ids: newIds })
  });
  closeDialog('boss-picker');
  await renderMonsterPoolTab();
}

function renderFixedBossList() {
  const el = document.getElementById('fixed-boss-list');
  if (!el) return;
  const allBosses = [];
  for (const pool of currentMonsterPool) {
    for (const bid of (pool.fixed_boss_ids || [])) {
      const v = (allBossVariantsCache || []).find(x => x.id === bid);
      allBosses.push({ pool, variantId: bid, variant: v });
    }
  }
  if (!allBosses.length) { el.innerHTML = '<p class="empty">尚未指定</p>'; return; }
  el.innerHTML = allBosses.map(it => `
    <div style="display:flex;gap:0.5rem;align-items:center;padding:0.4rem;background:var(--bg-primary);border:1px solid var(--border);border-radius:4px;margin-bottom:0.3rem">
      <span class="tier-badge">${it.variant?.tier === 5 ? '巨頭' : '頭目'}</span>
      <strong>${escapeHtml(it.variant?.name_zh || it.variantId)}</strong>
      <span class="hint">家族：${escapeHtml(it.pool.family_code)}</span>
      <button class="btn btn-sm btn-danger" style="margin-left:auto" onclick="removeFixedBoss('${it.pool.id}','${it.variantId}')">移除</button>
    </div>
  `).join('');
}

async function removeFixedBoss(poolId, variantId) {
  const pool = currentMonsterPool.find(p => p.id === poolId);
  if (!pool) return;
  const newIds = (pool.fixed_boss_ids || []).filter(id => id !== variantId);
  await apiJson(`/api/monster-pool/${poolId}`, {
    method: 'PUT', body: JSON.stringify({ fixed_boss_ids: newIds })
  });
  await renderMonsterPoolTab();
}

function renderMonsterPoolMiniPreview(c) {
  if (!currentMonsterPool?.length) { c.innerHTML = '<p class="placeholder">尚未指派家族</p>'; return; }
  c.innerHTML = `
