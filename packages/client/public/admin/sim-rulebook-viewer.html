<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>規則書閱覽器 — SIM-04</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-shared.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <style>
    :root {
      --rb-sidebar-w: 320px;
      --rb-gold: #c9a961;
      --rb-gold-dim: #8a7540;
      --rb-primary: #e8d9a8;
      --rb-history: #6f6a5e;
      --rb-danger: #c14a4a;
      --rb-bg-content: #12110f;
      --rb-bg-sidebar: #0b0a09;
      --rb-bg-card: #1a1815;
      --rb-border: #2a2620;
      --rb-text: #cfc4a8;
      --rb-text-dim: #8a8268;
      --rb-hl: rgba(201, 169, 97, 0.35);
    }

    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--rb-bg-content);
      color: var(--rb-text);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── Top bar ── */
    .rb-topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.25rem;
      background: var(--rb-bg-sidebar);
      border-bottom: 1px solid var(--rb-border);
      position: sticky; top: 0; z-index: 20;
    }
    .rb-topbar a.rb-back {
      color: var(--rb-text-dim); text-decoration: none; font-size: 0.875rem;
    }
    .rb-topbar a.rb-back:hover { color: var(--rb-gold); }
    .rb-topbar .rb-title {
      font-family: 'Cinzel', serif;
      color: var(--rb-gold);
      font-weight: 600;
      font-size: 1.125rem;
    }
    .rb-topbar .rb-code {
      color: var(--rb-gold-dim); font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--rb-gold-dim); border-radius: 4px;
    }
    .rb-topbar .rb-search-wrap {
      flex: 1; max-width: 480px; margin-left: auto; position: relative;
    }
    .rb-topbar input.rb-search {
      width: 100%; padding: 0.5rem 0.8rem; padding-right: 2.5rem;
      background: var(--rb-bg-card); color: var(--rb-text);
      border: 1px solid var(--rb-border); border-radius: 4px;
      font-family: inherit; font-size: 0.875rem;
    }
    .rb-topbar input.rb-search:focus { outline: none; border-color: var(--rb-gold); }
    .rb-search-count {
      position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%);
      font-size: 0.75rem; color: var(--rb-text-dim);
    }

    /* ── Layout ── */
    .rb-layout {
      display: grid;
      grid-template-columns: var(--rb-sidebar-w) 1fr;
      height: calc(100vh - 58px);
    }

    /* ── Sidebar ── */
    .rb-sidebar {
      background: var(--rb-bg-sidebar);
      border-right: 1px solid var(--rb-border);
      overflow-y: auto;
      padding: 1rem 0;
    }
    .rb-group {
      margin-bottom: 1.25rem;
    }
    .rb-group-title {
      padding: 0.35rem 1.25rem;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--rb-gold-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--rb-border);
      margin-bottom: 0.35rem;
    }
    .rb-group.historical .rb-group-title { color: var(--rb-history); }
    .rb-item {
      display: block;
      padding: 0.45rem 1.25rem;
      color: var(--rb-text);
      font-size: 0.875rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .rb-item:hover { background: rgba(201, 169, 97, 0.06); }
    .rb-item.active {
      background: rgba(201, 169, 97, 0.12);
      border-left-color: var(--rb-gold);
      color: var(--rb-gold);
    }
    .rb-group.historical .rb-item {
      color: var(--rb-history);
      font-style: italic;
    }
    .rb-group.historical .rb-item.active {
      color: #9c927e;
      background: rgba(111, 106, 94, 0.15);
      border-left-color: var(--rb-history);
    }
    .rb-item .rb-item-badge {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--rb-text-dim);
      margin-left: 0.3rem;
    }
    .rb-item .rb-override-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--rb-danger);
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    /* ── Content ── */
    .rb-content-wrap {
      overflow-y: auto;
      padding: 2rem 2.5rem;
    }
    .rb-content {
      max-width: 900px;
      margin: 0 auto;
    }
    .rb-banner {
      padding: 0.75rem 1rem;
      background: rgba(201, 169, 97, 0.07);
      border: 1px solid var(--rb-gold-dim);
      border-radius: 4px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--rb-text-dim);
    }
    .rb-banner strong { color: var(--rb-gold); }
    .rb-banner.historical {
      border-color: var(--rb-history);
      background: rgba(111, 106, 94, 0.08);
    }
    .rb-override {
      padding: 1rem 1.25rem;
      background: rgba(193, 74, 74, 0.1);
      border: 1px solid var(--rb-danger);
      border-left: 4px solid var(--rb-danger);
      border-radius: 4px;
      margin: 1.5rem 0;
      color: var(--rb-primary);
    }
    .rb-override .rb-override-title {
      font-family: 'Cinzel', serif;
      color: var(--rb-danger);
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }
    .rb-override ul, .rb-override p {
      margin: 0.35rem 0;
    }
    .rb-override code {
      background: rgba(0,0,0,0.35);
      padding: 0.1em 0.35em;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
    }

    /* ── Markdown body ── */
    .rb-md h1 {
      font-family: 'Cinzel', serif;
      color: var(--rb-gold);
      font-size: 1.75rem;
      margin: 1.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--rb-border);
    }
    .rb-md h2 {
      font-family: 'Cinzel', serif;
      color: var(--rb-primary);
      font-size: 1.35rem;
      margin: 2rem 0 0.8rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px dashed var(--rb-border);
    }
    .rb-md h3 {
      color: var(--rb-gold);
      font-size: 1.1rem;
      margin: 1.5rem 0 0.6rem;
    }
    .rb-md h4 { color: var(--rb-primary); font-size: 1rem; margin: 1.2rem 0 0.5rem; }
    .rb-md h5, .rb-md h6 { color: var(--rb-text); font-size: 0.95rem; margin: 1rem 0 0.4rem; }
    .rb-md p { margin: 0.6rem 0; }
    .rb-md ul, .rb-md ol { padding-left: 1.6rem; margin: 0.6rem 0; }
    .rb-md li { margin: 0.2rem 0; }
    .rb-md blockquote {
      margin: 0.8rem 0;
      padding: 0.5rem 1rem;
      border-left: 3px solid var(--rb-gold-dim);
      background: rgba(201, 169, 97, 0.05);
      color: var(--rb-text-dim);
    }
    .rb-md code {
      background: rgba(0,0,0,0.4);
      padding: 0.1em 0.4em;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88em;
      color: var(--rb-primary);
    }
    .rb-md pre {
      background: #08070a;
      border: 1px solid var(--rb-border);
      border-radius: 4px;
      padding: 0.8rem 1rem;
      overflow-x: auto;
      margin: 0.8rem 0;
    }
    .rb-md pre code {
      background: none; padding: 0; color: var(--rb-text);
      font-size: 0.85rem; line-height: 1.5;
    }
    .rb-md table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    .rb-md th, .rb-md td {
      border: 1px solid var(--rb-border);
      padding: 0.5rem 0.8rem;
      text-align: left;
    }
    .rb-md th {
      background: rgba(201, 169, 97, 0.08);
      color: var(--rb-gold);
      font-weight: 600;
    }
    .rb-md tr:nth-child(even) td { background: rgba(255,255,255,0.015); }
    .rb-md a { color: var(--rb-gold); }
    .rb-md hr { border: none; border-top: 1px solid var(--rb-border); margin: 1.5rem 0; }
    .rb-md strong { color: var(--rb-primary); }
    .rb-md em { color: var(--rb-gold-dim); }

    /* historical document styling — gray out body */
    .rb-content.historical .rb-md {
      color: var(--rb-history);
      opacity: 0.85;
    }
    .rb-content.historical .rb-md h1,
    .rb-content.historical .rb-md h2,
    .rb-content.historical .rb-md h3,
    .rb-content.historical .rb-md h4 {
      color: #9c927e;
    }
    .rb-content.historical .rb-md strong { color: #b3a888; }
    .rb-content.historical .rb-md code { color: #9c927e; }
    .rb-content.historical .rb-md th { color: #9c927e; background: rgba(111, 106, 94, 0.1); }

    /* Search highlight */
    mark.rb-hl {
      background: var(--rb-hl);
      color: var(--rb-primary);
      padding: 0 0.15em;
      border-radius: 2px;
    }

    /* Empty state */
    .rb-empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--rb-text-dim);
    }
    .rb-empty-icon { font-size: 2.5rem; opacity: 0.4; margin-bottom: 0.8rem; }
    .rb-empty-hint { font-size: 0.85rem; margin-top: 0.4rem; }

    /* Loading spinner */
    .rb-loading {
      display: inline-block;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

    /* Scrollbar */
    .rb-sidebar::-webkit-scrollbar, .rb-content-wrap::-webkit-scrollbar { width: 8px; }
    .rb-sidebar::-webkit-scrollbar-thumb, .rb-content-wrap::-webkit-scrollbar-thumb {
      background: var(--rb-border); border-radius: 4px;
    }
    .rb-sidebar::-webkit-scrollbar-thumb:hover, .rb-content-wrap::-webkit-scrollbar-thumb:hover {
      background: var(--rb-gold-dim);
    }

    /* Search result list */
    .rb-search-results {
      padding: 1rem 0;
    }
    .rb-search-result {
      padding: 0.75rem 1rem;
      background: var(--rb-bg-card);
      border: 1px solid var(--rb-border);
      border-radius: 4px;
      margin-bottom: 0.6rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .rb-search-result:hover { border-color: var(--rb-gold-dim); }
    .rb-search-result-title {
      color: var(--rb-gold); font-weight: 600; font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }
    .rb-search-result-snippet {
      color: var(--rb-text-dim); font-size: 0.8125rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="rb-topbar">
    <a href="index.html" class="rb-back">← 返回首頁</a>
    <span class="rb-title">規則書閱覽器</span>
    <span class="rb-code">SIM-04</span>
    <div class="rb-search-wrap">
      <input type="text" class="rb-search" id="rbSearch" placeholder="全文搜尋（Enter 搜尋，Esc 清除）…" autocomplete="off">
      <span class="rb-search-count" id="rbSearchCount"></span>
    </div>
  </div>

  <div class="rb-layout">
    <nav class="rb-sidebar" id="rbSidebar">
      <div class="rb-empty"><div class="rb-loading">&#8635;</div> 載入 TOC…</div>
    </nav>
    <main class="rb-content-wrap" id="rbContentWrap">
      <div class="rb-content">
        <div class="rb-empty">
          <div class="rb-empty-icon">&#128218;</div>
          <div>從左側選擇一份文件開始閱覽</div>
          <div class="rb-empty-hint">或使用右上搜尋框在全部文件中查找關鍵字</div>
        </div>
      </div>
    </main>
  </div>

<script>
(() => {
  'use strict';

  const RULEBOOK_BASE = '/rulebook/';
  const INDEX_URL = RULEBOOK_BASE + 'index.json';

  const state = {
    index: null,
    cache: new Map(),     // file → markdown text
    current: null,        // current item
    searchQuery: '',
  };

  // ──────────────────────────────────────────────
  // Load index + TOC render
  // ──────────────────────────────────────────────
  async function loadIndex() {
    try {
      const res = await fetch(INDEX_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      state.index = await res.json();
      renderSidebar();
      // deep-link by hash
      const hash = location.hash.slice(1);
      if (hash) {
        const item = findItem(hash);
        if (item) return showItem(item);
      }
    } catch (err) {
      document.getElementById('rbSidebar').innerHTML =
        `<div class="rb-empty">TOC 載入失敗<br><span class="rb-empty-hint">${err.message}</span></div>`;
    }
  }

  function findItem(file) {
    for (const sec of state.index.sections) {
      const it = sec.items.find(i => i.file === file);
      if (it) return { item: it, section: sec };
    }
    return null;
  }

  function renderSidebar() {
    const sb = document.getElementById('rbSidebar');
    sb.innerHTML = '';
    for (const sec of state.index.sections) {
      const grp = document.createElement('div');
      grp.className = 'rb-group' + (sec.class === 'historical' ? ' historical' : '');
      const title = document.createElement('div');
      title.className = 'rb-group-title';
      title.textContent = sec.title;
      grp.appendChild(title);
      for (const item of sec.items) {
        const el = document.createElement('a');
        el.className = 'rb-item';
        el.dataset.file = item.file;
        el.innerHTML = `${escHtml(item.title)}<span class="rb-item-badge">${item.lines}行</span>${item.has_override ? '<span class="rb-override-dot" title="本章有覆蓋規則"></span>' : ''}`;
        el.onclick = (e) => {
          e.preventDefault();
          showItem({ item, section: sec });
        };
        grp.appendChild(el);
      }
      sb.appendChild(grp);
    }
  }

  // ──────────────────────────────────────────────
  // Document display
  // ──────────────────────────────────────────────
  async function fetchDoc(file) {
    if (state.cache.has(file)) return state.cache.get(file);
    const res = await fetch(RULEBOOK_BASE + encodeURIComponent(file));
    if (!res.ok) throw new Error('HTTP ' + res.status + ' on ' + file);
    const text = await res.text();
    state.cache.set(file, text);
    return text;
  }

  async function showItem(ctx) {
    state.current = ctx;
    location.hash = ctx.item.file;
    // mark active in sidebar
    document.querySelectorAll('.rb-item').forEach(el => {
      el.classList.toggle('active', el.dataset.file === ctx.item.file);
    });
    const wrap = document.getElementById('rbContentWrap');
    wrap.scrollTop = 0;
    wrap.innerHTML = `<div class="rb-content"><div class="rb-empty"><div class="rb-loading">&#8635;</div> 載入中…</div></div>`;
    try {
      const md = await fetchDoc(ctx.item.file);
      renderContent(ctx, md);
    } catch (err) {
      wrap.innerHTML = `<div class="rb-content"><div class="rb-empty">載入失敗：${escHtml(err.message)}</div></div>`;
    }
  }

  function renderContent(ctx, md) {
    const { item, section } = ctx;
    const isHist = section.class === 'historical';

    const banners = [];
    if (section.id === 'rulebook') {
      banners.push(`<div class="rb-banner"><strong>規則書 v1.0 最高權威</strong>：本章文字為目前最高權威來源。若其他專項或歷史文件與本章不一致，以本章為準。</div>`);
    } else if (section.id === 'specialty') {
      banners.push(`<div class="rb-banner"><strong>專項規範</strong>：獨立參考資料。若與規則書 v1.0 文字衝突，以規則書 v1.0 為準。</div>`);
    } else if (isHist) {
      banners.push(`<div class="rb-banner historical"><strong>歷史版本</strong>：本文件已被規則書 v1.0 吸收。保留供追溯與對照，<em>不作為設計依據</em>。以規則書 v1.0 為準。</div>`);
    }

    let override = '';
    if (item.has_override && item.override_id && state.index.overrides?.[item.override_id]) {
      const ov = state.index.overrides[item.override_id];
      override = `<div class="rb-override"><div class="rb-override-title">⚠ ${escHtml(ov.title)}</div>${marked.parse(ov.body)}</div>`;
    }

    const body = marked.parse(md);
    const contentClass = isHist ? 'rb-content historical' : 'rb-content';

    document.getElementById('rbContentWrap').innerHTML =
      `<div class="${contentClass}">${banners.join('')}${override}<div class="rb-md">${body}</div></div>`;

    // re-apply search highlight if query active
    if (state.searchQuery) highlightInCurrent(state.searchQuery);
  }

  // ──────────────────────────────────────────────
  // Search
  // ──────────────────────────────────────────────
  async function runSearch(q) {
    q = q.trim();
    state.searchQuery = q;
    const countEl = document.getElementById('rbSearchCount');

    if (!q) {
      countEl.textContent = '';
      if (state.current) showItem(state.current);
      else document.getElementById('rbContentWrap').innerHTML =
        `<div class="rb-content"><div class="rb-empty"><div class="rb-empty-icon">&#128218;</div>從左側選擇一份文件開始閱覽</div></div>`;
      return;
    }

    // preload all files (first time only)
    countEl.textContent = '掃描中…';
    const results = [];
    for (const sec of state.index.sections) {
      for (const item of sec.items) {
        try {
          const md = await fetchDoc(item.file);
          const hits = findHits(md, q);
          if (hits.length) {
            results.push({ item, section: sec, hits, total: hits.length });
          }
        } catch (_) { /* skip */ }
      }
    }

    countEl.textContent = results.length
      ? `${results.reduce((a, r) => a + r.total, 0)} 筆（${results.length} 份）`
      : '無結果';

    renderSearchResults(q, results);
  }

  function findHits(text, q) {
    const re = new RegExp(escRe(q), 'gi');
    const hits = [];
    let m; let count = 0;
    while ((m = re.exec(text)) !== null && count < 5) {
      const start = Math.max(0, m.index - 40);
      const end = Math.min(text.length, m.index + q.length + 80);
      hits.push({
        index: m.index,
        snippet: text.substring(start, end),
        startOffset: m.index - start
      });
      count++;
      if (m.index === re.lastIndex) re.lastIndex++;
    }
    return hits;
  }

  function renderSearchResults(q, results) {
    const wrap = document.getElementById('rbContentWrap');
    if (!results.length) {
      wrap.innerHTML = `<div class="rb-content"><div class="rb-empty"><div class="rb-empty-icon">&#128269;</div>找不到「${escHtml(q)}」</div></div>`;
      return;
    }
    const items = results.map(r => {
      const snippets = r.hits.map(h => {
        const s = escHtml(h.snippet);
        const hl = s.replace(new RegExp(escRe(q), 'gi'), m => `<mark class="rb-hl">${m}</mark>`);
        return `<div class="rb-search-result-snippet">… ${hl} …</div>`;
      }).join('');
      const histTag = r.section.class === 'historical' ? ' <span style="color:var(--rb-history);font-size:0.75rem;">[歷史]</span>' : '';
      return `
        <div class="rb-search-result" data-file="${r.item.file}">
          <div class="rb-search-result-title">${escHtml(r.item.title)} (${r.section.title})${histTag} <span style="color:var(--rb-text-dim);font-weight:normal;font-size:0.8rem;">— ${r.total} 筆</span></div>
          ${snippets}
        </div>`;
    }).join('');
    wrap.innerHTML = `<div class="rb-content"><div class="rb-banner"><strong>搜尋：</strong>${escHtml(q)} · 共 ${results.reduce((a, r) => a + r.total, 0)} 筆</div><div class="rb-search-results">${items}</div></div>`;
    wrap.querySelectorAll('.rb-search-result').forEach(el => {
      el.onclick = () => {
        const ctx = findItem(el.dataset.file);
        if (ctx) showItem(ctx);
      };
    });
  }

  function highlightInCurrent(q) {
    const body = document.querySelector('.rb-md');
    if (!body) return;
    walkText(body, (node) => {
      if (!node.nodeValue) return;
      if (!new RegExp(escRe(q), 'i').test(node.nodeValue)) return;
      const span = document.createElement('span');
      span.innerHTML = escHtml(node.nodeValue).replace(
        new RegExp(escRe(q), 'gi'),
        m => `<mark class="rb-hl">${m}</mark>`
      );
      node.replaceWith(...span.childNodes);
    });
  }

  function walkText(root, fn) {
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(fn);
  }

  // ──────────────────────────────────────────────
  // Utilities
  // ──────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escRe(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // ──────────────────────────────────────────────
  // Wire up
  // ──────────────────────────────────────────────
  const searchEl = document.getElementById('rbSearch');
  let searchTimer = null;
  searchEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); runSearch(searchEl.value); }
    if (e.key === 'Escape') { searchEl.value = ''; runSearch(''); }
  });
  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      if (searchEl.value.length >= 2 || searchEl.value.length === 0) runSearch(searchEl.value);
    }, 350);
  });

  window.addEventListener('hashchange', () => {
    const hash = location.hash.slice(1);
    const ctx = hash ? findItem(hash) : null;
    if (ctx && ctx.item.file !== state.current?.item?.file) showItem(ctx);
  });

  // marked.js config
  if (window.marked) {
    marked.use({
      gfm: true,
      breaks: false,
    });
  }

  loadIndex();
})();
</script>
</body>
